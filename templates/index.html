const LANG_META = {
  html:       { icon: 'fa-solid fa-code',         color: '#e37933', ext: 'index.html'    },
  css:        { icon: 'fa-solid fa-palette',       color: '#2196f3', ext: 'style.css'     },
  javascript: { icon: 'fa-brands fa-js-square',    color: '#f7df1e', ext: 'script.js'     },
  js:         { icon: 'fa-brands fa-js-square',    color: '#f7df1e', ext: 'script.js'     },
  python:     { icon: 'fa-brands fa-python',       color: '#3b82f6', ext: 'main.py'       },
  py:         { icon: 'fa-brands fa-python',       color: '#3b82f6', ext: 'main.py'       },
  json:       { icon: 'fa-solid fa-database',      color: '#5ca5e0', ext: 'data.json'     },

  sql:        { icon: 'fa-solid fa-table',         color: '#a78bfa', ext: 'query.sql'     },
  typescript: { icon: 'fa-brands fa-js-square',    color: '#60a5fa', ext: 'index.ts'      },
  ts:         { icon: 'fa-brands fa-js-square',    color: '#60a5fa', ext: 'index.ts'      },
  jsx:        { icon: 'fa-brands fa-react',        color: '#38bdf8', ext: 'component.jsx' },
  tsx:        { icon: 'fa-brands fa-react',        color: '#38bdf8', ext: 'component.tsx' },
  cpp:        { icon: 'fa-solid fa-c',             color: '#a855f7', ext: 'main.cpp'      },
  c:          { icon: 'fa-solid fa-c',             color: '#a855f7', ext: 'main.c'        },
  java:       { icon: 'fa-brands fa-java',         color: '#f97316', ext: 'Main.java'     },
};

function extractCodeBlocks(text) {
  if(!text) return [];
  const rx = /```(\w*)\n?([\s\S]*?)```/g;
  const blocks = [];
  let match;
  while((match = rx.exec(text)) !== null) {
    const lang = (match[1]||'').toLowerCase().trim();
    const code = match[2].trim();
    if(!code) continue;
    const meta = LANG_META[lang] || { icon:'fa-solid fa-file-code', color:'#8b949e', ext: lang ? lang+'.txt' : 'code.txt' };
    const lines = code.split('\n').length;
    blocks.push({ lang, code, meta, lines });
  }
  return blocks;
}

function FileCard({ block, onOpen, canvasMode }) {
  const [hov, setHov] = React.useState(false);
  const [copied, setCopied] = React.useState(false);

  const handleCopy = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(block.code).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false), 1800);
    });
  };

  const handleDownload = (e) => {
    e.stopPropagation();
    const blob = new Blob([block.code], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = block.meta.ext;
    document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
  };

  return (
    <div
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        borderRadius:12, marginTop:8, overflow:'hidden',
        border:`1px solid ${hov?'rgba(99,102,241,.5)':'var(--br)'}`,
        background: hov?'rgba(99,102,241,.05)':'var(--bg3)',
        transition:'all .18s',
      }}
    >
      {/* Header row */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'9px 12px'}}>
        <div style={{display:'flex',alignItems:'center',gap:9,minWidth:0}}>
          <div style={{
            width:32,height:32,borderRadius:8,flexShrink:0,
            background:`${block.meta.color}18`,
            border:`1px solid ${block.meta.color}30`,
            display:'flex',alignItems:'center',justifyContent:'center',
          }}>
            <i className={block.meta.icon} style={{fontSize:14,color:block.meta.color}}></i>
          </div>
          <div style={{minWidth:0}}>
            <p style={{margin:0,fontSize:12,fontWeight:600,color:'var(--t1)',fontFamily:"'JetBrains Mono',monospace",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {block.meta.ext}
            </p>
            <p style={{margin:0,fontSize:10,color:'var(--t3)'}}>
              {block.lines} line{block.lines!==1?'s':''} · {block.lang||'code'}
            </p>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          {/* Copy button */}
          <button onClick={handleCopy} title="Copy code"
            style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:7,
              border:`1px solid ${copied?'rgba(16,185,129,.4)':' rgba(255,255,255,.08)'}`,
              background:copied?'rgba(16,185,129,.12)':' rgba(255,255,255,.04)',
              color:copied?'#10B981':'var(--t2)',fontSize:10,fontWeight:600,cursor:'pointer',transition:'all .15s'}}>
            <i className={`fa-solid ${copied?'fa-check':'fa-copy'}`} style={{fontSize:9}}></i>
            {copied?'Copied':' Copy'}
          </button>
          {/* Download button */}
          <button onClick={handleDownload} title="Download file"
            style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:7,
              border:'1px solid rgba(255,255,255,.08)',background:'rgba(255,255,255,.04)',
              color:'var(--t2)',fontSize:10,fontWeight:600,cursor:'pointer',transition:'all .15s'}}>
            <i className="fa-solid fa-download" style={{fontSize:9}}></i>
            Save
          </button>
          {/* Open in Canvas — only if canvasMode is ON */}
          {canvasMode && (
            <button onClick={()=>onOpen(block.code)} title="Open in Canvas"
              style={{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:7,border:'none',
                background:hov?'#6366f1':'rgba(99,102,241,.2)',
                color:hov?'#fff':'#818cf8',fontSize:10,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>
              <i className="fa-solid fa-up-right-from-square" style={{fontSize:9}}></i>
              Open
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

    const isText = f.type.startsWith('text/') ||
      /\.(txt|md|py|js|ts|jsx|tsx|html|css|json|xml|csv|yaml|yml|sh|sql|java|c|cpp|h|php|rb|go|rs|kt|swift)$/i.test(f.name);

    const isImage = f.type.startsWith('image/');

    if (isImage) {
      const reader = new FileReader();
      reader.onload = e => resolve({ content: null, preview: e.target.result, type: 'image' });
      reader.readAsDataURL(f);
    } else if (isText) {
      const reader = new FileReader();
      reader.onload = e => resolve({ content: e.target.result, preview: null, type: 'text' });
      reader.readAsText(f, 'UTF-8');
    } else if (isPDF) {
      // Read first ~50KB of PDF as text (basic extraction)
      const reader = new FileReader();
      reader.onload = e => {
        const arr = new Uint8Array(e.target.result);
        let raw = '';
        for (let i = 0; i < Math.min(arr.length, 60000); i++) {
          const c = arr[i];
          if (c >= 32 && c < 127) raw += String.fromCharCode(c);
          else if (c === 10 || c === 13) raw += '\n';
        }
        // Extract readable strings (4+ printable chars)
        const extracted = raw.match(/[^\x00-\x1F\x7F-\xFF]{4,}/g) || [];
        const text = extracted.join(' ').replace(/\s+/g,' ').slice(0, 8000);
        resolve({ content: text || '[PDF binary — text extraction limited]', preview: null, type: 'pdf' });
      };
      reader.readAsArrayBuffer(f);

      // Try reading as text anyway
      const reader = new FileReader();

      reader.readAsText(f, 'UTF-8');
    }
  });

      const cacheKey = msgText.trim().toLowerCase().slice(0,120);
      if(!isOnline){
        const cached = offlineCache[cacheKey];
        if(cached){
          const botMsgId2 = Date.now()+1;
          const botMsg2={id:botMsgId2,text:`📦 **Offline — Cached Response:**

${cached}`,sender:'bot',model,timestamp:Date.now(),language};
          try{ ReactDOM.flushSync(()=>{setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push(botMsg2);return u;});setTypewriterMsgId(botMsgId2);setTyping(false);setGlobalTyping(false);setTypingSid(null);}); }catch(_){setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push(botMsg2);return u;});setTyping(false);setGlobalTyping(false);}
          return;
        } else {
          const offMsg={id:Date.now()+1,text:'📡 You are offline and no cached response found for this query. Please check your internet connection and try again.',sender:'bot',model,timestamp:Date.now()};
          setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push(offMsg);return u;});
          setTyping(false);setGlobalTyping(false);setTypingSid(null);
          return;
        }
      }

      // Use XHR instead of fetch — XHR is NOT throttled when tab is hidden/minimized
      const data = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/chat', true);
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.timeout = 180000;
        // Store abort reference
        abortRef.current = { abort: () => { xhr.abort(); } };
        xhr.onload = () => {
          if(xhr.status >= 200 && xhr.status < 300){
            try { resolve(JSON.parse(xhr.responseText)); }
            catch(e){ reject(new Error('JSON parse error')); }
          } else {
            reject(new Error('HTTP ' + xhr.status));
          }
        };
        xhr.onerror  = () => reject(new Error('Network error'));
        xhr.ontimeout= () => reject(new Error('Timeout'));
        xhr.onabort  = () => reject(Object.assign(new Error('Aborted'), {name:'AbortError'}));
        xhr.send(JSON.stringify({
          message: msgText,
          file_name: fn, file_names: files.map(f=>f.name),
          system_prompt: sysPrompt + (aiMemories.length>0 ? '\n\n[USER MEMORY — facts you know about this user, always keep in mind]:\n' + aiMemories.map((m,i)=>`${i+1}. ${m.text}`).join('\n') : '') + '\n\n' + (MOODS.find(m=>m.id===mood.id)?.prompt||''),
          lang_instruction: langInstruction.trim(),
          persona_prompt: (PERSONAS.find(p=>p.id===persona)?.prompt||''),
          history: historyMsgs.slice(0,-1),
          mood: mood.id,
          model: model.id
        }));
      });
      ding(440,0.07);
      // Cache this response for offline use
      if(data.reply && msgText.trim().length > 3){
        const ck = msgText.trim().toLowerCase().slice(0,120);
        setOfflineCache(prev=>{
          const updated={...prev,[ck]:data.reply};
          // Keep only last 50 cached responses
          const keys=Object.keys(updated);
          if(keys.length>50){delete updated[keys[0]];}
          return updated;
        });
      }
      const botMsgId = Date.now()+1;
      // Parse inline sources from web search reply [[SRC:Title|URL]]
      let replyText = data.reply||'No response.';
      let inlineSources = {};
      if(webSearch) {
        let srcIdx = 0;
        replyText = replyText.replace(/\[\[SRC:([^\]|]+)\|([^\]]+)\]\]/g, (match, title, url) => {
          const key = `__SRC_${srcIdx}__`;
          inlineSources[key] = {title: title.trim(), url: url.trim()};
          srcIdx++;
          return key;
        });
      }
      const botMsg={id:botMsgId,text:replyText,sender:'bot',model,persona,timestamp:Date.now(),language,webSearch:webSearch,sources:[],inlineSources:inlineSources};
      // Use flushSync to force immediate React update even in background tab
      try {
        ReactDOM.flushSync(()=>{
          setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push(botMsg);return u;});
          setTypewriterMsgId(botMsgId);
          setTyping(false);setGlobalTyping(false);setTypingSid(null);
          // auto-speak removed: user clicks speaker icon manually
        });
      } catch(_){
        // flushSync fallback — use normal setState
        setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push(botMsg);return u;});
        setTypewriterMsgId(botMsgId);
        setTyping(false);setGlobalTyping(false);setTypingSid(null);

      setTrayNotifs(p=>[{id:Date.now(),type:'reply',icon:'fa-robot',color:'#818cf8',title:'Omina AI replied',body:(data.reply||'').slice(0,80),sid:sessionId,time:Date.now(),read:false},...p.slice(-49)]);

      if(canvasMode&&data.reply&&data.reply.includes('```')){

        const m=data.reply.match(rx);

      }
    } catch(e){
      if(e.name==='AbortError') return;
      try {
        ReactDOM.flushSync(()=>{
          setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push({id:Date.now()+1,text:'⚠️ **Error:** Cannot connect. Is Ollama running?',sender:'bot',model,timestamp:Date.now()});return u;});
          setTyping(false);setGlobalTyping(false);setTypingSid(null);
        });
      } catch(_){
        setSessions(prev=>{const u=[...prev];const i=u.findIndex(s=>s.id===sessionId);if(i!==-1)u[i].messages.push({id:Date.now()+1,text:'⚠️ **Error:** Cannot connect. Is Ollama running?',sender:'bot',model,timestamp:Date.now()});return u;});

    if(!msgSearchQ.trim()) return [];

    const results=[];

    const scoreSemanticMatch=(text,query)=>{
      const qWords=query.toLowerCase().split(/\s+/).filter(w=>w.length>2);
      const tLow=text.toLowerCase();
      let score=0;
      qWords.forEach(w=>{if(tLow.includes(w))score+=1;});
      // bonus for phrase match
      if(tLow.includes(query.toLowerCase()))score+=3;
      return score/Math.max(1,qWords.length);
    };

    sessions.forEach(s=>{
      if(searchFilter.session!=='all'&&s.id!==searchFilter.session) return;
      (s.messages||[]).forEach(m=>{
        if(!m.text) return;
        if(searchFilter.sender!=='all'&&m.sender!==searchFilter.sender) return;
        if(searchFilter.hasImage&&!m.fp) return;
        if(searchFilter.minLen>0&&m.text.length<searchFilter.minLen) return;
        if(searchFilter.dateFrom&&m.timestamp){
          if(new Date(m.timestamp)<new Date(searchFilter.dateFrom)) return;
        }
        if(searchFilter.dateTo&&m.timestamp){
          if(new Date(m.timestamp)>new Date(searchFilter.dateTo)) return;
        }

        let matched=false; let score=1; let preview=''; let regexErr=false;

        if(searchMode==='regex'){
          try{
            const rx=new RegExp(q,'gi');
            const mArr=[...m.text.matchAll(rx)];
            if(mArr.length>0){
              matched=true; score=mArr.length;
              const idx=mArr[0].index;
              preview=m.text.substring(Math.max(0,idx-30),idx+80);
            }
          }catch(e){regexErr=true;}
        } else if(searchMode==='semantic'){
          score=scoreSemanticMatch(m.text,q);
          if(score>0.3){
            matched=true;
            const qWords=q.toLowerCase().split(/\s+/).filter(w=>w.length>2);
            const firstMatch=qWords.reduce((best,w)=>{
              const i=m.text.toLowerCase().indexOf(w);
              return(i>-1&&(best===-1||i<best))?i:best;
            },-1);
            const start=firstMatch>-1?Math.max(0,firstMatch-25):0;
            preview=m.text.substring(start,start+120);
          }
        } else {
          // normal
          const qLow=q.toLowerCase();
          if(m.text.toLowerCase().includes(qLow)){
            matched=true;
            const idx=m.text.toLowerCase().indexOf(qLow);
            preview=m.text.substring(Math.max(0,idx-30),idx+80);
          }
        }

        if(matched){
          results.push({...m,sessionTitle:s.title||'Untitled',sessionId:s.id,preview,score,regexErr});
        }
      });
    });

    // sort by score desc
    return results.sort((a,b)=>b.score-a.score).slice(0,60);

      {id:'canvas',icon:'fa-solid fa-code',         color:canvasMode?'#60A5FA':'#94A3B8', label:'Canvas',      badge:canvasMode?'ON':null, act:()=>{const nm=!canvasMode;setCanvasMode(nm);if(!nm){setShowCanvas(false);}setActiveTool(nm?{id:'canvas',icon:'fa-solid fa-code',color:'#60A5FA',label:'Canvas'}:null);setShowPlus(false);}},
      {id:'templates', icon:'fa-solid fa-layer-group', color:'#F59E0B', label:'Templates',    badge:null, act:()=>{setShowTemplates(true);setShowPlus(false);}},
      {id:'promptlib', icon:'fa-solid fa-book-open',   color:'#8B5CF6', label:'Prompt Library',badge:null, act:()=>{setShowPromptLib(true);setShowPlus(false);}},
      {id:'cmdpal',    icon:'fa-solid fa-terminal',    color:'#10B981', label:'Commands',      badge:null, act:()=>{setShowCmdPalette(true);setShowPlus(false);}},
      {id:'lang',  icon:'fa-solid fa-language',      color:'#F59E0B', label:'Language',  badge:language!=='auto'?(LANGS.find(l=>l.id===language)?.flag||'🌐'):null, act:()=>{setShowSettings(true);setSettingsTab('language');setShowPlus(false);}},
      ...(!isFront?[{id:'regen',icon:'fa-solid fa-rotate-right',color:'#34D399',label:'Regenerate',act:()=>{regen();setShowPlus(false);},dis:typing||msgs.length===0}]:[]),
    ];
    const MC={'fast':'#FBBF24','thinking':'#A78BFA','pro':'#60A5FA'};

    const menuStyle={width:210,borderRadius:16,border:'1px solid var(--br)',background:'var(--bg2)',boxShadow:'0 24px 64px rgba(0,0,0,.6)',overflow:'hidden'};
    const menuHdr={padding:'10px 14px 4px',fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--t3)',margin:0};

    return(
      <div className="input-toolbar-row" style={{display:'flex',alignItems:'center',padding:'6px 12px 12px',gap:'6px'}}>
        {/* ── PLUS ── */}
        <div data-plus="1" style={{flexShrink:0}}>
          <button ref={plusBtnRef} onClick={openPlus}
            style={{width:34,height:34,borderRadius:10,border:`1px solid ${showPlus?'rgba(96,165,250,.5)':'var(--br)'}`,
              background:showPlus?'rgba(96,165,250,.12)':'var(--bg3)',color:showPlus?'#60A5FA':'var(--t2)',
              display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .15s'}}>
            <i className={`fa-solid ${showPlus?'fa-xmark':'fa-plus'}`} style={{fontSize:13,pointerEvents:'none'}}></i>
          </button>
          {showPlus&&ReactDOM.createPortal(
            <div data-plus="1" style={{...plusPos,...menuStyle}}>
              <p style={menuHdr}>Tools</p>
              <div style={{padding:'6px'}}>
                {TOOLS.map((item,i)=>(
                  <button key={i} onClick={item.act} disabled={item.dis}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                      borderRadius:10,border:'none',background:'transparent',cursor:item.dis?'default':'pointer',
                      color:'var(--t1)',fontSize:13,opacity:item.dis?0.35:1,textAlign:'left'}}
                    onMouseEnter={e=>{if(!item.dis)e.currentTarget.style.background='var(--bg3)';}}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <i className={item.icon} style={{color:item.color,width:14,fontSize:12,flexShrink:0}}></i>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge&&<span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:20,background:'rgba(96,165,250,.15)',color:'#60A5FA'}}>{item.badge}</span>}
                  </button>
                ))}
              </div>
            </div>,
            document.body
          )}
        </div>

        {/* ── VOICE ── */}
        <button onClick={toggleVoice} className={voiceOn?'vp':''}
          title={voiceOn?'Stop Recording':'Start Voice Input'}
          style={{width:34,height:34,borderRadius:10,border:`1px solid ${voiceOn?'#F87171':'var(--br)'}`,background:voiceOn?'rgba(248,113,113,.1)':'var(--bg3)',
            color:voiceOn?'#F87171':'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',flexShrink:0,transition:'all .2s'}}>
          {voiceOn
            ? <div className="voice-wave"><span/><span/><span/><span/><span/></div>
            : <i className="fa-solid fa-microphone" style={{fontSize:13,pointerEvents:'none'}}></i>
          }
        </button>

        {/* ── ACTIVE TOOL BADGE in chatbox ── */}
        {(activeTool||canvasMode)&&(()=>{
          // Always show canvas badge when canvasMode is ON
          const tool = (canvasMode && (!activeTool||activeTool.id==='canvas'))
            ? {id:'canvas',icon:'fa-solid fa-code',color:'#60A5FA',label:'Canvas'}
            : activeTool;
          if(!tool) return null;
          const tc=TOOL_COLORS[tool.id]||TOOL_COLORS.file;
          return(
            <div className="tool-badge" style={{background:tc.bg,borderColor:tc.border,color:tc.color}}>
              <i className={tool.icon} style={{fontSize:10}}></i>
              <span>{tool.label}</span>
              <span className="tool-badge-close" onClick={()=>{
                setActiveTool(null);
                if(tool.id==='canvas'){setCanvasMode(false);setShowCanvas(false);}
                if(tool.id==='web'){setWebSearch(false);}
              }}>✕</span>
            </div>
          );
        })()}

        <div style={{flex:1}}></div>

        {charCount>charLimit*.7&&<span style={{fontSize:10,fontFamily:'monospace',flexShrink:0,color:charCount>charLimit*.9?'#F87171':'#FBBF24'}}>{charLimit-charCount}</span>}

        {/* ── MOOD / RESPONSE MODEL ── */}
        <div data-mood="1" style={{flexShrink:0}}>
          <button ref={moodBtnRef} onClick={openMood}
            style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',borderRadius:7,
              border:'1px solid var(--br)',background:'var(--bg3)',cursor:'pointer',
              color:'var(--t2)',fontSize:11,fontWeight:500,whiteSpace:'nowrap',transition:'all .12s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(96,165,250,.4)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}>
            <i className={mood.icon} style={{color:MC[mood.id]||'#60A5FA',fontSize:9,pointerEvents:'none'}}></i>
            <span style={{pointerEvents:'none'}}>{mood.name}</span>
            <i className="fa-solid fa-chevron-down" style={{fontSize:7,color:'var(--t3)',pointerEvents:'none'}}></i>
          </button>
          {showMood&&ReactDOM.createPortal(
            <div data-mood="1" style={{...moodPos,
              background:'var(--bg2)',border:'1px solid var(--br)',borderRadius:10,
              boxShadow:'0 6px 24px rgba(0,0,0,.4)',padding:'4px',minWidth:180,overflow:'hidden'}}>
              <p style={{fontSize:9,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',
                color:'var(--t3)',padding:'5px 8px 3px',margin:0}}>Response Model</p>
              {MOODS.map(m=>{
                const active=mood.id===m.id;
                const clr={'fast':'#F59E0B','thinking':'#8B5CF6','pro':'#3B82F6'}[m.id]||'#60A5FA';
                return(
                  <button key={m.id} onClick={()=>{setMood(m);setShowMood(false);}}
                    style={{display:'flex',alignItems:'center',gap:8,width:'100%',
                      padding:'6px 8px',borderRadius:7,border:'none',cursor:'pointer',
                      background:active?'var(--bg3)':'transparent',transition:'background .1s'}}
                    onMouseEnter={e=>{if(!active)e.currentTarget.style.background='var(--bg3)';}}
                    onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
                    <i className={m.icon} style={{fontSize:11,color:clr,width:14,textAlign:'center',flexShrink:0}}></i>
                    <div style={{flex:1,textAlign:'left'}}>
                      <p style={{margin:0,fontSize:12,fontWeight:active?600:400,color:active?'var(--t1)':'var(--t2)',lineHeight:1.2}}>{m.name}</p>
                      <p style={{margin:0,fontSize:9.5,color:'var(--t3)',lineHeight:1.3}}>{m.desc}</p>
                    </div>
                    {active&&<i className="fa-solid fa-check" style={{fontSize:8,color:clr,flexShrink:0}}></i>}
                  </button>
                );
              })}
            </div>,
            document.body
          )}
        </div>

        {/* ── SEND / STOP ── */}
        {(typing||typewriterMsgId)
          ?<button onClick={stopGen}
              style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:10,
                border:'none',background:'#DC2626',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background='#EF4444'}
              onMouseLeave={e=>e.currentTarget.style.background='#DC2626'}>
              <i className="fa-solid fa-stop" style={{fontSize:10}}></i> Stop
            </button>
          :<button onClick={()=>send()} disabled={!input.trim()&&!file}
              style={{width:34,height:34,borderRadius:10,border:'none',
                background:(!input.trim()&&!file)?'var(--bg3)':'#2563EB',
                color:(!input.trim()&&!file)?'var(--t3)':'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:(!input.trim()&&!file)?'default':'pointer',flexShrink:0,
                boxShadow:(!input.trim()&&!file)?'none':'0 4px 14px rgba(37,99,235,.35)',transition:'all .15s'}}>
              <i className="fa-solid fa-arrow-up" style={{fontSize:13}}></i>
            </button>
        }
      </div>
    );
  };

  /* ── SUB COMPONENTS ───────────────────────────────────── */
  const ToggleRow=({label,desc,val,set})=>(
    <div className="flex items-center justify-between py-3 border-b" style={{borderColor:'var(--br)'}}>
      <div><p className="text-sm font-medium" style={{color:'var(--t1)'}}>{label}</p>{desc&&<p className="text-xs mt-0.5" style={{color:'var(--t3)'}}>{desc}</p>}</div>
      <label className="tgl-wrap flex-shrink-0"><input type="checkbox" className="tgl" checked={val} onChange={()=>set(!val)}/><span className="tgl-l"></span></label>
    </div>
  );

  const FileBar=()=>files.length>0&&(
    <div className="px-4 py-2.5 border-b" style={{borderColor:'var(--br)'}}>
      <div className="flex items-center gap-2 flex-wrap">
        {files.map(f=>(
          <div key={f.id} className="flex items-center gap-2 px-2.5 py-1.5 rounded-xl border relative group" style={{background:'var(--bg3)',borderColor:f.content?'rgba(99,102,241,.4)':'var(--brh)',maxWidth:200}}>
            {f.preview
              ?<img src={f.preview} className="w-7 h-7 object-cover rounded-lg flex-shrink-0" alt=""/>
              :<div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:f.content?'rgba(99,102,241,.2)':'rgba(59,130,246,.15)'}}>
                <i className={`fa-solid ${f.type==='application/pdf'?'fa-file-pdf':f.name.endsWith('.py')?'fa-file-code':f.name.endsWith('.json')?'fa-brackets-curly':f.name.match(/\.(js|ts|jsx|tsx)$/)?'fa-js':f.name.endsWith('.html')?'fa-html5':'fa-file-lines'} text-xs`} style={{color:f.content?'#818cf8':'#60A5FA'}}></i>
              </div>
            }
            <div className="min-w-0 flex-1">
              <p className="text-[10px] font-medium truncate" style={{color:'var(--t1)'}}>{f.name}</p>
              <p className="text-[9px] flex items-center gap-1" style={{color:'var(--t3)'}}>
                {(f.size/1024).toFixed(1)}KB
                {f.content && <span style={{color:'#818cf8',fontWeight:600}}>&middot; &#10003; readable</span>}
                {f.fileType==='image' && <span style={{color:'#34d399',fontWeight:600}}>&middot; image</span>}
              </p>
            </div>
            {f.content && (
              <div className="absolute bottom-full left-0 mb-2 w-64 p-3 rounded-xl border shadow-2xl z-50 hidden group-hover:block" style={{background:'var(--bg2)',borderColor:'var(--brh)'}}>
                <p className="text-[9px] font-bold mb-1.5" style={{color:'#818cf8'}}>Content Preview</p>
                <p className="text-[9px] font-mono" style={{color:'var(--t2)',whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:'80px',overflow:'hidden'}}>{f.content.slice(0,200)}{f.content.length>200?'...':''}</p>
                <p className="text-[9px] mt-1.5" style={{color:'var(--t3)'}}>{f.content.length.toLocaleString()} chars &middot; AI will analyze this</p>
              </div>
            )}
            <button onClick={()=>{setFiles(p=>p.filter(x=>x.id!==f.id));if(files.length===1){setFile(null);setFilePreview(null);}}} className="w-4 h-4 flex items-center justify-center rounded-full flex-shrink-0 hover:text-red-400 transition-colors" style={{color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}>
              <i className="fa-solid fa-xmark" style={{fontSize:9}}></i>
            </button>
          </div>
        ))}
        {files.length<5&&<button onClick={pickFile} className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border border-dashed text-xs transition-all hover:border-blue-500 hover:text-blue-400" style={{borderColor:'var(--brh)',color:'var(--t3)'}}>
          <i className="fa-solid fa-plus text-xs"></i>Add
        </button>}
      </div>
      <p className="text-[9px] mt-1.5 flex items-center gap-2" style={{color:'var(--t3)'}}>
        {files.length}/5 files
        {files.some(f=>f.content) && <span style={{color:'#818cf8'}}>&middot; {files.filter(f=>f.content).length} file(s) will be analyzed by AI</span>}
        &nbsp;&middot;&nbsp;<button onClick={()=>{setFiles([]);setFile(null);setFilePreview(null);}} style={{color:'#f87171',background:'none',border:'none',cursor:'pointer',fontSize:9}}>Clear all</button>
      </p>
    </div>
  );

  const VoiceBar=()=>voiceOn&&(
    <div className="flex items-center gap-3 px-4 py-2 border-b" style={{borderColor:'rgba(248,113,113,.3)',background:'rgba(248,113,113,.06)'}}>
      <div className="w-2 h-2 rounded-full bg-red-400" style={{animation:'pulse 1s infinite'}}></div>
      <div className="voice-wave flex-shrink-0"><span/><span/><span/><span/><span/></div>
      <span className="text-xs font-medium" style={{color:'#F87171'}}>Recording… speak now</span>
      <button onClick={toggleVoice} className="ml-auto text-xs px-2 py-0.5 rounded-lg border transition-all hover:bg-red-500 hover:text-white" style={{borderColor:'rgba(248,113,113,.4)',color:'#F87171'}}>Stop</button>
    </div>
  );

  const ChatItem=({session,folderId=null})=>{
    const isPinned=pinned.includes(session.id),isActive=sid===session.id,isRenaming=renamingId===session.id;
    return(
      <div onClick={e=>{if(e.ctrlKey||e.metaKey){window.open('?sid='+session.id,'_blank');return;}setSid(session.id);if(window.innerWidth<=768)setSidebarOpen(false);}} className={`ci w-full px-3 py-2 rounded-xl flex items-center justify-between cursor-pointer ${isActive?'active-chat text-blue-400':'hover:text-slate-200'}`} style={{color:isActive?'':'var(--t2)',background:isActive?'rgba(59,130,246,.1)':'transparent',borderLeft:isActive?'2px solid #3b82f6':'2px solid transparent'}}>
        <div className="flex items-center gap-2 min-w-0 flex-1 overflow-hidden">
          {isPinned&&<span className="pd flex-shrink-0"></span>}
          {typingSid===session.id
            ?<span className="tw-cursor flex-shrink-0" style={{marginLeft:2}}/>
            :<i className="fa-regular fa-message opacity-40 text-xs flex-shrink-0"></i>}
          {isRenaming
            ?<input autoFocus value={renameVal} onChange={e=>setRenameVal(e.target.value)} onBlur={()=>commitRename(session.id)} onKeyDown={e=>{if(e.key==='Enter')commitRename(session.id);if(e.key==='Escape')setRenamingId(null);}} onClick={e=>e.stopPropagation()} className="rounded-lg px-2 py-0.5 text-xs text-white outline-none w-full border border-blue-500" style={{background:'var(--bg3)'}}/>
            :<div className="min-w-0 flex-1">
              <span className="truncate text-xs block">{session.title}</span>
              {session.tags&&session.tags.length>0&&(
                <div className="flex gap-1 mt-0.5 flex-wrap">
                  {session.tags.slice(0,3).map(tid=>{
                    const t=PRESET_TAGS.find(x=>x.id===tid);
                    return t?<span key={tid} className="text-[8px] px-1.5 py-0.5 rounded-full font-bold" style={{background:t.color+'20',color:t.color}}>{t.label}</span>:null;
                  })}
                </div>
              )}
            </div>}
        </div>
        <div className="ca flex items-center gap-0.5 ml-1 flex-shrink-0">
          <button onClick={e=>togglePin(e,session.id)} className={`p-1 rounded transition-all ${isPinned?'text-amber-400':'hover:text-amber-400'}`} style={!isPinned?{color:'var(--t3)'}:{}} title={isPinned?'Unpin':'Pin'}><i className="fa-solid fa-thumbtack text-[10px]"></i></button>
          <button onClick={e=>startRename(e,session)} className="p-1 rounded transition-all hover:text-slate-300" style={{color:'var(--t3)'}} title="Rename"><i className="fa-solid fa-pen text-[10px]"></i></button>
          <button onClick={e=>{e.stopPropagation();setTagTargetId(session.id);setShowTagModal(true);}} className="p-1 rounded transition-all hover:text-indigo-400" style={{color:(session.tags?.length>0)?'#818cf8':'var(--t3)'}} title="Tags"><i className="fa-solid fa-tag text-[10px]"></i></button>
          {folderId&&<button onClick={e=>removeFromFolder(e,folderId,session.id)} className="p-1 rounded transition-all hover:text-orange-400" style={{color:'var(--t3)'}} title="Remove from folder"><i className="fa-solid fa-folder-minus text-[10px]"></i></button>}
          <button onClick={e=>deleteChat(e,session.id)} className="p-1 rounded transition-all hover:text-red-400" style={{color:'var(--t3)'}} title="Delete"><i className="fa-solid fa-trash text-[10px]"></i></button>
        </div>
      </div>
    );
  };

  const [showFoldersPanel,setShowFoldersPanel]=useState(true);
  const FolderSection=()=>(
    <div>
      <div className="flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer transition-all" style={{color:'var(--t2)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} onClick={()=>setShowFoldersPanel(s=>!s)}>
        <i className={`fa-solid ${showFoldersPanel?'fa-folder-open':'fa-folder'} text-xs text-amber-400`}></i>
        <span className="flex-1 text-xs font-semibold" style={{color:'var(--t1)'}}>Folders</span>
        <span className="text-[10px] px-1.5 py-0.5 rounded-full" style={{background:'var(--bg3)',color:'var(--t3)'}}>{folders.length}</span>
        <button onClick={e=>{e.stopPropagation();setShowFolderModal(true);}} className="p-1 rounded transition-all hover:text-blue-400" style={{color:'var(--t3)'}} title="New folder"><i className="fa-solid fa-plus text-[10px]"></i></button>
        <i className={`fa-solid fa-chevron-right text-[10px] transition-transform ${showFoldersPanel?'rotate-90':''}`} style={{color:'var(--t3)'}}></i>
      </div>
      {showFoldersPanel&&(
        <div className="mt-1 ml-2 space-y-1">
          {folders.length===0&&<p className="text-[11px] px-3 py-2" style={{color:'var(--t3)'}}>No folders yet.</p>}
          {folders.map(folder=>{
            const folderSessions=sessions.filter(s=>folder.sessionIds.includes(s.id));
            const isExpanded=folderExpand[folder.id];
            return(
              <div key={folder.id} className="rounded-xl overflow-hidden border" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
                <div className="flex items-center gap-2 px-3 py-2 cursor-pointer transition-all" onClick={()=>setFolderExpand(e=>({...e,[folder.id]:!e[folder.id]}))} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background:folder.color}}></div>
                  <i className={`fa-solid ${isExpanded?'fa-folder-open':'fa-folder'} text-[11px]`} style={{color:folder.color}}></i>
                  <span className="flex-1 text-xs font-medium truncate" style={{color:'var(--t1)'}}>{folder.name}</span>
                  <span className="text-[10px]" style={{color:'var(--t3)'}}>{folderSessions.length}</span>
                  <button onClick={e=>{e.stopPropagation();newChat(folder.id);}} className="p-1 rounded hover:text-blue-400 transition-all" style={{color:'var(--t3)'}} title="New chat"><i className="fa-solid fa-plus text-[10px]"></i></button>
                  <button onClick={e=>deleteFolder(e,folder.id)} className="p-1 rounded hover:text-red-400 transition-all" style={{color:'var(--t3)'}} title="Delete"><i className="fa-solid fa-trash text-[10px]"></i></button>
                  <i className={`fa-solid fa-chevron-right text-[10px] transition-transform ${isExpanded?'rotate-90':''}`} style={{color:'var(--t3)'}}></i>
                </div>
                {isExpanded&&(
                  <div className="border-t px-2 py-2 space-y-1" style={{borderColor:'var(--br)'}}>
                    <select onChange={e=>{if(e.target.value){addSessionToFolder(folder.id,e.target.value);e.target.value='';}}} className="w-full text-[11px] rounded-lg px-2 py-1.5 border outline-none mb-1" style={{background:'var(--bg2)',borderColor:'var(--br)',color:'var(--t2)'}}>
                      <option value="">＋ Add existing chat…</option>
                      {sessions.filter(s=>!folder.sessionIds.includes(s.id)).map(s=><option key={s.id} value={s.id}>{s.title?.slice(0,30)}</option>)}
                    </select>
                    {folderSessions.length===0
                      ?<p className="text-[11px] text-center py-2" style={{color:'var(--t3)'}}>Empty folder</p>
                      :folderSessions.map(s=><ChatItem key={s.id} session={s} folderId={folder.id}/>)
                    }
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  const suggestions=[{i:'fa-regular fa-image',t:'Create an image'},{i:'fa-solid fa-code',t:'Write me code'},{i:'fa-solid fa-pen-nib',t:'Write anything'},{i:'fa-solid fa-globe',t:'Search the web'},{i:'fa-regular fa-compass',t:'Teach me something'}];

  return(
    <div className="flex" style={{height:'100dvh',width:'100vw',maxWidth:'100%',background:'var(--bg)',fontFamily:"'DM Sans',sans-serif",position:'relative'}}>
      <input type="file" ref={fileRef} onChange={onFile} className="hidden" accept="image/*,.pdf,.txt,.md,.json,.csv,.py,.js,.html,.css,.xml" multiple/>
      <Toast t={toast}/>

      {/* ═══ SPLASH SCREEN ═══ */}
      {!splashDone&&(
        <div className="fixed inset-0 z-[999] flex flex-col items-center justify-center" style={{background:'#0A0D14',animation:'splashFadeOut 0.6s ease 2.4s forwards'}}>

        const allMsgs = sessions.flatMap(s=>
          (s.messages||[]).filter(m=>m.sender==='user' && (!resetTs || ((m.timestamp||m.ts||0)>resetTs)))
        );
        const allText = allMsgs.map(m=>m.text||'').join(' ');
        const stopwords=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','are','was','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','can','i','you','he','she','it','we','they','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','what','which','who','when','where','why','how','all','each','every','some','no','not','only','so','than','too','very','just','if','then','there','here','also','about','more','like','get','dont','use','want','need','make','know','think','tell','give','take','come','see','look','let','say','good','new','first','last','long','great','little','own','right','big','high','different','small','large','next','early','young','important','few','public','bad','same','able','please','write','create','help','using','code','sure','okay','thanks','thank','yes','yeah','nope','hi','hello','hey','koro','kore','kora','korbe','hobe','thakbe','dau','dao','amr','tumi','tomar','amar','ami','apni','apnar','ekta','kono','ache','acche','hoy','hoye','theke']);
        const words = allText.toLowerCase().replace(/[^a-z\u0980-\u09ff\s]/g,' ').split(/\s+/).filter(w=>w.length>3&&!stopwords.has(w)&&!wcIgnored.includes(w));
        const freq={};
        words.forEach(w=>{freq[w]=(freq[w]||0)+1;});
        // Show words used MORE than 2 times (was 50 — too high, nothing showed)
        const MIN_COUNT = 2;
        const all_sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]);
        const sorted = all_sorted.filter(([,c])=>c>MIN_COUNT);
        const top10 = sorted.slice(0,10);
        const maxF = sorted[0]?.[1]||1;
        const palette=['#6366f1','#8b5cf6','#a78bfa','#38bdf8','#34d399','#fb923c','#f472b6','#facc15','#4ade80','#60a5fa'];
        const totalWords = words.length;
        const uniqueWords = Object.keys(freq).length;

        // Timeline — top word per day
        const dayMap={};
        allMsgs.forEach(m=>{
          if(!m.ts&&!m.timestamp) return;
          const day=new Date(m.timestamp||m.ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
          const ws=(m.text||'').toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(w=>w.length>3&&!stopwords.has(w)&&!wcIgnored.includes(w));
          ws.forEach(w=>{if(!dayMap[day])dayMap[day]={};dayMap[day][w]=(dayMap[day][w]||0)+1;});
        });
        const timeline=Object.entries(dayMap).slice(-7).map(([day,wmap])=>{
          const top=Object.entries(wmap).sort((a,b)=>b[1]-a[1])[0];
          return {day,word:top?.[0]||'—',count:top?.[1]||0};
        });

        const handleReset=()=>{
          const now=new Date().toISOString();
          setWcResetDate(now);
          try{localStorage.setItem('omina_wc_reset',now);}catch{}
        };
        const ignoreWord=(w)=>{
          const upd=[...wcIgnored,w];
          setWcIgnored(upd);
          try{localStorage.setItem('omina_wc_ignored',JSON.stringify(upd));}catch{}
        };
        const unignoreWord=(w)=>{
          const upd=wcIgnored.filter(x=>x!==w);
          setWcIgnored(upd);
          try{localStorage.setItem('omina_wc_ignored',JSON.stringify(upd));}catch{}
        };

        const tabs=[
          {id:'cloud',icon:'fa-cloud',label:'Cloud'},
          {id:'chart',icon:'fa-chart-bar',label:'Chart'},
          {id:'timeline',icon:'fa-calendar-days',label:'Timeline'},
          {id:'ignored',icon:'fa-ban',label:'Ignored'},
        ];

        return(
          <div className="fixed inset-0 z-[250] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.82)',backdropFilter:'blur(18px)'}} onClick={()=>setShowWordCloud(false)}>
            <div className="w-full max-w-2xl rounded-2xl border shadow-2xl flex flex-col overflow-hidden" style={{background:'var(--bg2)',borderColor:'rgba(255,255,255,.08)',maxHeight:'90vh'}} onClick={e=>e.stopPropagation()}>

              {/* ── Header ── */}
              <div className="px-5 py-4 flex items-center justify-between flex-shrink-0" style={{borderBottom:'1px solid rgba(255,255,255,.07)',background:'linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.05))'}}>
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',boxShadow:'0 0 20px rgba(99,102,241,.4)'}}>
                    <i className="fa-solid fa-cloud text-white" style={{fontSize:13}}></i>
                  </div>
                  <div>
                    <p className="font-bold text-sm" style={{color:'var(--t1)'}}>Word Cloud</p>
                    <p className="text-[11px]" style={{color:'var(--t3)'}}>
                      Words used 3+ times · {sorted.length} qualifying words
                      {wcResetDate&&<span className="ml-1.5 px-1.5 py-0.5 rounded-full text-[9px]" style={{background:'rgba(99,102,241,.15)',color:'#a78bfa'}}>Reset: {new Date(wcResetDate).toLocaleDateString()}</span>}
                    </p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={handleReset} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-medium border transition-all" style={{borderColor:'rgba(239,68,68,.25)',color:'#f87171',background:'rgba(239,68,68,.06)'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(239,68,68,.14)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(239,68,68,.06)'} title="Reset word tracking from now">
                    <i className="fa-solid fa-rotate-left text-[10px]"></i>Reset
                  </button>
                  <button onClick={()=>setShowWordCloud(false)} className="w-8 h-8 rounded-xl flex items-center justify-center transition-all" style={{color:'var(--t3)'}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.08)';e.currentTarget.style.color='var(--t1)'}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--t3)'}}><i className="fa-solid fa-xmark text-sm"></i></button>
                </div>
              </div>

              {/* ── Stats ── */}
              <div className="grid grid-cols-4 gap-px flex-shrink-0" style={{background:'rgba(255,255,255,.04)'}}>
                {[
                  {label:'Total Words',val:totalWords.toLocaleString(),icon:'fa-align-left',col:'#6366f1'},
                  {label:'Unique',val:uniqueWords.toLocaleString(),icon:'fa-fingerprint',col:'#8b5cf6'},
                  {label:'In Cloud',val:sorted.length,icon:'fa-cloud',col:'#a78bfa'},
                  {label:'Top Word',val:sorted[0]?.[0]||'—',icon:'fa-trophy',col:'#facc15'},
                ].map(s=>(
                  <div key={s.label} className="flex flex-col gap-1 px-4 py-3" style={{background:'var(--bg2)'}}>
                    <div className="flex items-center gap-1.5">
                      <i className={`fa-solid ${s.icon} text-[9px]`} style={{color:s.col}}></i>
                      <span className="text-[10px]" style={{color:'var(--t3)'}}>{s.label}</span>
                    </div>
                    <p className="text-sm font-bold truncate" style={{color:'var(--t1)'}}>{s.val}</p>
                  </div>
                ))}
              </div>

              {/* ── Tabs ── */}
              <div className="flex border-b flex-shrink-0" style={{borderColor:'rgba(255,255,255,.06)'}}>
                {tabs.map(t=>(
                  <button key={t.id} onClick={()=>setWcTab(t.id)} className="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-[11px] font-semibold transition-all" style={{color:wcTab===t.id?'#a78bfa':'var(--t3)',borderBottom:wcTab===t.id?'2px solid #8b5cf6':'2px solid transparent',background:wcTab===t.id?'rgba(99,102,241,.06)':'transparent'}}>
                    <i className={`fa-solid ${t.icon} text-[10px]`}></i>{t.label}
                    {t.id==='ignored'&&wcIgnored.length>0&&<span className="text-[9px] px-1.5 py-0.5 rounded-full font-bold" style={{background:'rgba(239,68,68,.15)',color:'#f87171'}}>{wcIgnored.length}</span>}
                  </button>
                ))}
              </div>

              {/* ── Content ── */}
              <div className="overflow-y-auto sb flex-1" style={{minHeight:0}}>
                {sorted.length===0&&wcTab!=='ignored'?(
                  <div className="flex flex-col items-center justify-center py-16 gap-3" style={{color:'var(--t3)'}}>
                    <div className="w-14 h-14 rounded-2xl flex items-center justify-center" style={{background:'rgba(99,102,241,.1)'}}><i className="fa-solid fa-cloud text-2xl" style={{color:'rgba(99,102,241,.3)'}}></i></div>
                    <p className="text-sm font-medium" style={{color:'var(--t2)'}}>No words used 50+ times yet</p>
                    <p className="text-xs text-center px-8" style={{color:'var(--t3)'}}>Keep chatting! Words will appear here once you've used them more than 50 times.</p>
                  </div>
                ):(
                  <div className="p-5">

                    {/* ── CLOUD TAB ── */}
                    {wcTab==='cloud'&&(
                      <div className="rounded-2xl p-5 flex flex-wrap gap-2 justify-center items-center" style={{background:'linear-gradient(135deg,rgba(99,102,241,.06),rgba(139,92,246,.03))',border:'1px solid rgba(255,255,255,.05)',minHeight:180}}>
                        {sorted.map(([word,count],i)=>{
                          const ratio=count/maxF;
                          const size=12+Math.round(ratio*26);
                          const col=palette[i%palette.length];
                          const weight=ratio>0.5?700:ratio>0.25?600:500;
                          const opacity=0.5+ratio*0.5;
                          return(
                            <span key={word}
                              title={`"${word}" — used ${count} times`}
                              className="cursor-pointer inline-block select-none"
                              style={{fontSize:size,color:col,fontWeight:weight,opacity,lineHeight:1.3,transition:'transform .15s,opacity .15s'}}
                              onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.18)';e.currentTarget.style.opacity='1';}}
                              onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.opacity=String(opacity);}}

                            >{word}</span>
                          );
                        })}
                        <p className="w-full text-center text-[10px] mt-3" style={{color:'var(--t3)'}}>Double-click a word to ignore it</p>
                      </div>
                    )}

                    {/* ── CHART TAB ── */}
                    {wcTab==='chart'&&(
                      <div className="space-y-2.5">
                        <p className="text-[11px] font-bold uppercase tracking-widest mb-3 flex items-center gap-2" style={{color:'var(--t3)'}}>
                          <i className="fa-solid fa-chart-bar text-[10px]"></i>Top Words (50+ uses)
                        </p>
                        {sorted.slice(0,15).map(([word,count],i)=>{
                          const col=palette[i%palette.length];
                          const pct=(count/maxF*100).toFixed(1);
                          return(
                            <div key={word} className="flex items-center gap-3 group">
                              <span className="text-[10px] font-mono w-5 text-right flex-shrink-0" style={{color:'var(--t3)'}}>{i+1}</span>
                              <span className="text-xs font-semibold w-24 truncate flex-shrink-0" style={{color:col}}>{word}</span>
                              <div className="flex-1 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,.06)',height:6}}>
                                <div className="h-full rounded-full" style={{width:pct+'%',background:`linear-gradient(90deg,${col},${palette[(i+1)%palette.length]})`,boxShadow:`0 0 8px ${col}44`,transition:'width .4s ease'}}/>
                              </div>
                              <span className="text-[10px] font-bold w-10 text-right flex-shrink-0" style={{color:col}}>{count}x</span>
                              <button onClick={()=>ignoreWord(word)} className="opacity-0 group-hover:opacity-100 transition-opacity p-1 rounded" style={{color:'var(--t3)'}} title="Ignore word"><i className="fa-solid fa-ban text-[9px]"></i></button>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* ── TIMELINE TAB ── */}
                    {wcTab==='timeline'&&(
                      <div>
                        <p className="text-[11px] font-bold uppercase tracking-widest mb-4 flex items-center gap-2" style={{color:'var(--t3)'}}>
                          <i className="fa-solid fa-calendar-days text-[10px]"></i>Top Word Per Day (last 7 days)
                        </p>
                        {timeline.length===0?(
                          <p className="text-xs text-center py-8" style={{color:'var(--t3)'}}>No data yet — messages need timestamps</p>
                        ):(
                          <div className="space-y-3">
                            {timeline.map(({day,word,count},i)=>{
                              const col=palette[i%palette.length];
                              return(
                                <div key={day} className="flex items-center gap-4 p-3 rounded-xl" style={{background:'var(--bg3)',border:'1px solid rgba(255,255,255,.04)'}}>
                                  <div className="text-[11px] font-bold w-16 flex-shrink-0" style={{color:'var(--t3)'}}>{day}</div>
                                  <div className="w-1.5 h-8 rounded-full flex-shrink-0" style={{background:`linear-gradient(180deg,${col},${palette[(i+1)%palette.length]})`}}/>
                                  <div className="flex-1">
                                    <p className="text-sm font-bold" style={{color:col}}>{word}</p>
                                    <p className="text-[10px]" style={{color:'var(--t3)'}}>{count} uses this day</p>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}

                    {/* ── IGNORED TAB ── */}
                    {wcTab==='ignored'&&(
                      <div>
                        <p className="text-[11px] font-bold uppercase tracking-widest mb-4 flex items-center gap-2" style={{color:'var(--t3)'}}>
                          <i className="fa-solid fa-ban text-[10px]"></i>Ignored Words
                        </p>
                        {wcIgnored.length===0?(
                          <p className="text-xs text-center py-8" style={{color:'var(--t3)'}}>No ignored words yet. Double-click any word in Cloud view to ignore it.</p>
                        ):(
                          <div className="flex flex-wrap gap-2">
                            {wcIgnored.map(w=>(
                              <div key={w} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl border" style={{background:'rgba(239,68,68,.06)',borderColor:'rgba(239,68,68,.2)'}}>
                                <span className="text-xs font-medium" style={{color:'#f87171'}}>{w}</span>
                                <button onClick={()=>unignoreWord(w)} className="text-[9px] transition-all hover:text-white" style={{color:'rgba(248,113,113,.6)'}} title="Restore word"><i className="fa-solid fa-xmark"></i></button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}
      {/* ═══ MODEL COMPARISON ═══ */}
      {showModelComp&&(
        <div className="fixed inset-0 z-[250] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)'}} onClick={()=>setShowModelComp(false)}>
          <div className="w-full max-w-4xl rounded-2xl border shadow-2xl overflow-hidden flex flex-col" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
            <div className="px-5 py-4 border-b flex items-center justify-between flex-shrink-0" style={{borderColor:'var(--br)',background:'linear-gradient(135deg,rgba(5,150,105,.08),rgba(6,182,212,.04))'}}>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:'linear-gradient(135deg,#059669,#0891B2)',boxShadow:'0 0 18px rgba(5,150,105,.4)'}}>
                  <i className="fa-solid fa-code-compare text-white text-sm"></i>
                </div>
                <div><p className="font-bold" style={{color:'var(--t1)'}}>Model Comparison</p><p className="text-[11px]" style={{color:'var(--t3)'}}>Compare responses from different AI models side by side</p></div>
              </div>
              <button onClick={()=>setShowModelComp(false)} className="w-8 h-8 rounded-xl flex items-center justify-center" style={{color:'var(--t2)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="p-4 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
              {/* Run count indicator */}
              <div className="flex items-center justify-between mb-2.5">
                <div className="flex items-center gap-1.5">
                  {[...Array(MAX_COMP_RUNS)].map((_,i)=>(
                    <div key={i} className="w-6 h-1.5 rounded-full transition-all" style={{background:i<compRunCount?'linear-gradient(90deg,#059669,#0891B2)':'var(--bg3)',border:'1px solid',borderColor:i<compRunCount?'transparent':'var(--br)'}}/>
                  ))}
                  <span className="text-[10px] ml-1 font-medium" style={{color:compRunCount>=MAX_COMP_RUNS?'#f87171':'var(--t3)'}}>{compRunCount}/{MAX_COMP_RUNS} runs used</span>
                </div>
                {compRunCount>=MAX_COMP_RUNS&&(
                  <span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(239,68,68,.12)',color:'#f87171',border:'1px solid rgba(239,68,68,.2)'}}>Limit reached</span>
                )}
              </div>
              <div className="flex gap-2">
                <input value={compPrompt} onChange={e=>setCompPrompt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&!Object.values(compLoading).some(Boolean)&&compRunCount<MAX_COMP_RUNS&&runModelComp(compPrompt)} placeholder="Enter a prompt to compare across all models..." className="flex-1 px-4 py-3 rounded-xl text-sm outline-none border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}} disabled={compRunCount>=MAX_COMP_RUNS}/>
                {Object.values(compLoading).some(Boolean)?(
                  <button onClick={stopModelComp} className="px-5 py-3 rounded-xl text-sm font-bold text-white transition-all flex items-center gap-2" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',minWidth:90,boxShadow:'0 0 16px rgba(220,38,38,.35)'}}>
                    <i className="fa-solid fa-stop text-xs"></i>Stop
                  </button>
                ):(
                  <button onClick={()=>runModelComp(compPrompt)} disabled={!compPrompt.trim()||compRunCount>=MAX_COMP_RUNS} className="px-5 py-3 rounded-xl text-sm font-bold text-white disabled:opacity-40 transition-all flex items-center gap-2" style={{background:'linear-gradient(135deg,#059669,#0891B2)',minWidth:90}}>
                    <i className="fa-solid fa-play text-xs"></i>Run
                  </button>
                )}
              </div>
              {compStopped&&<p className="text-[11px] mt-2 flex items-center gap-1.5" style={{color:'#fb923c'}}><i className="fa-solid fa-circle-stop text-[10px]"></i>Stopped — this run was not counted.</p>}
              <div className="flex gap-2 mt-2 flex-wrap">
                {['What is machine learning?','Write a haiku about coding','Explain recursion simply','5 productivity tips'].map(s=>(
                  <button key={s} onClick={()=>setCompPrompt(s)} disabled={compRunCount>=MAX_COMP_RUNS} className="text-[10px] px-2.5 py-1 rounded-lg border transition-all disabled:opacity-30" style={{borderColor:'var(--br)',color:'var(--t3)',background:'var(--bg3)'}} onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(5,150,105,.4)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}>{s}</button>
                ))}
              </div>
            </div>
            <div className="flex-1 overflow-y-auto sb p-4">
              {Object.keys(compResults).length===0&&!Object.values(compLoading).some(Boolean)&&(
                <div className="text-center py-16" style={{color:'var(--t3)'}}>
                  <div className="text-5xl mb-4">🧪</div>
                  <p className="text-sm font-medium" style={{color:'var(--t2)'}}>Enter a prompt above to compare models</p>
                  <p className="text-xs mt-1">All models will respond to the same prompt simultaneously</p>
                </div>
              )}
              {(Object.keys(compResults).length>0||Object.values(compLoading).some(Boolean))&&(
                <div className="grid gap-3" style={{gridTemplateColumns:`repeat(${Math.min(MODELS.length,3)},1fr)`}}>
                  {MODELS.slice(0,3).map(m=>{
                    const loading=compLoading[m.id];const result=compResults[m.id];
                    return(
                      <div key={m.id} className="rounded-2xl border overflow-hidden" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
                        <div className="px-3 py-2.5 border-b flex items-center gap-2" style={{borderColor:'var(--br)',background:'var(--bg)'}}>
                          <i className={`fa-solid ${m.icon} text-xs ${m.color}`}></i>
                          <span className="text-xs font-bold flex-1" style={{color:'var(--t1)'}}>{m.name}</span>
                          {loading&&<i className="fa-solid fa-spinner fa-spin text-xs" style={{color:'var(--t3)'}}></i>}
                          {result&&!loading&&<i className="fa-solid fa-check text-[10px] text-emerald-400"></i>}
                        </div>
                        <div className="p-3 text-xs leading-relaxed" style={{color:'var(--t2)',minHeight:120}}>
                          {loading&&<div className="space-y-2">{[80,60,90,50].map((w,i)=><div key={i} className="h-2 rounded-full animate-pulse" style={{width:w+'%',background:'var(--bg2)'}}/>)}</div>}

                        {result&&<div className="px-3 py-2 border-t flex items-center justify-between" style={{borderColor:'var(--br)'}}>

                        </div>}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
      {showImgGen&&<ImageGenModal onClose={()=>{setShowImgGen(false);setImgGenPrompt('');}} onGenerate={handleImgGen} history={imgGenHistory} setHistory={setImgGenHistory} initialPrompt={imgGenPrompt}/>}
      {showShare&&<ShareModal session={curSession} onClose={()=>setShowShare(false)}/>}
      {showTodo&&<TodoModal todos={todos} setTodos={setTodos} onClose={()=>setShowTodo(false)}/>}
      {showSticky&&<StickyModal notes={stickyNotes} setNotes={setStickyNotes} onClose={()=>setShowSticky(false)}/>}
      {showAIAgent&&<AIAgentModal onClose={()=>setShowAIAgent(false)} sysPrompt={sysPrompt} language={language}/>}

      {/* ── MESSAGE SEARCH MODAL ── */}
      {showMsgSearch&&(
        <div className="fixed inset-0 z-[150] flex items-start justify-center pt-12 px-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.80)'}} onClick={()=>setShowMsgSearch(false)}>
          <div className="w-full max-w-2xl mi rounded-2xl border shadow-2xl overflow-hidden flex flex-col" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'82vh'}} onClick={e=>e.stopPropagation()}>

            {/* ── Search Bar ── */}
            <div className="flex items-center gap-2 px-4 py-3 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
              <i className="fa-solid fa-magnifying-glass text-sm flex-shrink-0" style={{color:'var(--t3)'}}></i>
              <input autoFocus value={msgSearchQ} onChange={e=>setMsgSearchQ(e.target.value)} placeholder={searchMode==='regex'?'Enter regex pattern… e.g. \\bpython\\b':searchMode==='semantic'?'Semantic search — describe what you need…':'Search all messages…'} className="flex-1 bg-transparent text-sm outline-none" style={{color:'var(--t1)'}}/>
              {msgSearchQ&&<span className="text-[10px] px-2 py-0.5 rounded-full font-bold flex-shrink-0" style={{background:'var(--bg3)',color:'var(--t3)'}}>{searchTab==='images'?imgSearchResults.length:searchTab==='related'?relatedChats.length:msgSearchResults.length}</span>}
              <span className="kbd flex-shrink-0">ESC</span>
            </div>

            {/* ── Mode Selector + Tabs ── */}
            <div className="flex items-center justify-between px-4 py-2 border-b flex-shrink-0" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
              {/* Search modes */}
              <div className="flex items-center gap-1">
                {[['normal','fa-magnifying-glass','Normal'],['semantic','fa-brain','Semantic'],['regex','fa-code','Regex']].map(([m,ic,lb])=>(
                  <button key={m} onClick={()=>setSearchMode(m)} className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[10px] font-bold transition-all" style={{background:searchMode===m?'rgba(99,102,241,.2)':'transparent',color:searchMode===m?'#818cf8':'var(--t3)',border:`1px solid ${searchMode===m?'rgba(99,102,241,.4)':'transparent'}`}}>
                    <i className={`fa-solid ${ic} text-[9px]`}></i>{lb}
                  </button>
                ))}
              </div>
              {/* Result tabs */}
              <div className="flex items-center gap-1">
                {[['results','fa-list','Results'],['images','fa-image','Images'],['related','fa-diagram-project','Related']].map(([t,ic,lb])=>(
                  <button key={t} onClick={()=>setSearchTab(t)} className="flex items-center gap-1 px-2.5 py-1 rounded-lg text-[10px] font-bold transition-all" style={{background:searchTab===t?'rgba(6,182,212,.15)':'transparent',color:searchTab===t?'#06B6D4':'var(--t3)'}}>
                    <i className={`fa-solid ${ic} text-[9px]`}></i>{lb}

            </div>

            <div className="flex items-center gap-2 px-4 py-2 border-b flex-shrink-0 overflow-x-auto" style={{borderColor:'var(--br)'}}>

              <select value={searchFilter.sender} onChange={e=>setSearchFilter(p=>({...p,sender:e.target.value}))} className="text-[10px] px-2 py-1 rounded-lg border outline-none flex-shrink-0" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}}>

                <option value="bot">AI replies</option>

              {/* Session filter */}
              <select value={searchFilter.session} onChange={e=>setSearchFilter(p=>({...p,session:e.target.value}))} className="text-[10px] px-2 py-1 rounded-lg border outline-none flex-shrink-0 max-w-[130px]" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}}>

              <input type="date" value={searchFilter.dateFrom} onChange={e=>setSearchFilter(p=>({...p,dateFrom:e.target.value}))} className="text-[10px] px-2 py-1 rounded-lg border outline-none flex-shrink-0" style={{background:'var(--bg3)',borderColor:'var(--br)',color:searchFilter.dateFrom?'var(--t1)':'var(--t3)'}} title="From date"/>
              {/* Date to */}
              <input type="date" value={searchFilter.dateTo} onChange={e=>setSearchFilter(p=>({...p,dateTo:e.target.value}))} className="text-[10px] px-2 py-1 rounded-lg border outline-none flex-shrink-0" style={{background:'var(--bg3)',borderColor:'var(--br)',color:searchFilter.dateTo?'var(--t1)':'var(--t3)'}} title="To date"/>
              {/* Has image toggle */}
              <button onClick={()=>setSearchFilter(p=>({...p,hasImage:!p.hasImage}))} className="flex items-center gap-1 px-2 py-1 rounded-lg text-[10px] font-bold border flex-shrink-0 transition-all" style={{borderColor:searchFilter.hasImage?'rgba(245,158,11,.5)':'var(--br)',background:searchFilter.hasImage?'rgba(245,158,11,.12)':'transparent',color:searchFilter.hasImage?'#F59E0B':'var(--t3)'}}>
                <i className="fa-solid fa-image text-[9px]"></i>Has image
              </button>
              {/* Min length */}
              <select value={searchFilter.minLen} onChange={e=>setSearchFilter(p=>({...p,minLen:+e.target.value}))} className="text-[10px] px-2 py-1 rounded-lg border outline-none flex-shrink-0" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}}>
                <option value="0">Any length</option>
                <option value="50">Min 50 chars</option>
                <option value="200">Min 200 chars</option>
                <option value="500">Min 500 chars</option>
              </select>
              {/* Clear filters */}
              {(searchFilter.sender!=='all'||searchFilter.session!=='all'||searchFilter.hasImage||searchFilter.dateFrom||searchFilter.dateTo||searchFilter.minLen>0)&&(

                  <i className="fa-solid fa-xmark text-[9px] mr-1"></i>Clear
                </button>
              )}

            {/* ── Results ── */}
            <div className="flex-1 overflow-y-auto sb">

              {/* Regex error hint */}
              {searchMode==='regex'&&msgSearchQ&&msgSearchResults[0]?.regexErr&&(

                  <i className="fa-solid fa-triangle-exclamation mr-1.5"></i>Invalid regex pattern

              {/* RESULTS TAB */}
              {searchTab==='results'&&(()=>{
                if(!msgSearchQ.trim()) return(

                    <p className="text-xs">Normal · Semantic · Regex modes + filters</p>

                      <span><span className="font-bold" style={{color:'#818cf8'}}>Semantic:</span> "messages about python errors"</span>
                      <span><span className="font-bold" style={{color:'#10B981'}}>Regex:</span> \bimport\s+\w+</span>
                    </div>
                  </div>
                );
                if(msgSearchResults.length===0) return(
                  <div className="flex flex-col items-center justify-center py-14 gap-2" style={{color:'var(--t3)'}}>
                    <i className="fa-solid fa-inbox text-3xl mb-1" style={{color:'rgba(99,102,241,.2)'}}></i>
                    <p className="text-sm" style={{color:'var(--t2)'}}>No results found</p>
                    <p className="text-xs">Try different keywords or switch to Semantic mode</p>
                  </div>
                );
                return msgSearchResults.map((m,i)=>{
                  // highlight
                  let hi=m.preview||'';
                  if(searchMode==='normal'&&msgSearchQ){
                    hi=hi.replace(new RegExp(`(${msgSearchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(245,158,11,.35);color:#FCD34D;padding:0 2px;border-radius:3px">$1</mark>');
                  } else if(searchMode==='semantic'){
                    const words=msgSearchQ.split(/\s+/).filter(w=>w.length>2);
                    words.forEach(w=>{hi=hi.replace(new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(16,185,129,.25);color:#6EE7B7;padding:0 2px;border-radius:3px">$1</mark>');});
                  } else if(searchMode==='regex'){
                    try{hi=hi.replace(new RegExp(`(${msgSearchQ})`,'gi'),'<mark style="background:rgba(139,92,246,.3);color:#C4B5FD;padding:0 2px;border-radius:3px">$1</mark>');}catch(e){}

                  const modeColor={normal:'#818cf8',semantic:'#10B981',regex:'#8B5CF6'}[searchMode];
                  return(
                    <button key={i} onClick={()=>{setSid(m.sessionId);setShowMsgSearch(false);setMsgSearchQ('');}}

                        <span className="text-[10px] font-bold" style={{color:m.sender==='user'?'#60A5FA':'#A78BFA'}}>{m.sender==='user'?'You':'Omina AI'}</span>

                      </div>
                      <p className="text-xs leading-relaxed" style={{color:'var(--t2)'}} dangerouslySetInnerHTML={{__html:'…'+hi+'…'}}/>
                    </button>

                });
              })()}

              {/* IMAGES TAB */}
              {searchTab==='images'&&(()=>{
