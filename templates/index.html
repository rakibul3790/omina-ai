                    <p className="text-sm font-medium" style={{color:'var(--t2)'}}>No images found</p>
                    <p className="text-xs">Images shared in chats will appear here</p>
                  </div>
                );
                return(
                  <div className="p-4">
                    <p className="text-[10px] font-bold uppercase tracking-widest mb-3" style={{color:'var(--t3)'}}>{imgSearchResults.length} image{imgSearchResults.length!==1?'s':''} found</p>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
                      {imgSearchResults.map((m,i)=>(
                        <button key={i} onClick={()=>{setSid(m.sessionId);setShowMsgSearch(false);setMsgSearchQ('');}} className="relative group rounded-xl overflow-hidden border transition-all" style={{borderColor:'var(--br)',aspectRatio:'1',background:'var(--bg3)'}} onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(245,158,11,.5)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}>
                          <img src={m.fp} alt="" className="w-full h-full object-cover"/>
                          <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-2" style={{background:'linear-gradient(to top,rgba(0,0,0,.8),transparent)'}}>
                            <p className="text-[9px] font-semibold text-white truncate">{m.sessionTitle}</p>
                            {m.fn&&<p className="text-[8px] text-slate-300 truncate">{m.fn}</p>}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })()}

              {/* RELATED CHATS TAB */}
              {searchTab==='related'&&(()=>{
                if(!msgSearchQ.trim()) return(
                  <div className="flex flex-col items-center justify-center py-14 gap-2" style={{color:'var(--t3)'}}>
                    <i className="fa-solid fa-diagram-project text-3xl mb-1" style={{color:'rgba(139,92,246,.3)'}}></i>
                    <p className="text-sm font-medium" style={{color:'var(--t2)'}}>Find related chats</p>
                    <p className="text-xs">Type a query to find similar past conversations</p>
                  </div>
                );
                if(relatedChats.length===0) return(
                  <div className="flex flex-col items-center justify-center py-14 gap-2" style={{color:'var(--t3)'}}>
                    <i className="fa-solid fa-circle-xmark text-3xl mb-1" style={{color:'rgba(139,92,246,.2)'}}></i>
                    <p className="text-sm" style={{color:'var(--t2)'}}>No related chats found</p>
                    <p className="text-xs">Try broader or different keywords</p>
                  </div>
                );
                return(
                  <div className="p-3 space-y-2">
                    <p className="text-[10px] font-bold uppercase tracking-widest px-1 mb-2" style={{color:'var(--t3)'}}>Chats related to "{msgSearchQ.slice(0,30)}"</p>
                    {relatedChats.map((s,i)=>(
                      <button key={s.id} onClick={()=>{setSid(s.id);setShowMsgSearch(false);setMsgSearchQ('');}} className="w-full text-left px-4 py-3 rounded-xl border transition-all flex items-start gap-3" style={{borderColor:'var(--br)',background:'var(--bg3)'}} onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(139,92,246,.4)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}>
                        <div className="flex-shrink-0 mt-0.5">
                          <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:`rgba(139,92,246,${0.08+i*0.03})`,border:'1px solid rgba(139,92,246,.2)'}}>
                            <span className="text-xs font-bold" style={{color:'#a78bfa'}}>#{i+1}</span>
                          </div>
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-1">
                            <p className="text-sm font-semibold truncate" style={{color:'var(--t1)'}}>{s.title||'Untitled'}</p>
                            <span className="text-[9px] flex-shrink-0 px-1.5 py-0.5 rounded-full font-bold" style={{background:'rgba(139,92,246,.15)',color:'#a78bfa'}}>{s.score} keyword{s.score!==1?'s':''}</span>
                          </div>
                          <p className="text-[11px] truncate" style={{color:'var(--t3)'}}>{s.previewMsg||`${s.messages?.length||0} messages`}</p>
                          {s.tags?.length>0&&<div className="flex gap-1 mt-1 flex-wrap">{s.tags.slice(0,3).map(tid=>{const t=PRESET_TAGS?.find(x=>x.id===tid);return t?<span key={tid} className="text-[8px] px-1.5 py-0.5 rounded-full font-bold" style={{background:t.color+'18',color:t.color}}>{t.label}</span>:null;})}</div>}
                        </div>
                        <i className="fa-solid fa-arrow-right text-xs flex-shrink-0 mt-1" style={{color:'var(--t3)'}}></i>
                      </button>
                    ))}
                  </div>
                );
              })()}

            </div>

            {/* ── Footer ── */}
            <div className="flex items-center justify-between px-4 py-2 border-t flex-shrink-0" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
              <div className="flex items-center gap-3 text-[10px]" style={{color:'var(--t3)'}}>
                <span><span className="kbd" style={{fontSize:9}}>↵</span> Open</span>
                <span><span className="kbd" style={{fontSize:9}}>ESC</span> Close</span>
              </div>
              <div className="flex items-center gap-2 text-[9px]" style={{color:'var(--t3)'}}>
                <span className="px-1.5 py-0.5 rounded" style={{background:'rgba(99,102,241,.1)',color:'#818cf8'}}>{searchMode}</span>
                {(searchFilter.sender!=='all'||searchFilter.session!=='all'||searchFilter.hasImage||searchFilter.dateFrom||searchFilter.dateTo)&&<span className="px-1.5 py-0.5 rounded" style={{background:'rgba(6,182,212,.1)',color:'#06B6D4'}}>filtered</span>}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── CHAT SUMMARY MODAL ── */}
      {showSummary&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.75)'}} onClick={()=>setShowSummary(false)}>
          <div className="w-full max-w-lg mi rounded-2xl border shadow-2xl" style={{background:'var(--bg2)',borderColor:'rgba(99,102,241,.3)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b" style={{borderColor:'var(--br)'}}>
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'rgba(99,102,241,.15)'}}><i className="fa-solid fa-list text-indigo-400" style={{fontSize:11}}></i></div>
                <span className="font-bold" style={{color:'var(--t1)'}}>Chat Summary</span>
              </div>
              <button onClick={()=>setShowSummary(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="p-5 max-h-80 overflow-y-auto sb feat-loading-wrap">
              {summaryLoading&&<div className="feat-load-overlay"><div className="fl-clock"><div className="fl-hour"></div><div className="fl-minute"></div></div><span className="fl-label">Loading...</span></div>}
              {summaryLoading
                ?<div className="flex flex-col items-center justify-center py-8 gap-3"><div className="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><p className="text-sm" style={{color:'var(--t3)'}}>Generating summary…</p></div>
                :<div className="md-body" dangerouslySetInnerHTML={{__html:marked.parse(summaryText||'')}}/>

            </div>

              {summaryLoading?(
                <button onClick={stopSummary} className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold text-white transition-all" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',boxShadow:'0 0 12px rgba(220,38,38,.3)'}}><i className="fa-solid fa-stop text-xs"></i>Stop</button>

              )}
              <button onClick={()=>{try{navigator.clipboard.writeText(summaryText);}catch(e){}toast_('Summary copied!','success');}} className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}}><i className="fa-regular fa-copy text-xs"></i>Copy</button>
            </div>
          </div>
        </div>
      )}

      {/* ── SHORTCUT CHEATSHEET ── */}
      {showShortcuts&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.75)'}} onClick={()=>setShowShortcuts(false)}>
          <div className="w-full max-w-2xl rounded-2xl border shadow-2xl flex flex-col" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'rgba(59,130,246,.12)'}}><i className="fa-solid fa-keyboard text-blue-400" style={{fontSize:11}}></i></div>
                <span className="font-bold" style={{color:'var(--t1)'}}>Keyboard Shortcuts</span>
                <span className="text-[10px] px-2 py-0.5 rounded-full font-bold" style={{background:'rgba(59,130,246,.12)',color:'#60a5fa'}}>All Features</span>
              </div>
              <button onClick={()=>setShowShortcuts(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="overflow-y-auto p-4" style={{scrollbarWidth:'thin'}}>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {[
                  ['Chat','fa-comment','#3b82f6',[
                    ['New chat','Ctrl + N'],
                    ['Send message','Enter'],
                    ['New line','Shift + Enter'],
                    ['Stop generation','Escape'],
                    ['Regen / Alt reply','Alt button'],
                  ]],
                  ['Navigation','fa-compass','#f59e0b',[
                    ['Search chats','Ctrl + K'],
                    ['Shortcuts panel','Ctrl + /'],
                    ['Custom instructions','Ctrl + P'],
                    ['Message search','Ctrl + Shift + F'],
                    ['Command palette','Ctrl + Shift + P'],
                    ['Chat summary','Ctrl + M'],
                  ]],
                  ['Tools','fa-wrench','#a78bfa',[
                    ['To-Do List','Ctrl + Shift + T'],
                    ['Sticky Notes','Ctrl + Shift + N'],
                    ['AI Agent','Ctrl + Shift + A'],
                    ['Image Generator','Toolbar'],
                    ['Voice input','Toolbar'],
                    ['Attach file','Toolbar'],
                  ]],
                  ['Messages','fa-message','#34d399',[
                    ['Edit message','Pencil icon'],
                    ['Copy message','Copy icon'],
                    ['Star message','Star icon'],
                    ['React to message','Emoji icon'],
                    ['Ask about text','Select + Ask'],
                  ]],
                  ['Canvas & Code','fa-code','#06b6d4',[
                    ['Save file','Ctrl + S'],
                    ['Find in file','Ctrl + F'],
                    ['Undo','Ctrl + Z'],
                    ['Redo','Ctrl + Y'],
                    ['Open canvas','+ menu'],
                  ]],
                  ['General','fa-gear','#94a3b8',[
                    ['Close modal','Escape'],
                    ['Switch theme','Settings → Appearance'],
                    ['Change language','Settings → Language'],
                    ['Switch profile','Profile → Switch'],
                    ['Upgrade plan','Profile → Upgrade'],
                  ]],
                ].map(([group,icon,color,items])=>(
                  <div key={group} className="rounded-xl border p-3.5" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
                    <div className="flex items-center gap-2 mb-3">
                      <div className="w-6 h-6 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:color+'20'}}>
                        <i className={"fa-solid "+icon} style={{fontSize:10,color:color}}></i>
                      </div>
                      <span className="text-xs font-bold" style={{color:color}}>{group}</span>
                    </div>
                    <div className="space-y-2">
                      {items.map(([action,keys])=>(
                        <div key={action} className="flex items-center justify-between gap-2">

                            {keys.split(' + ').map((k,i)=>(
                              <React.Fragment key={i}>

                              </React.Fragment>

                          </div>

                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <p className="text-center text-[10px] mt-4" style={{color:'var(--t3)'}}>Press <span style={{fontFamily:"'JetBrains Mono',monospace"}}>Ctrl + /</span> anytime to open this panel</p>
            </div>
          </div>
        </div>

      <div className={`sidebar-overlay ${sidebarOpen?'active':''}`} onClick={()=>setSidebarOpen(false)}></div>

          <div className="w-full max-w-lg mi" onClick={e=>e.stopPropagation()}>
            <div className="rounded-2xl border overflow-hidden shadow-2xl" style={{background:'var(--bg2)',borderColor:'var(--br)'}}>
              <div className="flex items-center gap-3 px-4 py-3 border-b" style={{borderColor:'var(--br)'}}>

                <span className="kbd">ESC</span>
              </div>
              <div className="max-h-80 overflow-y-auto sb py-2">
                {filteredSessions.length===0?<p className="text-center text-sm py-8" style={{color:'var(--t3)'}}>No chats found</p>
                :filteredSessions.map(s=>(
                  <button key={s.id} onClick={()=>{setSid(s.id);setShowSearch(false);setSearchQ('');}} className="w-full text-left px-4 py-3 transition-colors flex items-center gap-3" onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <i className="fa-regular fa-message text-xs" style={{color:'var(--t3)'}}></i>
                    <div><p className="text-sm truncate" style={{color:'var(--t1)'}}>{s.title}</p><p className="text-xs" style={{color:'var(--t3)'}}>{s.messages?.length||0} messages</p></div>
                  </button>

              </div>
              {allStarred.length>0&&<div className="border-t p-2" style={{borderColor:'var(--br)'}}>
                <p className="text-[10px] font-bold tracking-widest uppercase px-2 mb-1 flex items-center gap-1" style={{color:'var(--t3)'}}><i className="fa-solid fa-star text-amber-400"></i> Starred</p>
                {allStarred.slice(0,3).map(m=>(
                  <button key={m.id} onClick={()=>{setSid(m.ssid);setShowSearch(false);}} className="w-full text-left px-3 py-2 rounded-lg transition-colors" onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <p className="text-xs truncate" style={{color:'var(--t1)'}}>{m.text?.slice(0,80)}</p>
                    <p className="text-[10px]" style={{color:'var(--t3)'}}>{m.stitle}</p>
                  </button>
                ))}
              </div>}
            </div>
          </div>
        </div>
      )}

      {/* ── USAGE DASHBOARD MODAL ── */}
      {showDashboard&&(()=>{
        const totalMsgs    = sessions.reduce((a,s)=>a+(s.messages?.length||0),0);
        const userMsgs     = sessions.reduce((a,s)=>a+(s.messages?.filter(m=>m.sender==='user').length||0),0);
        const botMsgs      = totalMsgs - userMsgs;
        const totalSessions= sessions.length;
        const starredCount = Object.values(starred).filter(Boolean).length;
        const cacheCount   = Object.keys(offlineCache).length;
        const memoryCount  = aiMemories.length;
        // Model usage stats
        const modelCounts  = {};
        sessions.forEach(s=>s.messages?.forEach(m=>{if(m.sender==='bot'&&m.model){const n=m.model?.name||'Unknown';modelCounts[n]=(modelCounts[n]||0)+1;}}));
        const topModel     = Object.entries(modelCounts).sort((a,b)=>b[1]-a[1])[0];
        // Word count
        const totalWords   = sessions.reduce((a,s)=>a+(s.messages?.reduce((b,m)=>b+(m.text?.split(/\s+/).length||0),0)||0),0);
        // Last 7 days activity
        const now=Date.now(); const day=86400000;
        const activity = Array.from({length:7},(_,i)=>{
          const d=new Date(now-(6-i)*day); const label=d.toLocaleDateString('en',{weekday:'short'});
          const count=sessions.reduce((a,s)=>a+(s.messages?.filter(m=>{const t=m.timestamp;return t&&t>=now-(6-i)*day&&t<now-(5-i)*day;}).length||0),0);
          return{label,count};
        });
        const maxActivity  = Math.max(...activity.map(d=>d.count),1);
        return(
          <div onClick={()=>setShowDashboard(false)} className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)'}}>
            <div onClick={e=>e.stopPropagation()} className="w-full max-w-2xl rounded-2xl border overflow-hidden" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'90vh',overflowY:'auto'}}>
              {/* Header */}
              <div className="p-5 border-b flex items-center justify-between" style={{borderColor:'var(--br)'}}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:'linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.15))'}}>
                    <i className="fa-solid fa-chart-pie text-indigo-400"></i>
                  </div>
                  <div><p className="font-bold text-lg" style={{color:'var(--t1)'}}>Usage Dashboard</p><p className="text-xs" style={{color:'var(--t3)'}}>Your Omina AI statistics</p></div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={()=>{setShowDashboard(false);setShowWordCloud(true);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all" style={{borderColor:'rgba(219,39,119,.3)',color:'#f472b6',background:'rgba(219,39,119,.07)'}}>
                    <i className="fa-solid fa-cloud text-[10px]"></i>Word Cloud
                  </button>
                  <button onClick={()=>{setShowDashboard(false);setShowModelComp(true);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all" style={{borderColor:'rgba(5,150,105,.3)',color:'#34d399',background:'rgba(5,150,105,.07)'}}>
                    <i className="fa-solid fa-code-compare text-[10px]"></i>Compare
                  </button>
                  <button onClick={()=>setShowDashboard(false)} className="w-8 h-8 flex items-center justify-center rounded-xl border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}><i className="fa-solid fa-xmark text-sm"></i></button>
                </div>
              </div>
              {/* Stats grid */}
              <div className="p-5">
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
                  {[
                    {label:'Total Messages', value:totalMsgs,   icon:'fa-message',    color:'#3B82F6', bg:'rgba(59,130,246,.1)'},
                    {label:'Conversations',  value:totalSessions,icon:'fa-comments',   color:'#8B5CF6', bg:'rgba(139,92,246,.1)'},
                    {label:'AI Replies',     value:botMsgs,      icon:'fa-robot',      color:'#10B981', bg:'rgba(16,185,129,.1)'},
                    {label:'Starred',        value:starredCount, icon:'fa-star',       color:'#F59E0B', bg:'rgba(245,158,11,.1)'},
                    {label:'Cached Replies', value:cacheCount,   icon:'fa-box-archive',color:'#06B6D4', bg:'rgba(6,182,212,.1)'},
                    {label:'Memories',       value:memoryCount,  icon:'fa-brain',      color:'#EC4899', bg:'rgba(236,72,153,.1)'},
                  ].map(s=>(
                    <div key={s.label} className="rounded-xl p-4 border" style={{background:s.bg,borderColor:'rgba(255,255,255,.06)'}}>
                      <div className="flex items-center gap-2 mb-2">
                        <i className={`fa-solid ${s.icon} text-xs`} style={{color:s.color}}></i>
                        <span className="text-[10px] font-medium" style={{color:'var(--t3)'}}>{s.label}</span>
                      </div>
                      <p className="text-2xl font-bold" style={{color:'var(--t1)'}}>{s.value.toLocaleString()}</p>
                    </div>
                  ))}
                </div>

                {/* Words written */}
                <div className="rounded-xl p-4 border mb-4 flex items-center gap-4" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'rgba(99,102,241,.1)'}}><i className="fa-solid fa-pen-nib text-indigo-400"></i></div>
                  <div className="flex-1">
                    <p className="text-xs" style={{color:'var(--t3)'}}>Total words in conversations</p>
                    <p className="text-xl font-bold" style={{color:'var(--t1)'}}>{totalWords.toLocaleString()} words</p>
                  </div>
                  {topModel&&<div className="text-right">
                    <p className="text-xs" style={{color:'var(--t3)'}}>Top model used</p>
                    <p className="text-sm font-bold" style={{color:'var(--t1)'}}>{topModel[0]}</p>
                    <p className="text-[10px]" style={{color:'var(--t3)'}}>{topModel[1]} replies</p>
                  </div>}
                </div>

                {/* 7-day activity bar chart */}
                <div className="rounded-xl p-4 border" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                  <p className="text-xs font-semibold mb-4" style={{color:'var(--t2)'}}>Last 7 Days Activity</p>
                  <div className="flex items-end gap-2" style={{height:80}}>
                    {activity.map((d,i)=>(
                      <div key={i} className="flex-1 flex flex-col items-center gap-1">
                        <span className="text-[9px]" style={{color:'var(--t3)'}}>{d.count||''}</span>
                        <div className="w-full rounded-t-md transition-all" style={{
                          height:`${Math.max(4,d.count/maxActivity*60)}px`,
                          background:d.count>0?'linear-gradient(to top,rgba(99,102,241,.6),rgba(139,92,246,.8))':'var(--bg2)',
                          border:'1px solid rgba(99,102,241,.2)'
                        }}/>
                        <span className="text-[9px]" style={{color:'var(--t3)'}}>{d.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── FAVORITES MODAL ── */}
      {showFavorites&&(
        <div onClick={()=>setShowFavorites(false)} className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)'}}>

            {/* Header */}
            <div className="p-5 border-b flex items-center justify-between flex-shrink-0" style={{borderColor:'var(--br)'}}>

                <div><p className="font-bold" style={{color:'var(--t1)'}}>Favorite Messages</p><p className="text-xs" style={{color:'var(--t3)'}}>{allStarred.length} starred</p></div>
              </div>
              <button onClick={()=>setShowFavorites(false)} className="w-8 h-8 flex items-center justify-center rounded-full border" style={{borderColor:'var(--br)',color:'var(--t2)'}}><i className="fa-solid fa-xmark text-sm"></i></button>
            </div>
            {/* Search */}
            <div className="px-4 py-3 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
              <div className="relative">
                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs" style={{color:'var(--t3)'}}></i>
                <input value={favSearch} onChange={e=>setFavSearch(e.target.value)}
                  placeholder="Search favorites…" className="w-full pl-8 pr-3 py-2 rounded-xl text-sm outline-none border"
                  style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}}/>
              </div>
            </div>
            {/* Messages list */}
            <div className="flex-1 overflow-y-auto sb p-4 space-y-3">
              {allStarred.length===0
                ?<div className="text-center py-16">
                  <i className="fa-regular fa-star text-3xl mb-3 block text-amber-400 opacity-30"></i>
                  <p className="text-sm font-medium" style={{color:'var(--t2)'}}>No favorites yet</p>
                  <p className="text-xs mt-1" style={{color:'var(--t3)'}}>Click ⭐ on any message to star it</p>
                </div>
                :allStarred.filter(m=>!favSearch||m.text?.toLowerCase().includes(favSearch.toLowerCase())||m.stitle?.toLowerCase().includes(favSearch.toLowerCase())).map(m=>(
                  <div key={m.id} className="rounded-xl border overflow-hidden" style={{borderColor:'var(--br)'}}>
                    {/* Chat label */}
                    <div className="flex items-center justify-between px-3 py-2 border-b" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                      <div className="flex items-center gap-2">
                        <i className={`fa-solid ${m.sender==='bot'?'fa-robot':'fa-user'} text-xs`} style={{color:m.sender==='bot'?'#3B82F6':'#10B981'}}></i>
                        <span className="text-xs font-medium" style={{color:'var(--t2)'}}>{m.sender==='bot'?'Omina AI':'You'}</span>
                        <span className="text-[10px] px-2 py-0.5 rounded-full" style={{background:'var(--bg2)',color:'var(--t3)'}}>{m.stitle?.slice(0,30)||'Chat'}</span>
                      </div>
                      <div className="flex items-center gap-1">
                        {m.timestamp&&<span className="text-[10px]" style={{color:'var(--t3)'}}>{new Date(m.timestamp).toLocaleDateString()}</span>}
                        <button onClick={()=>{setSid(m.ssid);setShowFavorites(false);toast_('Opened chat','info');}} className="px-2 py-0.5 rounded-lg text-[10px] border ml-2" style={{borderColor:'rgba(99,102,241,.3)',color:'#a5b4fc',background:'rgba(99,102,241,.1)'}}>Go →</button>
                        <button onClick={()=>toggleStar(m.id)} className="p-1 rounded-lg text-xs hover:text-red-400 transition-colors" style={{color:'var(--t3)'}} title="Remove star"><i className="fa-solid fa-star text-amber-400"></i></button>
                      </div>
                    </div>
                    {/* Message content */}
                    <div className="px-4 py-3" style={{background:'var(--bg2)'}}>
                      <p className="text-sm" style={{color:'var(--t1)',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{m.text?.slice(0,400)}{m.text?.length>400?'…':''}</p>
                    </div>
                  </div>
                ))
              }
            </div>
            {/* Footer */}
            {allStarred.length>0&&<div className="p-4 border-t flex-shrink-0 flex items-center justify-between" style={{borderColor:'var(--br)'}}>
              <span className="text-xs" style={{color:'var(--t3)'}}>{allStarred.filter(m=>!favSearch||m.text?.toLowerCase().includes(favSearch.toLowerCase())).length} messages shown</span>
              <button onClick={()=>{if(window.confirm('Remove all stars?'))setStarred({});}} className="text-xs px-3 py-1.5 rounded-xl border transition-all" style={{borderColor:'rgba(239,68,68,.2)',color:'#f87171',background:'rgba(239,68,68,.05)'}}>Clear all</button>
            </div>}
          </div>
        </div>
      )}

      {/* ── SYSTEM PROMPT ── */}
      {showSysPrompt&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.7)'}} onClick={()=>setShowSysPrompt(false)}>
          <div className="w-full max-w-lg mi p-6 rounded-2xl border" style={{background:'var(--bg2)',borderColor:'rgba(139,92,246,.3)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4"><div className="flex items-center gap-2"><i className="fa-solid fa-sliders text-purple-400"></i><span className="font-bold" style={{color:'var(--t1)'}}>Custom Instructions</span></div><button onClick={()=>setShowSysPrompt(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
            <p className="text-xs mb-3" style={{color:'var(--t3)'}}>Tell Omina AI how to behave in every conversation.</p>
            <textarea value={sysPrompt} onChange={e=>setSysPrompt(e.target.value)} className="w-full rounded-xl px-4 py-3 text-sm outline-none resize-none border" rows="7" style={{background:'var(--bg3)',borderColor:'rgba(139,92,246,.3)',color:'var(--t1)',fontFamily:"'DM Sans',sans-serif"}}/>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>setSysPrompt('You are Omina AI, a helpful assistant. Always use markdown formatting.')} className="px-4 py-2 rounded-xl text-xs border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}}>Reset</button>
              <button onClick={()=>setShowSysPrompt(false)} className="flex-1 py-2 rounded-xl text-sm font-bold text-white bg-purple-600 hover:bg-purple-500 transition-all">Save</button>
            </div>
          </div>
        </div>
      )}

      {/* ── FOLDER MODAL ── */}
      {showFolderModal&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.7)'}} onClick={()=>setShowFolderModal(false)}>
          <div className="w-full max-w-sm mi rounded-2xl border p-6" style={{background:'var(--bg2)',borderColor:'var(--br)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4"><span className="font-bold" style={{color:'var(--t1)'}}>New Folder</span><button onClick={()=>setShowFolderModal(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
            <input value={newFName} onChange={e=>setNewFName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&makeFolder()} placeholder="Folder name…" className="w-full rounded-xl px-4 py-2.5 text-sm outline-none mb-4 border" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}}/>
            <p className="text-xs mb-2" style={{color:'var(--t3)'}}>Pick a color</p>
            <div className="flex gap-2.5 mb-5">{FC.map(c=><button key={c} onClick={()=>setNewFColor(c)} className={`w-8 h-8 rounded-full flex-shrink-0 transition-all ${newFColor===c?'ring-2 ring-white ring-offset-2 scale-110':''}`} style={{background:c,ringOffsetColor:'var(--bg2)'}}></button>)}</div>
            <button onClick={makeFolder} className="w-full py-2.5 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-500 transition-all">Create Folder</button>
          </div>
        </div>
      )}

      {/* ── SIDEBAR ── */}
      <div className={`sidebar flex flex-col flex-shrink-0 border-r ${sidebarOpen?'open':''} overflow-hidden`} style={{background:'var(--bg2)',borderColor:'var(--br)'}}>
        <div className="p-4 flex items-center gap-2 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
          <i className="fa-solid fa-robot text-blue-500 text-xl"></i>
          <span className="font-bold text-lg" style={{color:'var(--t1)'}}>Omina AI</span>
        </div>
        <div className="p-3 flex gap-2 flex-shrink-0">
          <button onClick={()=>newChat()} className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-sm font-medium border transition-all hover:border-blue-500/50" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}} title="New chat (Ctrl+N)"><i className="fa-solid fa-plus text-xs"></i> New</button>
          <button onClick={()=>setShowSearch(true)} className="px-3 py-2 rounded-xl border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}} title="Search (Ctrl+K)"><i className="fa-solid fa-magnifying-glass text-xs"></i></button>
          <button onClick={()=>setShowFolderModal(true)} className="px-3 py-2 rounded-xl border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}} title="New folder"><i className="fa-solid fa-folder-plus text-xs"></i></button>
        </div>
        {/* ── Folder section — fixed, does NOT scroll with history ── */}
        {folders.length>0&&(
          <div className="flex-shrink-0 border-b px-2 pt-2 pb-1" style={{borderColor:'var(--br)'}}>
            {/* Tag filter bar */}
            {sessions.some(s=>s.tags&&s.tags.length>0)&&(
              <div className="flex gap-1.5 overflow-x-auto sb pb-1 mb-1" style={{scrollbarWidth:'none'}}>
                <button onClick={()=>setTagFilter(null)} className="flex-shrink-0 px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all" style={{background:tagFilter===null?'rgba(99,102,241,.15)':'transparent',borderColor:tagFilter===null?'rgba(99,102,241,.4)':'var(--br)',color:tagFilter===null?'#818cf8':'var(--t3)'}}>
                  All
                </button>
                {PRESET_TAGS.filter(t=>sessions.some(s=>s.tags?.includes(t.id))).map(t=>(
                  <button key={t.id} onClick={()=>setTagFilter(tagFilter===t.id?null:t.id)} className="flex-shrink-0 flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold border transition-all" style={{background:tagFilter===t.id?t.color+'20':'transparent',borderColor:tagFilter===t.id?t.color+'55':'var(--br)',color:tagFilter===t.id?t.color:'var(--t3)'}}>
                    <i className={`fa-solid ${t.icon} text-[8px]`}></i>{t.label}
                  </button>
                ))}
              </div>
            )}
            <FolderSection/>
          </div>
        )}
        {/* ── Chat history — scrollable independently ── */}
        <div className="flex-1 overflow-y-auto sb p-2 space-y-4" style={{minHeight:0}}>
          {/* Tag filter bar (when no folders) */}
          {folders.length===0&&sessions.some(s=>s.tags&&s.tags.length>0)&&(
            <div className="flex gap-1.5 overflow-x-auto sb pb-1 flex-shrink-0" style={{scrollbarWidth:'none'}}>
              <button onClick={()=>setTagFilter(null)} className="flex-shrink-0 px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all" style={{background:tagFilter===null?'rgba(99,102,241,.15)':'transparent',borderColor:tagFilter===null?'rgba(99,102,241,.4)':'var(--br)',color:tagFilter===null?'#818cf8':'var(--t3)'}}>
                All
              </button>
              {PRESET_TAGS.filter(t=>sessions.some(s=>s.tags?.includes(t.id))).map(t=>(
                <button key={t.id} onClick={()=>setTagFilter(tagFilter===t.id?null:t.id)} className="flex-shrink-0 flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold border transition-all" style={{background:tagFilter===t.id?t.color+'20':'transparent',borderColor:tagFilter===t.id?t.color+'55':'var(--br)',color:tagFilter===t.id?t.color:'var(--t3)'}}>
                  <i className={`fa-solid ${t.icon} text-[8px]`}></i>{t.label}
                </button>
              ))}
            </div>
          )}
          {sessions.filter(s=>pinned.includes(s.id)).length>0&&<div>

            <div className="space-y-0.5">{sessions.filter(s=>pinned.includes(s.id)).map(s=><ChatItem key={s.id} session={s}/>)}</div>
          </div>}

            const unp=grp.filter(s=>!pinned.includes(s.id));

            return<div key={label}><p className="dsep">{label}</p><div className="space-y-0.5">{unp.map(s=><ChatItem key={s.id} session={s}/>)}</div></div>;

                        {[

                        </div>
                        Log out
                      </a>
                    </div>

                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* SELECTION CONTEXT MENU */}
        {selMenu&&<div className="sel-menu" style={{left:selMenu.x,top:selMenu.y,transform:'translate(-50%,-100%)'}}>
          <button className="sel-menu-btn" onClick={()=>askFromSelection(selMenu.text)}>

          </button>

          <button className="sel-menu-close" onClick={()=>setSelMenu(null)}><i className="fa-solid fa-xmark text-[10px]"></i></button>

              {/* FRONT PAGE */}
              {frontPage?(
                <div className="w-full max-w-2xl flex flex-col items-center ai px-2">
                  <div className="flex items-center gap-2 mb-2 text-blue-400 text-sm"><i className="fa-solid fa-wand-magic-sparkles"></i><span className="font-medium">Hi {UDATA.name.split(' ')[0]} 👋</span></div>
                  <h1 className="front-title text-3xl md:text-5xl font-bold mb-3 text-center leading-tight" style={{color:'var(--t1)'}}>How can I help<br/>you today?</h1>
                  <p className="text-sm mb-4 text-center" style={{color:'var(--t2)'}}>Mode: <span style={{color:'var(--t1)',fontWeight:600}}><i className={`${mood.icon} ${mood.color} text-xs mr-1`}></i>{mood.name}</span> · Model: <span className={`${model.color} font-medium`}>{model.name}</span></p>
                  {/* Quick language row */}
                  <div className="flex flex-wrap justify-center gap-1.5 mb-5">
                    {LANGS.slice(0,10).map(l=>(
                      <button key={l.id} onClick={()=>setLanguage(l.id)}

                          background:language===l.id?'rgba(99,102,241,.1)':'transparent',
                          cursor:'pointer',fontSize:11,fontWeight:language===l.id?700:400,transition:'all .15s',
                          color:language===l.id?'#a5b4fc':'var(--t3)'}}>
                        <span style={{fontSize:12,lineHeight:1}}>{l.flag}</span>
                        <span>{l.label.split(' ')[0]}</span>
                      </button>
                    ))}
                    <button onClick={()=>{setShowSettings(true);setSettingsTab('general');}}
                      style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:20,
                        border:'1px solid var(--br)',background:'transparent',cursor:'pointer',fontSize:11,
                        color:'var(--t3)',transition:'all .15s'}}>
                      <i className="fa-solid fa-ellipsis" style={{fontSize:10}}></i>
                      <span>More</span>
                    </button>
                  </div>
                  {activeFolderId&&(()=>{const f=folders.find(x=>x.id===activeFolderId);return f&&<div className="flex items-center gap-2 mb-3 text-xs px-3 py-2 rounded-xl border w-full" style={{borderColor:'rgba(59,130,246,.3)',background:'rgba(59,130,246,.07)'}}><div className="w-2 h-2 rounded-full" style={{background:f.color}}></div><span style={{color:'var(--t2)'}}>New chat → <strong style={{color:'var(--t1)'}}>{f.name}</strong></span><button onClick={()=>setActiveFolderId(null)} className="ml-auto" style={{color:'var(--t3)'}}><i className="fa-solid fa-xmark text-xs"></i></button></div>;})()}
                  <div className="w-full mb-6">
                    <div className="ib rounded-2xl flex flex-col overflow-hidden border" style={{background:'var(--bgi)',borderColor:'var(--brh)'}}>
                      
                      <VoiceBar/>
                      <FileBar/>
                      <textarea value={input} onChange={handleInput} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey&&enterSend){e.preventDefault();send();}}} placeholder={`Message ${model.name}…`} className="w-full bg-transparent px-4 md:px-5 pt-4 pb-2 max-h-40 resize-none outline-none text-sm placeholder-slate-500" style={{color:'var(--t1)'}} rows="1"/>
                      <InputToolbar send={send} pickFile={pickFile} toggleVoice={toggleVoice} voiceOn={voiceOn} webSearch={webSearch} setWebSearch={setWebSearch} showImgGen={showImgGen} setShowImgGen={setShowImgGen} showCanvas={showCanvas} setShowCanvas={setShowCanvas} canvasMode={canvasMode} setCanvasMode={setCanvasMode} curSession={curSession} msgs={msgs} typing={typing} stopGen={stopGen} input={input} file={file} charCount={charCount} charLimit={charLimit} regen={regen} isFront={true} mood={mood} setMood={setMood}/>
                    </div>
                  </div>
                  <div className="flex flex-wrap justify-center gap-2 w-full px-1">
                    {suggestions.map((s,i)=><button key={i} onClick={()=>send(s.t)} className="flex items-center gap-2 px-3 py-2 rounded-xl text-xs md:text-sm border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)',maxWidth:'calc(50% - 4px)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} onMouseEnter={e=>e.currentTarget.style.borderColor='var(--brh)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}><i className={`${s.i} text-xs flex-shrink-0`}></i><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.t}</span></button>)}
                  </div>
                  <div className="mt-6 flex flex-wrap justify-center gap-3 md:gap-4 text-xs" style={{color:'var(--t3)'}}>
                    <span className="flex items-center gap-1"><span className="kbd">Ctrl N</span> New</span>
                    <span className="flex items-center gap-1"><span className="kbd">Ctrl K</span> Search</span>
                    <span className="flex items-center gap-1 hide-mobile"><span className="kbd">Ctrl P</span> Instructions</span>
                    <span className="flex items-center gap-1"><span className="kbd">Shift↵</span> New line</span>
                  </div>
                </div>
              ):(
                /* MESSAGES */

                  {msgs.map((msg,idx)=>(
                    <div key={msg.id} className={`mw flex gap-3 ${msg.sender==='user'?'justify-end':'justify-start'}`}>

                        const msgPersona = PERSONAS.find(p=>p.id===(msg.persona||persona)) || PERSONAS[0];
                        return (
                          <div className="flex-shrink-0 mt-1 w-7 h-7 rounded-full flex items-center justify-center border-2" style={{background:`${msgPersona.color}18`,borderColor:msgPersona.color}}>
                            <i className={`fa-solid ${msgPersona.icon}`} style={{fontSize:11,color:msgPersona.color}}></i>
                          </div>
                        );
                      })()}
                      <div className="msg-bubble max-w-[85%] md:max-w-[78%]">
                        {msg.sender==='bot'&&<div className="flex items-center gap-2 mb-1.5">
                          <p className="text-[10px] font-bold tracking-widest uppercase" style={{color:'var(--t3)'}}>{msg.model?.name||model.name}</p>
                          {msg.webSearch&&<span className="text-[9px] px-1.5 py-0.5 rounded-full flex items-center gap-1 border" style={{background:'rgba(59,130,246,.1)',color:'#60A5FA',borderColor:'rgba(59,130,246,.2)'}}><i className="fa-solid fa-globe text-[8px]"></i>Web</span>}
                        </div>}
                        {msg.fp&&<div className="mb-3 rounded-xl overflow-hidden border max-w-[220px]" style={{borderColor:'var(--br)'}}><img src={msg.fp} className="w-full h-auto" alt=""/></div>}
                        {msg.fn&&!msg.fp&&<div className="mb-2 flex items-center gap-2 text-xs text-blue-400 w-fit px-3 py-1.5 rounded-lg border border-blue-400/20" style={{background:'rgba(59,130,246,.1)'}}><i className="fa-solid fa-paperclip"></i>{msg.fn}</div>}
                        {msg.text&&(
                          editMsgId===msg.id?(
                            <div>
                              <textarea className="etx" value={editMsgVal} onChange={e=>setEditMsgVal(e.target.value)} rows="3" autoFocus onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitEdit(msg.id);}if(e.key==='Escape')setEditMsgId(null);}}/>
                              <div className="flex gap-2 mt-2">
                                <button onClick={()=>commitEdit(msg.id)} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded-lg font-medium transition-all">Send</button>
                                <button onClick={()=>setEditMsgId(null)} className="px-3 py-1.5 text-xs rounded-lg border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}}>Cancel</button>
                              </div>
                            </div>
                          ):(
                            <div
                              className={msg.sender==='user'?'px-4 py-3 rounded-2xl rounded-tr-sm border msg-text':'msg-text'}
                              style={msg.sender==='user'?{background:'var(--bg3)',borderColor:'var(--brh)'}:{}}
                            >
                              {msg.sender==='user'
                                ?<p className="text-sm whitespace-pre-wrap" style={{color:'var(--t1)'}}>{msg.text}</p>
                                :/* BOT MESSAGE — use typewriter for latest, normal for old */
                                <>
                                  {(()=>{
                                    // When canvasMode ON: strip code blocks from inline text
                                    const rawText = getActiveText(msg);
                                    const dispText = canvasMode
                                      ? rawText.replace(/```[\w]*\n?[\s\S]*?```/g, '').replace(/\n{3,}/g,'\n\n').trim()
                                      : rawText;
                                    return msg.id===typewriterMsgId
                                      ? <div className={msg.webSearch?'web-search-reply':''}><TypewriterText
                                          text={dispText}
                                          speed={2}
                                          inlineSources={msg.inlineSources||{}}
                                          onDone={()=>setTypewriterMsgId(null)}
                                        /></div>
                                      : (msg.inlineSources && Object.keys(msg.inlineSources).length>0)
                                        ? <div className={msg.webSearch?'web-search-reply':''}>{renderWithInlineSources(dispText, msg.inlineSources)}</div>
                                        : <div className={`md-body${msg.webSearch?' web-search-reply':''}`} dangerouslySetInnerHTML={mkd(dispText)}/>;
                                  })()}
                                  {getBranch(msg.id)&&(()=>{const b=getBranch(msg.id);return(
                                    <div className="flex items-center gap-2 mt-3 pt-2 border-t" style={{borderColor:'var(--br)'}}>
                                      <button onClick={()=>switchBranch(msg.id,-1)} disabled={b.idx===0} className="w-6 h-6 flex items-center justify-center rounded-lg border transition-all disabled:opacity-30" style={{borderColor:'var(--br)',color:'var(--t2)'}}><i className="fa-solid fa-chevron-left text-[10px]"></i></button>
                                      <span className="text-[11px]" style={{color:'var(--t3)'}}>{b.idx+1}/{b.texts.length}</span>
                                      <button onClick={()=>switchBranch(msg.id,1)} disabled={b.idx===b.texts.length-1} className="w-6 h-6 flex items-center justify-center rounded-lg border transition-all disabled:opacity-30" style={{borderColor:'var(--br)',color:'var(--t2)'}}><i className="fa-solid fa-chevron-right text-[10px]"></i></button>
                                      <span className="text-[10px]" style={{color:'var(--t3)'}}>alternate replies</span>
                                    </div>
                                  );})()}
                                </>
                              }
                            </div>
                          )
                        )}
                        {/* File cards / code blocks based on canvasMode */}
                        {msg.sender==='bot'&&(()=>{
                          const blocks=extractCodeBlocks(msg.text);
                          if(!blocks.length) return null;
                          // canvasMode ON: ALL messages show FileCard with Open button (including old messages)
                          if(canvasMode){
                            return (
                              <div style={{marginTop:6}}>
                                {blocks.map((block,i)=>(
                                  <FileCard
                                    key={i}
                                    block={block}
                                    canvasMode={true}
                                    onOpen={code=>{setCanvasContent(code);setShowCanvas(true);}}
                                  />
                                ))}
                              </div>
                            );
                          }
                          // canvasMode OFF: show code block inline (no open button)
                          return (
                            <div style={{marginTop:6}}>
                              {blocks.map((block,i)=>(
                                <FileCard
                                  key={i}
                                  block={block}
                                  canvasMode={false}
                                  onOpen={()=>{}}
                                />
                              ))}
                            </div>
                          );
                        })()}
                        {/* Actions */}
                        <div className="ma flex items-center gap-1 mt-1.5 flex-wrap">
                          {timestamps&&msg.timestamp&&<span className="text-[10px] mr-1" style={{color:'var(--t3)'}}>{fmtTime(msg.timestamp)}</span>}
                          <button onClick={()=>copyMsg(msg)} className="p-1 rounded-lg transition-all" style={{color:copiedId===msg.id?'#10B981':'var(--t3)'}} title="Copy"><i className={`fa-${copiedId===msg.id?'solid fa-check':'regular fa-copy'} text-xs`}></i></button>
                          {msg.sender==='user'&&editMsgId!==msg.id&&<button onClick={()=>startEdit(msg)} className="p-1 rounded-lg transition-all hover:text-slate-300" style={{color:'var(--t3)'}} title="Edit"><i className="fa-solid fa-pen text-xs"></i></button>}
                          {msg.sender==='bot'&&idx===msgs.length-1&&<button onClick={regen} className="p-1 rounded-lg transition-all hover:text-slate-300" style={{color:'var(--t3)'}} title="Regenerate"><i className="fa-solid fa-rotate-right text-xs"></i></button>}
                          {msg.sender==='bot'&&<button onClick={()=>createBranch(msg)} disabled={typing} className="p-1 rounded-lg transition-all hover:text-purple-400 disabled:opacity-30" style={{color:'var(--t3)'}} title="Alternate reply"><i className="fa-solid fa-code-branch text-xs"></i></button>}
                          {msg.sender==='bot'&&<button onClick={()=>summarizeMsg(msg)} disabled={summarizing===msg.id} className="p-1 rounded-lg transition-all hover:text-cyan-400 disabled:opacity-40" style={{color:msgSummary[msg.id]?'#22d3ee':'var(--t3)'}} title="Summarize this reply"><i className={`fa-solid ${summarizing===msg.id?'fa-spinner fa-spin':'fa-compress-alt'} text-xs`}></i></button>}
                          {msg.sender==='bot'&&ttsVoices.length>0&&<button onClick={()=>ttsSpeaking?ttsStop():ttsSpeak(msg.text||'')} className="p-1 rounded-lg transition-all" style={{color:ttsSpeaking?'#3B82F6':'var(--t3)'}} title={ttsSpeaking?'Stop':'Read aloud'}><i className={`fa-solid ${ttsSpeaking?'fa-stop':'fa-volume-high'} text-xs`}></i></button>}
                          {msg.sender==='bot'&&idx===msgs.length-1&&!typing&&<button onClick={()=>genFollowUps(msg.text,msg.id)} className="p-1 rounded-lg transition-all hover:text-violet-400" style={{color:followUpMsgId===msg.id?'#a78bfa':'var(--t3)'}} title="Follow-up suggestions"><i className="fa-solid fa-wand-magic-sparkles text-xs"></i></button>}
                          <button onClick={()=>toggleStar(msg.id)} className={`p-1 rounded-lg transition-all ${starred[msg.id]?'star-on':'hover:text-amber-400'}`} style={!starred[msg.id]?{color:'var(--t3)'}:{}} title="Star"><i className="fa-solid fa-star text-xs"></i></button>
                          {['👍','❤️','😂','🔥'].map(e=><button key={e} onClick={()=>react(msg.id,e)} className={`rb text-xs px-0.5 ${reactions[msg.id]===e?'opacity-100':'opacity-25 hover:opacity-100'}`}>{e}</button>)}
                          {/* Voting */}
                          {msg.sender==='bot'&&(()=>{
                            const v=msgVotes[msg.id]||{up:0,down:0,my:null};
                            return(<>
                              <button onClick={()=>setMsgVotes(p=>{const cur=p[msg.id]||{up:0,down:0,my:null};const wasUp=cur.my==='up';return{...p,[msg.id]:{up:wasUp?cur.up-1:cur.up+1,down:wasUp?cur.down:cur.my==='down'?cur.down-1:cur.down,my:wasUp?null:'up'}};})} className="flex items-center gap-0.5 p-1 rounded-lg transition-all" style={{color:v.my==='up'?'#10B981':'var(--t3)'}} title="Upvote">
                                <i className="fa-solid fa-thumbs-up text-xs"></i>{v.up>0&&<span style={{fontSize:9}}>{v.up}</span>}
                              </button>
                              <button onClick={()=>setMsgVotes(p=>{const cur=p[msg.id]||{up:0,down:0,my:null};const wasDown=cur.my==='down';return{...p,[msg.id]:{down:wasDown?cur.down-1:cur.down+1,up:wasDown?cur.up:cur.my==='up'?cur.up-1:cur.up,my:wasDown?null:'down'}};})} className="flex items-center gap-0.5 p-1 rounded-lg transition-all" style={{color:v.my==='down'?'#EF4444':'var(--t3)'}} title="Downvote">
                                <i className="fa-solid fa-thumbs-down text-xs"></i>{v.down>0&&<span style={{fontSize:9}}>{v.down}</span>}
                              </button>
                            </>);
                          })()}
                          {/* Review comment */}

                                (q==='us'&&v.lang.toLowerCase().includes('en-us')) ||
                                (q==='uk'&&v.lang.toLowerCase().includes('en-gb')) ||
                                (q==='india'&&(v.lang.toLowerCase().startsWith('hi')||v.lang.toLowerCase().includes('en-in'))) ||
                                (q==='arabic'&&v.lang.toLowerCase().startsWith('ar')) ||
                                (q==='french'&&v.lang.toLowerCase().startsWith('fr')) ||
                                (q==='german'&&v.lang.toLowerCase().startsWith('de')) ||
                                (q==='spanish'&&v.lang.toLowerCase().startsWith('es')) ||
                                (q==='chinese'&&(v.lang.toLowerCase().startsWith('zh')||v.lang.toLowerCase().startsWith('cmn'))) ||
                                (q==='japanese'&&v.lang.toLowerCase().startsWith('ja')) ||
                                (q==='korean'&&v.lang.toLowerCase().startsWith('ko')) ||
                                (q==='russian'&&v.lang.toLowerCase().startsWith('ru'));
                            });
                            const maleKw = ['david','mark','james','george','daniel','luca','diego','thomas','eric','male','man','guy','reed','guy','arthur','aaron','fred','jorge','oliver','stefan','nikos','ivan','filip'];
                            const femaleKw = ['zira','helen','female','woman','girl','samantha','victoria','moira','fiona','karen','susan','linda','alice','anna','sarah','emma','aria','nora','amelie','ioana','lekha','heera','kalpana','heami'];
                            const isLikelyMale = v => maleKw.some(k=>v.name.toLowerCase().includes(k));
                            const isLikelyFemale = v => femaleKw.some(k=>v.name.toLowerCase().includes(k));
                            const male = filtered.filter(v=>isLikelyMale(v)&&!isLikelyFemale(v));
                            const female = filtered.filter(v=>isLikelyFemale(v));

                                      </div>
                                      {ttsVoice===v.name&&<i className="fa-solid fa-check text-[9px] flex-shrink-0" style={{color:'#22d3ee'}}></i>}
                                    </button>
                                  ))}
                                </div>
                              </div>

                            return filtered.length===0 ? (
                              <div className="text-center py-4 rounded-xl border border-dashed text-xs" style={{borderColor:'rgba(6,182,212,.2)',color:'var(--t3)'}}>

                              <div>
                                <VoiceGroup label="Female" icon="fa-venus" color="#EC4899" voices={female}/>

                                <VoiceGroup label="Other" icon="fa-microphone" color="#8B5CF6" voices={other}/>

                              <p className="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1" style={{color:'var(--t3)'}}><i className="fa-solid fa-gauge-high text-[9px]" style={{color:'#3B82F6'}}></i>Speed</p>

                            </div>
                            <input type="range" min="0.5" max="2" step="0.1" value={ttsRate} onChange={e=>setTtsRate(parseFloat(e.target.value))} className="w-full cursor-pointer" style={{accentColor:'#3B82F6',height:4}}/>

                          </div>
                          <div className="p-3 rounded-xl border" style={{background:'var(--bg)',borderColor:'rgba(139,92,246,.12)'}}>

                              <p className="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1" style={{color:'var(--t3)'}}><i className="fa-solid fa-wave-square text-[9px]" style={{color:'#8B5CF6'}}></i>Pitch</p>
                              <span className="text-[10px] font-bold" style={{color:'#a78bfa'}}>{ttsPitch.toFixed(1)}</span>
                            </div>
                            <input type="range" min="0.5" max="2" step="0.1" value={ttsPitch} onChange={e=>setTtsPitch(parseFloat(e.target.value))} className="w-full cursor-pointer" style={{accentColor:'#8B5CF6',height:4}}/>
                            <div className="flex justify-between mt-1"><span className="text-[9px]" style={{color:'var(--t3)'}}>Low</span><span className="text-[9px]" style={{color:'var(--t3)'}}>High</span></div>
                          </div>
                        </div>

                            <i className="fa-solid fa-stop text-[10px]"></i>
                          </button>}
                        </div>

                      </div>

                                  </div>
                                  <p className="text-[10px] font-mono mt-0.5" style={{color:'var(--t3)',letterSpacing:'0.05em'}}>
                                    {showKeyVal[k.id] ? k.value : k.value.slice(0,6)+'••••••••••'+k.value.slice(-3)}

                                    <i className={`fa-solid ${showKeyVal[k.id]?'fa-eye-slash':'fa-eye'} text-[10px]`}></i>
                                  </button>
                                  <button onClick={()=>{navigator.clipboard.writeText(k.value);toast_('Copied!','success');}} className="w-7 h-7 rounded-lg flex items-center justify-center transition-all" style={{color:'var(--t3)',background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} title="Copy">
                                    <i className="fa-regular fa-copy text-[10px]"></i>
                                  </button>
                                  <button onClick={()=>{setApiKeys(p=>p.map(x=>x.id===k.id?{...x,tested:true,testedAt:new Date().toLocaleDateString()}:x));toast_('Marked tested ✓','success');}} className="w-7 h-7 rounded-lg flex items-center justify-center transition-all" style={{color:'var(--t3)',background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} title="Mark tested">
                                    <i className="fa-solid fa-circle-check text-[10px]"></i>
                                  </button>
                                  <button onClick={()=>{if(window.confirm('Delete this key?')){setApiKeys(p=>p.filter(x=>x.id!==k.id));toast_('Deleted','info');}}} className="w-7 h-7 rounded-lg flex items-center justify-center transition-all opacity-0 group-hover:opacity-100" style={{color:'#f87171',background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'} title="Delete">
                                    <i className="fa-solid fa-trash-can text-[10px]"></i>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>

                            className="px-3 py-2 rounded-xl text-xs outline-none border transition-all" style={{background:'var(--bg)',borderColor:'rgba(59,130,246,.2)',color:'var(--t1)'}}
                            onFocus={e=>e.target.style.borderColor='rgba(59,130,246,.5)'} onBlur={e=>e.target.style.borderColor='rgba(59,130,246,.2)'}/>

  const loader   = document.getElementById('omina-loader');

  // Top progress bar helpers
  let npTimer = null;
  function npStart(){
    if(!nprog) return;
    nprog.style.transition='none';
    nprog.style.transform='scaleX(0)';
    nprog.classList.add('active');
    requestAnimationFrame(()=>{
      nprog.style.transition='transform 2.5s cubic-bezier(.1,0,.2,1)';
      nprog.style.transform='scaleX(.85)';
    });
  }
  function npDone(){
    if(!nprog) return;
    nprog.style.transition='transform .25s ease,opacity .4s ease .3s';
    nprog.style.transform='scaleX(1)';
    setTimeout(()=>{ nprog.classList.remove('active'); nprog.style.transform='scaleX(0)'; }, 700);
    clearTimeout(npTimer);
  }

  // Page reload / beforeunload → show top bar
  window.addEventListener('beforeunload', function(){
    npStart();
    if(loader){ loader.style.display='flex'; loader.classList.remove('hide'); }
  });

  // Online / Offline
  window.addEventListener('offline', function(){
    if(overlay){
      overlay.querySelector('.co-title').textContent = 'No Internet Connection';
      overlay.querySelector('.co-sub').textContent   = 'Check your Wi-Fi or mobile data and try again.';
      overlay.classList.add('show');
    }
  });
  window.addEventListener('online', function(){
    if(overlay) overlay.classList.remove('show');
  });

  // Slow server / fetch timeout detection
  // Patch global fetch to watch for slow responses
  const SLOW_THRESHOLD = 8000; // 8 seconds
  const _fetch = window.fetch.bind(window);
  window.fetch = function(url, opts){
    const isApiCall = typeof url === 'string' && (url.includes('/chat') || url.includes('/api') || url.includes('/v1'));
    let slowTimer = null;
    const p = _fetch(url, opts);
    if(isApiCall){
      slowTimer = setTimeout(()=>{
        if(overlay && navigator.onLine){
          overlay.querySelector('.co-title').textContent = 'Slow Connection';
          overlay.querySelector('.co-sub').textContent   = 'Server is taking too long. Your connection may be weak.';
          overlay.classList.add('show');
        }
      }, SLOW_THRESHOLD);
      p.then(()=>{ clearTimeout(slowTimer); if(overlay) overlay.classList.remove('show'); })
       .catch(()=>{ clearTimeout(slowTimer); });
    }
    return p;
  };

  // Navigation: detect link clicks / pushState
  const _pushState = history.pushState.bind(history);
  history.pushState = function(){
    npStart();
    _pushState.apply(history, arguments);
    setTimeout(npDone, 500);
  };
  window.addEventListener('popstate', function(){ npStart(); setTimeout(npDone, 400); });

  // Page load complete → hide loader, finish progress bar
  window.addEventListener('load', function(){
    npDone();
    const l = document.getElementById('omina-loader');
    if(l){ l.classList.add('hide'); setTimeout(()=>{l.style.display='none';},400); }
  });

})();
</script>
</body>
</html>
