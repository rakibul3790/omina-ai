    send(`Summarize this in 2-3 sentences: "${txt.slice(0,600)}"`);
  };

  const explainSelection = txt => {
    setSelMenu(null);
    window.getSelection()?.removeAllRanges();
    send(`Explain this simply: "${txt.slice(0,600)}"`);
  };

  // ── Per-message summarize ──
  const summarizeMsg = async msg => {
    if (summarizing) return;
    setSummarizing(msg.id);
    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          message: `Summarize this reply in 2-3 bullet points:

${msg.text.slice(0,1500)}`,
          history: [], system_prompt: 'You are a summarizer. Be concise. Use bullet points.'
        })
      });
      const d = await r.json();
      setMsgSummary(p => ({...p, [msg.id]: d.reply || 'Could not summarize.'}));
    } catch { setMsgSummary(p => ({...p, [msg.id]: 'Error generating summary.'})); }
    setSummarizing(null);
  };

  // ── Follow-up suggestions generator ──
  const genFollowUps = async (botText, msgId) => {
    if (followUpMsgId === msgId) return;
    setFollowUps([]); setFollowUpMsgId(msgId);
    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          message: `Based on this reply, give exactly 3 short follow-up questions (each under 10 words). Reply ONLY as JSON array like: ["Q1?","Q2?","Q3?"]

Reply: ${botText.slice(0,800)}`,
          history: [], system_prompt: 'Return only a valid JSON array of 3 strings. No markdown, no explanation.'
        })
      });
      const d = await r.json();
      const raw = (d.reply||'').replace(/```json|```/g,'').trim();
      const arr = JSON.parse(raw);
      if (Array.isArray(arr)) setFollowUps(arr.slice(0,3));
    } catch { setFollowUps([]); }
  };

  const bkey=msgId=>`${sid}__${msgId}`;
  const getBranch=msgId=>branches[bkey(msgId)]||null;
  const getActiveText=msg=>{const b=getBranch(msg.id);return b?b.texts[b.idx]:msg.text;};
  const createBranch=async botMsg=>{
    if(typing) return;
    const i=msgs.findIndex(m=>m.id===botMsg.id);if(i<=0) return;
    const um=[...msgs].slice(0,i).reverse().find(m=>m.sender==='user');if(!um) return;
    const key=bkey(botMsg.id);const ex=branches[key];const cur=ex?ex.texts:[botMsg.text];
    toast_('Generating alternate…','info');setTyping(true);
    try{const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:um.text+' (Give a completely different approach.)',system_prompt:sysPrompt})});const data=await res.json();const nt=[...cur,data.reply||'No response.'];setBranches(p=>({...p,[key]:{texts:nt,idx:nt.length-1}}));toast_(`Branch ${nt.length} ready!`,'success');}
    catch{toast_('Branch failed','error');}finally{setTyping(false);}
  };
  const switchBranch=(msgId,dir)=>{const key=bkey(msgId);const b=branches[key];if(!b)return;const ni=Math.max(0,Math.min(b.texts.length-1,b.idx+dir));setBranches(p=>({...p,[key]:{...b,idx:ni}}));};

  const deleteChat=(e,id)=>{e.stopPropagation();setSessions(p=>p.filter(s=>s.id!==id));if(sid===id)newChat();};
  const togglePin=(e,id)=>{e.stopPropagation();setPinned(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);};
  const startRename=(e,s)=>{e.stopPropagation();setRenamingId(s.id);setRenameVal(s.title);};
  const commitRename=id=>{if(renameVal.trim())setSessions(p=>p.map(s=>s.id===id?{...s,title:renameVal.trim()}:s));setRenamingId(null);};

  const makeFolder=()=>{
    if(!newFName.trim()) return;
    const nf={id:Date.now().toString(),name:newFName.trim(),color:newFColor,sessionIds:[]};
    setFolders(f=>[...f,nf]);setFolderExpand(e=>({...e,[nf.id]:true}));
    setNewFName('');setShowFolderModal(false);
  };
  const deleteFolder=(e,fid)=>{e.stopPropagation();setFolders(f=>f.filter(x=>x.id!==fid));};
  const addSessionToFolder=(fid,sessId)=>{setFolders(fs=>fs.map(f=>f.id===fid?{...f,sessionIds:f.sessionIds.includes(sessId)?f.sessionIds.filter(i=>i!==sessId):[...f.sessionIds,sessId]}:f));};
  const removeFromFolder=(e,fid,sessId)=>{e.stopPropagation();setFolders(fs=>fs.map(f=>f.id===fid?{...f,sessionIds:f.sessionIds.filter(i=>i!==sessId)}:f));};

  const selectPlan=pid=>{setPlan(pid);const u=PLANS[pid]?.models||['omina-basic'];if(!u.includes(model.id))setModel(MODELS[0]);toast_(`${PLANS[pid].name} activated!`,'success');};
  const exportJSON=async(fmt='json')=>{
    if(!sessions.length){toast_('No chats','warning');return;}
    const curSession_=sessions.find(s=>s.id===sid)||sessions[sessions.length-1];
    const msgs=(curSession_?.messages||[]).map(m=>({role:m.sender==='user'?'user':'assistant',content:m.text||''}));
    try{
      const res=await fetch('/api/export/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,format:fmt,title:curSession_?.title||'Omina Chat'})});
      if(!res.ok){toast_('Export failed','error');return;}
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;
      const ext=fmt==='json'?'.json':fmt==='txt'?'.txt':'.md';
      a.download='omina_chat'+ext;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
      toast_('Exported as '+fmt.toUpperCase()+'!','success');
    }catch(e){toast_('Export error','error');}
  };

  /* ── ACTIVE TOOL COLORS ───────────────────────────────── */
  const TOOL_COLORS = {
    file:   {bg:'rgba(96,165,250,.12)',border:'rgba(96,165,250,.3)',color:'#60A5FA'},
    web:    {bg:'rgba(52,211,153,.1)', border:'rgba(52,211,153,.3)',color:'#34D399'},
    image:  {bg:'rgba(192,132,252,.1)',border:'rgba(192,132,252,.3)',color:'#C084FC'},
    canvas: {bg:'rgba(96,165,250,.1)', border:'rgba(96,165,250,.3)',color:'#60A5FA'},
    regen:  {bg:'rgba(52,211,153,.1)', border:'rgba(52,211,153,.3)',color:'#34D399'},
  };

  /* ── INPUT TOOLBAR ────────────────────────────────────── */
  const InputToolbar=({send,pickFile,toggleVoice,voiceOn,webSearch,setWebSearch,showImgGen,setShowImgGen,showCanvas,setShowCanvas,canvasMode,setCanvasMode,curSession,msgs,typing,stopGen,input,file,charCount,charLimit,regen,isFront,mood,setMood})=>{
    const [showPlus,setShowPlus]=useState(false);
    const [showMood,setShowMood]=useState(false);
    const [plusPos,setPlusPos]=useState({});
    const [moodPos,setMoodPos]=useState({});
    const plusBtnRef=useRef(null);
    const moodBtnRef=useRef(null);

    const openPlus=()=>{
      if(plusBtnRef.current){const r=plusBtnRef.current.getBoundingClientRect();setPlusPos({position:'fixed',bottom:window.innerHeight-r.top+8,left:r.left,zIndex:99999});}
      setShowPlus(s=>!s);setShowMood(false);
    };
    const openMood=()=>{
      if(moodBtnRef.current){const r=moodBtnRef.current.getBoundingClientRect();setMoodPos({position:'fixed',bottom:window.innerHeight-r.top+8,right:window.innerWidth-r.right,zIndex:99999});}
      setShowMood(s=>!s);setShowPlus(false);
    };

    useEffect(()=>{
      const close=e=>{
        if(!e.target.closest('[data-plus]'))setShowPlus(false);
        if(!e.target.closest('[data-mood]'))setShowMood(false);
      };
      document.addEventListener('mousedown',close);
      return()=>document.removeEventListener('mousedown',close);
    },[]);

    const TOOLS=[
      {id:'file',  icon:'fa-solid fa-paperclip',   color:'#60A5FA', label:'Attach file',       act:()=>{pickFile();setShowPlus(false);}},
      {id:'web',   icon:'fa-solid fa-globe',        color:webSearch?'#34D399':'#94A3B8', label:'Web search',   badge:webSearch?'ON':null, act:()=>{setWebSearch(s=>!s);setActiveTool(webSearch?null:{id:'web',icon:'fa-solid fa-globe',color:'#34D399',label:'Web Search'});setShowPlus(false);}},
      {id:'image', icon:'fa-regular fa-image',      color:'#C084FC', label:'Image generation',  act:()=>{setShowImgGen(true);setShowPlus(false);}},
      {id:'canvas',icon:'fa-solid fa-code',         color:canvasMode?'#60A5FA':'#94A3B8', label:'Canvas',      badge:canvasMode?'ON':null, act:()=>{const nm=!canvasMode;setCanvasMode(nm);if(!nm){setShowCanvas(false);}setActiveTool(nm?{id:'canvas',icon:'fa-solid fa-code',color:'#60A5FA',label:'Canvas'}:null);setShowPlus(false);}},
      {id:'templates', icon:'fa-solid fa-layer-group', color:'#F59E0B', label:'Templates',    badge:null, act:()=>{setShowTemplates(true);setShowPlus(false);}},
      {id:'promptlib', icon:'fa-solid fa-book-open',   color:'#8B5CF6', label:'Prompt Library',badge:null, act:()=>{setShowPromptLib(true);setShowPlus(false);}},
      {id:'cmdpal',    icon:'fa-solid fa-terminal',    color:'#10B981', label:'Commands',      badge:null, act:()=>{setShowCmdPalette(true);setShowPlus(false);}},
      {id:'lang',  icon:'fa-solid fa-language',      color:'#F59E0B', label:'Language',  badge:language!=='auto'?(LANGS.find(l=>l.id===language)?.flag||'🌐'):null, act:()=>{setShowSettings(true);setSettingsTab('language');setShowPlus(false);}},
      ...(!isFront?[{id:'regen',icon:'fa-solid fa-rotate-right',color:'#34D399',label:'Regenerate',act:()=>{regen();setShowPlus(false);},dis:typing||msgs.length===0}]:[]),
    ];
    const MC={'fast':'#FBBF24','thinking':'#A78BFA','pro':'#60A5FA'};

    const menuStyle={width:210,borderRadius:16,border:'1px solid var(--br)',background:'var(--bg2)',boxShadow:'0 24px 64px rgba(0,0,0,.6)',overflow:'hidden'};
    const menuHdr={padding:'10px 14px 4px',fontSize:10,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--t3)',margin:0};

    return(
      <div className="input-toolbar-row" style={{display:'flex',alignItems:'center',padding:'6px 12px 12px',gap:'6px'}}>
        {/* ── PLUS ── */}
        <div data-plus="1" style={{flexShrink:0}}>
          <button ref={plusBtnRef} onClick={openPlus}
            style={{width:34,height:34,borderRadius:10,border:showPlus?'1px solid rgba(96,165,250,.5)':'1px solid var(--br)',
              background:showPlus?'rgba(96,165,250,.12)':'var(--bg3)',color:showPlus?'#60A5FA':'var(--t2)',
              display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .15s'}}>
            <i className={`fa-solid ${showPlus?'fa-xmark':'fa-plus'}`} style={{fontSize:13,pointerEvents:'none'}}></i>
          </button>
          {showPlus&&ReactDOM.createPortal(
            <div data-plus="1" style={{...plusPos,...menuStyle}}>
              <p style={menuHdr}>Tools</p>
              <div style={{padding:'6px'}}>
                {TOOLS.map((item,i)=>(
                  <button key={i} onClick={item.act} disabled={item.dis}
                    style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                      borderRadius:10,border:'none',background:'transparent',cursor:item.dis?'default':'pointer',
                      color:'var(--t1)',fontSize:13,opacity:item.dis?0.35:1,textAlign:'left'}}
                    onMouseEnter={e=>{if(!item.dis)e.currentTarget.style.background='var(--bg3)';}}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <i className={item.icon} style={{color:item.color,width:14,fontSize:12,flexShrink:0}}></i>
                    <span style={{flex:1}}>{item.label}</span>
                    {item.badge&&<span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:20,background:'rgba(96,165,250,.15)',color:'#60A5FA'}}>{item.badge}</span>}
                  </button>
                ))}
              </div>
            </div>,
            document.body
          )}
        </div>

        {/* ── VOICE (STT) ── */}
        <button onClick={toggleVoice} className={voiceOn?'vp':''}
          title={voiceOn?'Stop Listening':'Voice Input (Speech-to-Text)'}
          style={{width:34,height:34,borderRadius:10,border:voiceOn?'1px solid #F87171':'1px solid var(--br)',background:voiceOn?'rgba(248,113,113,.1)':'var(--bg3)',
            color:voiceOn?'#F87171':'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',flexShrink:0,transition:'all .2s'}}>
          {voiceOn
            ? <div className="voice-wave"><span/><span/><span/><span/><span/></div>
            : <i className="fa-solid fa-microphone" style={{fontSize:13,pointerEvents:'none'}}></i>
          }
        </button>
        {/* ── AUDIO MESSAGE (MediaRecorder → Whisper) ── */}
        <button
          onClick={audioRecording ? stopAudioRecord : startAudioRecord}
          title={audioRecording?'Stop & Send Voice Message':'Send Voice Message (AI Transcription)'}
          style={{width:34,height:34,borderRadius:10,flexShrink:0,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center',
            border:audioRecording?'1px solid #EF4444':'1px solid var(--br)',
            background:audioRecording?'rgba(239,68,68,.15)':'var(--bg3)',
            color:audioRecording?'#EF4444':'var(--t2)',
            boxShadow:audioRecording?'0 0 8px rgba(239,68,68,.3)':'none'
          }}>
          {audioRecording
            ? <i className="fa-solid fa-stop" style={{fontSize:11}}></i>
            : <i className="fa-solid fa-record-vinyl" style={{fontSize:13}}></i>
          }
        </button>

        {/* ── ACTIVE TOOL BADGE in chatbox ── */}
        {(activeTool||canvasMode)&&(()=>{
          // Always show canvas badge when canvasMode is ON
          const tool = (canvasMode && (!activeTool||activeTool.id==='canvas'))
            ? {id:'canvas',icon:'fa-solid fa-code',color:'#60A5FA',label:'Canvas'}
            : activeTool;
          if(!tool) return null;
          const tc=TOOL_COLORS[tool.id]||TOOL_COLORS.file;
          return(
            <div className="tool-badge" style={{background:tc.bg,borderColor:tc.border,color:tc.color}}>
              <i className={tool.icon} style={{fontSize:10}}></i>
              <span>{tool.label}</span>
              <span className="tool-badge-close" onClick={()=>{
                setActiveTool(null);
                if(tool.id==='canvas'){setCanvasMode(false);setShowCanvas(false);}
                if(tool.id==='web'){setWebSearch(false);}
              }}>✕</span>
            </div>
          );
        })()}

        <div style={{flex:1}}></div>

        {charCount>charLimit*.7&&<span style={{fontSize:10,fontFamily:'monospace',flexShrink:0,color:charCount>charLimit*.9?'#F87171':'#FBBF24'}}>{charLimit-charCount}</span>}

        {/* ── MOOD / RESPONSE MODEL ── */}
        <div data-mood="1" style={{flexShrink:0}}>
          <button ref={moodBtnRef} onClick={openMood}
            style={{display:'flex',alignItems:'center',gap:4,padding:'4px 8px',borderRadius:7,
              border:'1px solid var(--br)',background:'var(--bg3)',cursor:'pointer',
              color:'var(--t2)',fontSize:11,fontWeight:500,whiteSpace:'nowrap',transition:'all .12s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(96,165,250,.4)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--br)'}>
            <i className={mood.icon} style={{color:MC[mood.id]||'#60A5FA',fontSize:9,pointerEvents:'none'}}></i>
            <span style={{pointerEvents:'none'}}>{mood.name}</span>
            <i className="fa-solid fa-chevron-down" style={{fontSize:7,color:'var(--t3)',pointerEvents:'none'}}></i>
          </button>
          {showMood&&ReactDOM.createPortal(
            <div data-mood="1" style={{...moodPos,
              background:'var(--bg2)',border:'1px solid var(--br)',borderRadius:10,
              boxShadow:'0 6px 24px rgba(0,0,0,.4)',padding:'4px',minWidth:180,overflow:'hidden'}}>
              <p style={{fontSize:9,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',
                color:'var(--t3)',padding:'5px 8px 3px',margin:0}}>Response Model</p>
              {MOODS.map(m=>{
                const active=mood.id===m.id;
                const clr={'fast':'#F59E0B','thinking':'#8B5CF6','pro':'#3B82F6'}[m.id]||'#60A5FA';
                return(
                  <button key={m.id} onClick={()=>{setMood(m);setShowMood(false);}}
                    style={{display:'flex',alignItems:'center',gap:8,width:'100%',
                      padding:'6px 8px',borderRadius:7,border:'none',cursor:'pointer',
                      background:active?'var(--bg3)':'transparent',transition:'background .1s'}}
                    onMouseEnter={e=>{if(!active)e.currentTarget.style.background='var(--bg3)';}}
                    onMouseLeave={e=>{if(!active)e.currentTarget.style.background='transparent';}}>
                    <i className={m.icon} style={{fontSize:11,color:clr,width:14,textAlign:'center',flexShrink:0}}></i>
                    <div style={{flex:1,textAlign:'left'}}>
                      <p style={{margin:0,fontSize:12,fontWeight:active?600:400,color:active?'var(--t1)':'var(--t2)',lineHeight:1.2}}>{m.name}</p>
                      <p style={{margin:0,fontSize:9.5,color:'var(--t3)',lineHeight:1.3}}>{m.desc}</p>
                    </div>
                    {active&&<i className="fa-solid fa-check" style={{fontSize:8,color:clr,flexShrink:0}}></i>}
                  </button>
                ))
              }
            </div>,
            document.body
          )}
        </div>

        {/* ── SEND / STOP ── */}
        {(typing||typewriterMsgId)
          ?<button onClick={stopGen}
              style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:10,
                border:'none',background:'#DC2626',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',flexShrink:0}}
              onMouseEnter={e=>e.currentTarget.style.background='#EF4444'}
              onMouseLeave={e=>e.currentTarget.style.background='#DC2626'}>
              <i className="fa-solid fa-stop" style={{fontSize:10}}></i> Stop
            </button>
          :<button onClick={()=>send()} disabled={!input.trim()&&!file}
              style={{width:34,height:34,borderRadius:10,border:'none',
                background:(!input.trim()&&!file)?'var(--bg3)':'#2563EB',
                color:(!input.trim()&&!file)?'var(--t3)':'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',
                cursor:(!input.trim()&&!file)?'default':'pointer',flexShrink:0,
                boxShadow:(!input.trim()&&!file)?'none':'0 4px 14px rgba(37,99,235,.35)',transition:'all .15s'}}>
              <i className="fa-solid fa-arrow-up" style={{fontSize:13}}></i>
            </button>
        }
      </div>
    );
  };

  /* ── SUB COMPONENTS ───────────────────────────────────── */
  const ToggleRow=({label,desc,val,set})=>(
    <div className="flex items-center justify-between py-3 border-b" style={{borderColor:'var(--br)'}}>
      <div><p className="text-sm font-medium" style={{color:'var(--t1)'}}>{label}</p>{desc&&<p className="text-xs mt-0.5" style={{color:'var(--t3)'}}>{desc}</p>}</div>
      <label className="tgl-wrap flex-shrink-0"><input type="checkbox" className="tgl" checked={val} onChange={()=>set(!val)}/><span className="tgl-l"></span></label>
    </div>
  );

  const FileBar=()=>files.length>0&&(
    <div className="px-4 py-2.5 border-b" style={{borderColor:'var(--br)'}}>
      <div className="flex items-center gap-2 flex-wrap">
        {files.map(f=>(
          <div key={f.id} className="flex items-center gap-2 px-2.5 py-1.5 rounded-xl border relative group" style={{background:'var(--bg3)',borderColor:f.content?'rgba(99,102,241,.4)':'var(--brh)',maxWidth:200}}>
            {f.preview
              ?<img src={f.preview} className="w-7 h-7 object-cover rounded-lg flex-shrink-0" alt=""/>
              :<div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0" style={{background:f.content?'rgba(99,102,241,.2)':'rgba(59,130,246,.15)'}}>
                <i className={`fa-solid ${f.type==='application/pdf'?'fa-file-pdf':f.name.endsWith('.py')?'fa-file-code':f.name.endsWith('.json')?'fa-brackets-curly':f.name.match(/\.(js|ts|jsx|tsx)$/)?'fa-js':f.name.endsWith('.html')?'fa-html5':'fa-file-lines'} text-xs`} style={{color:f.content?'#818cf8':'#60A5FA'}}></i>
              </div>
            }
            <div className="min-w-0 flex-1">
              <p className="text-[10px] font-medium truncate" style={{color:'var(--t1)'}}>{f.name}</p>
              <p className="text-[9px] flex items-center gap-1" style={{color:'var(--t3)'}}>
                {(f.size/1024).toFixed(1)}KB
                {f.content && <span style={{color:'#818cf8',fontWeight:600}}>&middot; &#10003; readable</span>}
                {f.fileType==='image' && <span style={{color:'#34d399',fontWeight:600}}>&middot; image</span>}
              </p>
            </div>
            {f.content && (
              <div className="absolute bottom-full left-0 mb-2 w-64 p-3 rounded-xl border shadow-2xl z-50 hidden group-hover:block" style={{background:'var(--bg2)',borderColor:'var(--brh)'}}>
                <p className="text-[9px] font-bold mb-1.5" style={{color:'#818cf8'}}>Content Preview</p>
                <p className="text-[9px] font-mono" style={{color:'var(--t2)',whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:'80px',overflow:'hidden'}}>{f.content.slice(0,200)}{f.content.length>200?'...':''}</p>
                <p className="text-[9px] mt-1.5" style={{color:'var(--t3)'}}>{f.content.length.toLocaleString()} chars &middot; AI will analyze this</p>
              </div>
            )}
            <button onClick={()=>{setFiles(p=>p.filter(x=>x.id!==f.id));if(files.length===1){setFile(null);setFilePreview(null);}}} className="w-4 h-4 flex items-center justify-center rounded-full flex-shrink-0 hover:text-red-400 transition-colors" style={{color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}>
              <i className="fa-solid fa-xmark" style={{fontSize:9}}></i>
            </button>
          </div>
        ))}
        {files.length<5&&<button onClick={pickFile} className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl border border-dashed text-xs transition-all hover:border-blue-500 hover:text-blue-400" style={{borderColor:'var(--brh)',color:'var(--t3)'}}>
          <i className="fa-solid fa-plus text-xs"></i>Add
        </button>}
      </div>
      <p className="text-[9px] mt-1.5 flex items-center gap-2" style={{color:'var(--t3)'}}>
        {files.length}/5 files
        {files.some(f=>f.content) && <span style={{color:'#818cf8'}}>&middot; {files.filter(f=>f.content).length} file(s) will be analyzed by AI</span>}
        &nbsp;&middot;&nbsp;<button onClick={()=>{setFiles([]);setFile(null);setFilePreview(null);}} style={{color:'#f87171',background:'none',border:'none',cursor:'pointer',fontSize:9}}>Clear all</button>

  const calcPress = (val) => {
    if(val==='AC'){setCalcDisplay('0');setCalcExpr('');setCalcNewNum(true);return;}
    if(val==='⌫'){
      if(calcNewNum){setCalcDisplay('0');return;}
      const d=calcDisplay.length>1?calcDisplay.slice(0,-1):'0';
      setCalcDisplay(d);
      if(d==='0')setCalcNewNum(true);
      return;
    }
    if(val==='±'){setCalcDisplay(d=>d.startsWith('-')?d.slice(1):d==='0'?'0':'-'+d);return;}
    if(val==='%'){
      try{const v=parseFloat(calcDisplay)/100;setCalcDisplay(String(v));}catch(_){}
      return;
    }
    if(val==='='){
      try{
        const expr = calcExpr + calcDisplay;
        // Safe eval using Function
        const result = Function('"use strict";return ('+expr.replace(/×/g,'*').replace(/÷/g,'/')+')')();
        const res = parseFloat(result.toFixed(10)).toString();
        setCalcHistory(h=>[{expr:expr+'='+res, time:new Date().toLocaleTimeString()},...h].slice(0,20));
        setCalcDisplay(res);
        setCalcExpr('');
        setCalcNewNum(true);
      }catch(_){setCalcDisplay('Error');setCalcExpr('');setCalcNewNum(true);}
      return;
    }
    if(['+','-','×','÷'].includes(val)){
      setCalcExpr((calcNewNum?'':calcDisplay)+val);
      setCalcNewNum(true);
      return;
    }
    if(val==='.'){
      if(calcDisplay.includes('.')){return;}
      setCalcDisplay(d=>calcNewNum?'0.':d+'.');
      setCalcNewNum(false);
      return;
    }
    // Number
    if(calcNewNum){setCalcDisplay(val);setCalcNewNum(false);}
    else{setCalcDisplay(d=>d==='0'?val:d.length<15?d+val:d);}
  };

    try{
      const res = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          message: `[TONE ANALYSIS TASK] Analyze the emotional tone and writing style of this text. Return a JSON object ONLY (no markdown, no explanation) with these exact keys:
{
  "primary_tone": "one word (e.g. Formal, Casual, Angry, Sad, Happy, Excited, Sarcastic, Neutral, Professional, Persuasive, Friendly, Anxious, Confident, Empathetic)",
  "secondary_tones": ["up to 3 secondary tones as strings"],
  "formality": "Formal | Semi-formal | Informal",
  "sentiment": "Positive | Negative | Neutral | Mixed",
  "energy": "High | Medium | Low",
  "confidence": 85,
  "summary": "One sentence description of the tone"
}

Text to analyze:
"""${toneText}"""`,
          system_prompt:'You are a tone analysis expert. Return ONLY valid JSON. No markdown code blocks. No explanation.',
          history:[],mood:'professional',model:'llama-3.3-70b-versatile'
        })
      });
      const data = await res.json();
      const raw = (data.reply||'').replace(/\`\`\`json|\`\`\`/g,'').trim();
      const json = JSON.parse(raw);
      setToneResult(json);

                  {conceptData&&<button onClick={()=>setConceptData(null)} style={{padding:'7px 13px',borderRadius:10,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.5)',fontSize:11,fontWeight:600,cursor:'pointer',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.11)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.05)'}><i className="fa-solid fa-rotate-right" style={{marginRight:5,fontSize:10}}/>Reset</button>}
                  <button onClick={()=>setShowConceptMap(false)} style={{width:34,height:34,borderRadius:10,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.05)'}>
                    <i className="fa-solid fa-xmark" style={{fontSize:13}}/>
                  </button>

                  {id:'compare', ic:'fa-table-columns',  label:'Compare',     color:'#10B981'},
                  {id:'deep',    ic:'fa-layer-group',    label:'Deep Dive',   color:'#F59E0B'},

                  </button>;

            {/* ── Input ── */}

                  style={{flex:1,borderRadius:14,padding:'12px 16px',fontSize:13,outline:'none',border:'1px solid var(--br)',background:'var(--bg3)',color:'var(--t1)',fontFamily:'inherit',transition:'border-color .2s'}}

                      <i className="fa-solid fa-stop" style={{fontSize:10}}/>Stop
                    </button>
                  :<button id="cmap-btn" onClick={async()=>{
                    if(!conceptTopic.trim())return;
                    const ps={
                      branches:`Create a detailed mind map for "${conceptTopic}". Return ONLY JSON: {"center":"${conceptTopic}","branches":[{"label":"Branch Name","color":"#hexcolor","icon":"fa-icon-name","nodes":["node1","node2","node3","node4"]}]} Include 5-7 branches with 3-5 nodes each. Use varied hex colors.`,
                      timeline:`Create a chronological timeline for "${conceptTopic}". Return ONLY JSON: {"center":"${conceptTopic}","branches":[{"label":"Time Period","color":"#hexcolor","icon":"fa-clock","nodes":["event1","event2","event3"]}]} Include 5-6 time periods chronologically.`,
                      compare:`Compare "${conceptTopic}" from multiple angles. Return ONLY JSON: {"center":"${conceptTopic}","branches":[{"label":"Aspect Name","color":"#hexcolor","icon":"fa-icon","nodes":["item A description","item B description"]}]} Include 5-6 comparison aspects.`,
                      deep:`Deep dive into "${conceptTopic}". Return ONLY JSON: {"center":"${conceptTopic}","branches":[{"label":"Definition","color":"#3B82F6","icon":"fa-book","nodes":[]},{"label":"Core Concepts","color":"#8B5CF6","icon":"fa-key","nodes":[]},{"label":"How It Works","color":"#10B981","icon":"fa-gears","nodes":[]},{"label":"Real-World Uses","color":"#F59E0B","icon":"fa-rocket","nodes":[]},{"label":"Challenges","color":"#EF4444","icon":"fa-triangle-exclamation","nodes":[]},{"label":"Future Trends","color":"#06B6D4","icon":"fa-forward","nodes":[]}]}`,
                    };
                    const ctrl=new AbortController();conceptAbortRef.current=ctrl;
                    setConceptLoading(true);setConceptData(null);
                    try{
                      const r=await fetch('/chat',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},body:JSON.stringify({message:ps[conceptMapMode],system_prompt:'You are a knowledge mapping assistant. Always respond with valid JSON only, no markdown fences.'})});
                      const d=await r.json();
                      const clean=(d.reply||'{}').replace(/```json|```/g,'').trim();
                      setConceptData(JSON.parse(clean));
                    }catch(e){if(e.name!=='AbortError')setConceptData({center:conceptTopic,branches:[{label:'Error',color:'#EF4444',icon:'fa-circle-xmark',nodes:['Could not parse response','Try rephrasing your topic','Use a simpler term']}]});}
                    finally{setConceptLoading(false);conceptAbortRef.current=null;}
                  }} disabled={!conceptTopic.trim()} style={{padding:'0 22px',borderRadius:14,border:'none',background:conceptTopic.trim()?'linear-gradient(135deg,#8B5CF6,#EC4899)':'var(--bg3)',color:conceptTopic.trim()?'#fff':'var(--t3)',fontSize:13,fontWeight:800,cursor:conceptTopic.trim()?'pointer':'default',flexShrink:0,display:'flex',alignItems:'center',gap:8,transition:'all .2s',boxShadow:conceptTopic.trim()?'0 4px 18px rgba(139,92,246,.4)':'none'}}

                  </div>)}

              </div>}

                <div style={{display:'flex',justifyContent:'center',marginBottom:22}}>
                  <div style={{padding:'11px 28px',borderRadius:99,fontWeight:900,color:'#fff',fontSize:16,background:'linear-gradient(135deg,#8B5CF6,#EC4899)',boxShadow:'0 6px 28px rgba(139,92,246,.45)',display:'flex',alignItems:'center',gap:10,letterSpacing:'-.2px'}}>

                    </div>

                </div>
                {/* Actions */}
                <div style={{display:'flex',gap:8,marginTop:18}}>
                  <button onClick={()=>{const md='# '+conceptData.center+'\n\n'+(conceptData.branches||[]).map(b=>'## '+b.label+'\n'+(b.nodes||[]).map(n=>'- '+n).join('\n')).join('\n\n');navigator.clipboard.writeText(md).then(()=>toast_('Copied as Markdown!','success'));}} style={{flex:1,padding:'11px',borderRadius:13,border:'1px solid rgba(139,92,246,.3)',background:'rgba(139,92,246,.07)',color:'#a78bfa',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:7,transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(139,92,246,.14)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(139,92,246,.07)'}>
                    <i className="fa-solid fa-copy" style={{fontSize:10}}/>Markdown

                  <button onClick={()=>setShowStoryGen(false)} style={{width:34,height:34,borderRadius:10,border:'1px solid rgba(255,255,255,.1)',background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.12)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.05)'}>
                    <i className="fa-solid fa-xmark" style={{fontSize:13}}/>
                  </button>
                </div>
              </div>
            </div>

                  {[
                    {id:'fantasy',   label:'Fantasy',    icon:'fa-wand-sparkles',    color:'#8B5CF6'},
                    {id:'scifi',     label:'Sci-Fi',     icon:'fa-rocket',           color:'#3B82F6'},
                    {id:'horror',    label:'Horror',     icon:'fa-skull',            color:'#EF4444'},
                    {id:'romance',   label:'Romance',    icon:'fa-heart',            color:'#EC4899'},
                    {id:'mystery',   label:'Mystery',    icon:'fa-magnifying-glass', color:'#F59E0B'},
                    {id:'adventure', label:'Adventure',  icon:'fa-compass',          color:'#10B981'},
                    {id:'thriller',  label:'Thriller',   icon:'fa-bolt',             color:'#06B6D4'},
                    {id:'comedy',    label:'Comedy',     icon:'fa-face-laugh',       color:'#F97316'},

                    </div>

          </div>

      {/* ═══ QUIZ GENERATOR ═══ */}
      {showQuiz&&(
        <div className="feat-modal-wrap fixed inset-0 z-[200] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.88)'}} onClick={()=>{setShowQuiz(false);if(featFromSettings){setFeatFromSettings(false);setShowSettings(true);setSettingsTab('quickaccess');}}}>
          <div className="feat-modal-inner w-full max-w-2xl rounded-3xl border shadow-2xl flex flex-col" style={{background:'var(--bg2)',borderColor:'rgba(245,158,11,.18)',maxHeight:'92vh',boxShadow:'0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(245,158,11,.07)'}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div className="px-6 py-5 border-b flex-shrink-0" style={{borderColor:'rgba(245,158,11,.12)',background:'linear-gradient(135deg,rgba(245,158,11,.11),rgba(239,68,68,.07),transparent)'}}>

                  <div className="w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0" style={{background:'linear-gradient(145deg,#F59E0B,#EF4444)',boxShadow:'0 6px 20px rgba(245,158,11,.4),inset 0 1px 0 rgba(255,255,255,.2)'}}>
                    <i className="fa-solid fa-circle-question text-white" style={{fontSize:17}}></i>
                  </div>
                  <div>
                    <div className="flex items-center gap-2">
                      <p className="font-bold text-base" style={{color:'var(--t1)'}}>Quiz Generator</p>
                      {quizSubmitted&&<span className="text-[9px] font-bold px-1.5 py-0.5 rounded-full" style={{background:'rgba(16,185,129,.15)',color:'#10B981',border:'1px solid rgba(16,185,129,.25)'}}>DONE ✓</span>}
                    </div>
                    <p className="text-[11px] mt-0.5" style={{color:'var(--t3)'}}>AI-powered · MCQ · True/False · Fill-in-Blank</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  {quizSubmitted&&(
                    <button onClick={()=>{setQuizQuestions([]);setQuizAnswers({});setQuizSubmitted(false);setQuizScore(0);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all" style={{borderColor:'rgba(245,158,11,.3)',color:'#F59E0B',background:'rgba(245,158,11,.08)'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(245,158,11,.16)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(245,158,11,.08)'}>
                      <i className="fa-solid fa-rotate-right text-[10px]"></i>New Quiz
                    </button>
                  )}
                  <button onClick={()=>{setShowQuiz(false);if(featFromSettings){setFeatFromSettings(false);setShowSettings(true);setSettingsTab('quickaccess');}}} className="w-8 h-8 rounded-xl flex items-center justify-center transition-all" style={{color:'var(--t3)'}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,.08)';e.currentTarget.style.color='var(--t1)';}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='var(--t3)';}}><i className="fa-solid fa-xmark"></i></button>
                </div>
              </div>
              {/* Score strip — shows after quiz done */}
              {quizSubmitted?(
                <div className="flex gap-2">
                  {[{lbl:'Score',val:quizScore+'%',col:quizScore>=70?'#10B981':'#EF4444'},{lbl:'Correct',val:Object.values(quizAnswers).filter((a,i)=>a===quizQuestions[i]?.answer).length+'/'+quizQuestions.length,col:'#F59E0B'},{lbl:'Grade',val:quizScore===100?'A+':quizScore>=80?'A':quizScore>=70?'B':quizScore>=60?'C':'D',col:'#818cf8'},{lbl:'Result',val:quizScore>=70?'Pass 🎉':'Retry 📚',col:quizScore>=70?'#10B981':'#EF4444'}].map(s=>(
                    <div key={s.lbl} className="flex-1 text-center py-2.5 rounded-2xl" style={{background:s.col+'10',border:'1px solid '+s.col+'28'}}>
                      <p className="text-base font-black" style={{color:s.col}}>{s.val}</p>
                      <p className="text-[9px] font-bold uppercase tracking-widest mt-0.5" style={{color:'var(--t3)'}}>{s.lbl}</p>
                    </div>
                  ))}
                </div>
              ):(
                <div className="flex gap-2">
                  {(()=>{
                    const qActs=[
                      {ic:'fa-book',lbl:'Any Topic',col:'#F59E0B',act:()=>{setQuizConfig(cfg=>({...cfg,topic:''}));toast_('Pick any topic!','info');}},
                      {ic:'fa-list-check',lbl:'MCQ',col:'#10B981',act:()=>{setQuizConfig(cfg=>({...cfg,type:'mcq'}));toast_('Multiple Choice selected','success');}},
                      {ic:'fa-toggle-on',lbl:'True/False',col:'#818cf8',act:()=>{setQuizConfig(cfg=>({...cfg,type:'truefalse'}));toast_('True/False selected','success');}},
                      {ic:'fa-pen',lbl:'Fill Blank',col:'#06B6D4',act:()=>{setQuizConfig(cfg=>({...cfg,type:'fill'}));toast_('Fill in Blank selected','success');}},
                    ];
                    return qActs.map(s=>(
                      <button key={s.lbl} onClick={s.act} className="flex-1 flex items-center gap-1.5 px-2 py-2.5 rounded-xl transition-all" style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.background=s.col+'18';e.currentTarget.style.borderColor=s.col+'44';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.04)';e.currentTarget.style.borderColor='rgba(255,255,255,.07)';}}>
                        <i className={`fa-solid ${s.ic}`} style={{color:s.col,fontSize:11}}></i>
                        <span className="text-[10px] font-semibold" style={{color:'var(--t2)'}}>{s.lbl}</span>
                      </button>
                    ));
                  })()}
                </div>
              )}
            </div>

            <div className="flex-1 overflow-y-auto sb p-5 feat-loading-wrap">
              {quizLoading&&<div className="feat-load-overlay" style={{zIndex:10}}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}><div className="fl-clock"><div className="fl-hour"></div><div className="fl-minute"></div></div><span className="fl-label">Generating quiz...</span><button onClick={()=>{if(quizAbortRef.current)quizAbortRef.current.abort();setQuizLoading(false);}} style={{marginTop:4,padding:'6px 18px',borderRadius:8,background:'#dc2626',color:'#fff',border:'none',fontWeight:700,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}><i className="fa-solid fa-stop" style={{fontSize:9}}></i>Stop</button></div></div>}
              {quizQuestions.length===0?(
                <div className="space-y-5">
                  {/* Topic */}
                  <div>
                    <p className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Topic</p>
                    <input value={quizConfig.topic} onChange={e=>setQuizConfig(c=>({...c,topic:e.target.value}))} placeholder="e.g. JavaScript promises, World War II, Human anatomy..." className="w-full rounded-xl px-4 py-3 text-sm outline-none border transition-all quiz-topic-input" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}} onFocus={e=>e.target.style.borderColor='rgba(245,158,11,.4)'} onBlur={e=>e.target.style.borderColor='var(--br)'}/>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {['JavaScript','React','Python','History','Science','Math','Geography','Biology'].map(t=>(
                        <button key={t} onClick={()=>setQuizConfig(c=>({...c,topic:t}))} className="px-2.5 py-1 rounded-full text-[10px] border transition-all" style={{borderColor:'rgba(245,158,11,.25)',color:'#F59E0B',background:'rgba(245,158,11,.08)'}}>{t}</button>
                      ))}
                    </div>
                  </div>
                  {/* Type + Difficulty + Count */}
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <p className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Type</p>
                      <div className="space-y-1.5">
                        {[['mcq','fa-list-ul','Multiple Choice'],['truefalse','fa-toggle-on','True / False'],['fill','fa-pen','Fill in blank']].map(([v,ic,lb])=>(
                          <button key={v} onClick={()=>setQuizConfig(c=>({...c,type:v}))} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs border transition-all" style={{background:quizConfig.type===v?'rgba(245,158,11,.15)':'var(--bg3)',borderColor:quizConfig.type===v?'rgba(245,158,11,.5)':'var(--br)',color:quizConfig.type===v?'#F59E0B':'var(--t2)'}}>
                            <i className={`fa-solid ${ic} text-[10px]`}></i>{lb}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <p className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Difficulty</p>
                      <div className="space-y-1.5">
                        {[['easy','#10B981','🟢'],['medium','#F59E0B','🟡'],['hard','#EF4444','🔴'],['expert','#8B5CF6','🟣']].map(([v,c,e])=>(
                          <button key={v} onClick={()=>setQuizConfig(cfg=>({...cfg,difficulty:v}))} className="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-xs border transition-all capitalize" style={{background:quizConfig.difficulty===v?c+'18':'var(--bg3)',borderColor:quizConfig.difficulty===v?c+'55':'var(--br)',color:quizConfig.difficulty===v?c:'var(--t2)'}}>
                            {e} {v}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <p className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Questions</p>
                      <div className="space-y-1.5">
                        {[3,5,10,15].map(n=>(
                          <button key={n} onClick={()=>setQuizConfig(c=>({...c,count:n}))} className="w-full px-3 py-2 rounded-xl text-xs border transition-all" style={{background:quizConfig.count===n?'rgba(245,158,11,.15)':'var(--bg3)',borderColor:quizConfig.count===n?'rgba(245,158,11,.5)':'var(--br)',color:quizConfig.count===n?'#F59E0B':'var(--t2)'}}>{n} questions</button>
                        ))}
                      </div>
                    </div>
                  </div>
                  {quizLoading?(
                    <button onClick={()=>{if(quizAbortRef.current)quizAbortRef.current.abort();setQuizLoading(false);}} className="w-full py-3.5 rounded-xl text-sm font-bold text-white flex items-center justify-center gap-2" style={{background:'linear-gradient(135deg,#dc2626,#b91c1c)',boxShadow:'0 0 16px rgba(220,38,38,.35)'}}>
                      <i className="fa-solid fa-stop text-xs"></i>Stop Generating
                    </button>
                  ):(
                    <button onClick={async()=>{
                      if(!quizConfig.topic.trim()){toast_('Enter a topic first','info');return;}
                      const ctrl=new AbortController(); quizAbortRef.current=ctrl;
                      setQuizLoading(true);
                      const typeInstr=quizConfig.type==='mcq'?'Multiple choice with 4 options (a,b,c,d), mark correct with "answer" field':quizConfig.type==='truefalse'?'True/False questions, answer field should be "true" or "false"':'Fill in the blank, use ___ in the question, answer field has the word';
                      try{
                        const res=await fetch('/chat',{method:'POST',signal:ctrl.signal,headers:{'Content-Type':'application/json'},body:JSON.stringify({message:`Generate ${quizConfig.count} ${quizConfig.difficulty} ${quizConfig.type} quiz questions about "${quizConfig.topic}". ${typeInstr}. Return ONLY a JSON array: [{"q":"question text","options":["a) ...","b) ...","c) ...","d) ..."],"answer":"a","explanation":"why this is correct"}]. For true/false omit options array. Respond with valid JSON only.`,system_prompt:'You are a quiz generator. Respond with valid JSON array only, no markdown.'})});
                        const data=await res.json();
                        const clean=(data.reply||'[]').replace(/```json|```/g,'').trim();
                        const qs=JSON.parse(clean);
                        setQuizQuestions(Array.isArray(qs)?qs:[]);
                        setQuizAnswers({});setQuizSubmitted(false);setQuizScore(0);
                      }catch(e){if(e.name!=='AbortError')toast_('Failed to generate quiz — check Ollama','error');}
                      finally{setQuizLoading(false); quizAbortRef.current=null;}
                    }} disabled={!quizConfig.topic.trim()} className="w-full py-3.5 rounded-xl text-sm font-bold text-white flex items-center justify-center gap-2 disabled:opacity-40" style={{background:'linear-gradient(135deg,#F59E0B,#EF4444)',boxShadow:'0 4px 16px rgba(245,158,11,.25)'}}>
                      <i className="fa-solid fa-wand-magic-sparkles text-xs"></i>Generate Quiz
                    </button>
                  )}
                </div>
              ):(
                <div className="space-y-4">
                  {/* Score banner */}

                    <div className="rounded-2xl border p-5 text-center" style={{borderColor:quizScore>=70?'rgba(16,185,129,.3)':'rgba(239,68,68,.3)',background:quizScore>=70?'rgba(16,185,129,.06)':'rgba(239,68,68,.04)'}}>
                      <p className="text-4xl mb-2">{quizScore===100?'🎉':quizScore>=80?'🌟':quizScore>=70?'💪':quizScore>=50?'📚':'🔄'}</p>
                      <p className="text-lg font-black mb-1" style={{color:quizScore>=70?'#10B981':'#EF4444'}}>{quizScore===100?'Perfect Score!':quizScore>=80?'Excellent Work!':quizScore>=70?'Great Job!':quizScore>=50?'Good Effort!':'Keep Practicing!'}</p>
                      <p className="text-sm" style={{color:'var(--t2)'}}>See your detailed results in the header above</p>
                    </div>
                  )}
                  {/* Questions */}
                  {quizQuestions.map((q,qi)=>{
                    const userAns=quizAnswers[qi];
                    const isCorrect=userAns===q.answer;
                    return(
                      <div key={qi} className="rounded-xl border p-4" style={{borderColor:quizSubmitted?(isCorrect?'rgba(16,185,129,.4)':'rgba(239,68,68,.35)'):'var(--br)',background:quizSubmitted?(isCorrect?'rgba(16,185,129,.06)':'rgba(239,68,68,.04)'):'var(--bg3)'}}>
                        <div className="flex items-start gap-2 mb-3">
                          <span className="text-xs font-bold flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center" style={{background:'rgba(245,158,11,.15)',color:'#F59E0B'}}>{qi+1}</span>
                          <p className="text-sm font-medium leading-relaxed" style={{color:'var(--t1)'}}>{q.q}</p>
                          {quizSubmitted&&<i className={`fa-solid ${isCorrect?'fa-check':'fa-xmark'} flex-shrink-0 ml-auto`} style={{color:isCorrect?'#10B981':'#EF4444'}}></i>}
                        </div>
                        {/* MCQ options */}
                        {quizConfig.type==='mcq'&&q.options&&(
                          <div className="space-y-1.5">
                            {q.options.map((opt,oi)=>{
                              const optKey=String.fromCharCode(97+oi);
                              const selected=userAns===optKey;
                              const isAns=q.answer===optKey;
                              let bg='var(--bg2)',bc='var(--br)',tc='var(--t2)';
                              if(quizSubmitted){if(isAns){bg='rgba(16,185,129,.12)';bc='rgba(16,185,129,.4)';tc='#10B981';}else if(selected&&!isAns){bg='rgba(239,68,68,.08)';bc='rgba(239,68,68,.3)';tc='#EF4444';}}
                              else if(selected){bg='rgba(245,158,11,.12)';bc='rgba(245,158,11,.4)';tc='#F59E0B';}
                              return(<button key={oi} onClick={()=>{if(!quizSubmitted)setQuizAnswers(p=>({...p,[qi]:optKey}));}} className="w-full text-left px-3 py-2 rounded-xl text-xs border transition-all" style={{background:bg,borderColor:bc,color:tc}}>{opt}</button>))
                            }
                          </div>
                        )}
                        {/* True/False */}
                        {quizConfig.type==='truefalse'&&(
                          <div className="flex gap-2">
                            {['true','false'].map(v=>{

                </span>
              </div>
              <span className="text-[9px]" style={{color:'rgba(255,255,255,.15)'}}>{allCmds.length} commands available</span>
            </div>
          </div>
        );
      })()}
    </div>
  </div>
)}

              {/* Date to */}

                      <span><span className="font-bold" style={{color:'#10B981'}}>Regex:</span> \bimport\s+\w+</span>

                    const words=msgSearchQ.split(/\s+/).filter(w=>w.length>2);
                    words.forEach(w=>{hi=hi.replace(new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark style="background:rgba(16,185,129,.25);color:#6EE7B7;padding:0 2px;border-radius:3px">$1</mark>');});

                    try{hi=hi.replace(new RegExp(`(${msgSearchQ})`,'gi'),'<mark style="background:rgba(139,92,246,.3);color:#C4B5FD;padding:0 2px;border-radius:3px">$1</mark>');}catch(e){}

                      </div>
                      <p className="text-xs leading-relaxed" style={{color:'var(--t2)'}} dangerouslySetInnerHTML={{__html:'…'+hi+'…'}}/>
                    </button>

                });
              })()}

                            {m.fn&&<p className="text-[8px] text-slate-300 truncate">{m.fn}</p>}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

              })()}

              {/* RELATED CHATS TAB */}

                if(!msgSearchQ.trim()) return(
                  <div className="flex flex-col items-center justify-center py-14 gap-2" style={{color:'var(--t3)'}}>

                        <div className="flex-shrink-0 mt-0.5">

            </div>

              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg flex items-center justify-center" style={{background:'rgba(59,130,246,.12)'}}><i className="fa-solid fa-keyboard text-blue-400" style={{fontSize:11}}></i></div>

                <span className="text-[10px] px-2 py-0.5 rounded-full font-bold" style={{background:'rgba(59,130,246,.12)',color:'#60a5fa'}}>All Features</span>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">

                    ['Send message','Enter'],

                    ['Stop generation','Escape'],
                    ['Regen / Alt reply','Alt button'],
                  ]],
                  ['Navigation','fa-compass','#f59e0b',[
                    ['Search chats','Ctrl + K'],
                    ['Shortcuts panel','Ctrl + /'],
                    ['Custom instructions','Ctrl + P'],
                    ['Message search','Ctrl + Shift + F'],
                    ['Command palette','Ctrl + Shift + P'],
                    ['Chat summary','Ctrl + M'],

                  ['Tools','fa-wrench','#a78bfa',[
                    ['To-Do List','Ctrl + Shift + T'],
                    ['Sticky Notes','Ctrl + Shift + N'],
                    ['AI Agent','Ctrl + Shift + A'],
                    ['Image Generator','Toolbar'],
                    ['Voice input','Toolbar'],
                    ['Attach file','Toolbar'],
                  ]],
                  ['Messages','fa-message','#34d399',[

                    ['Copy message','Copy icon'],
                    ['Star message','Star icon'],

                      </div>

                    <div className="space-y-2">
                      {items.map(([action,keys])=>(
                        <div key={action} className="flex items-center justify-between gap-2">

                            {keys.split(' + ').map((k,i)=>(

              <p className="text-center text-[10px] mt-4" style={{color:'var(--t3)'}}>Press <span style={{fontFamily:'JetBrains Mono, monospace'}}>Ctrl + /</span> anytime to open this panel</p>
            </div>
          </div>
        </div>
      )}

      <div className={`sidebar-overlay ${sidebarOpen?'active':''}`} onClick={()=>setSidebarOpen(false)}></div>

      {/* ── SEARCH MODAL ── */}
      {showSearch&&(
        <div className="fixed inset-0 z-[150] flex items-start justify-center pt-20 px-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.7)'}} onClick={()=>setShowSearch(false)}>
          <div className="w-full max-w-lg mi" onClick={e=>e.stopPropagation()}>
            <div className="rounded-2xl border overflow-hidden shadow-2xl" style={{background:'var(--bg2)',borderColor:'var(--br)'}}>
              <div className="flex items-center gap-3 px-4 py-3 border-b" style={{borderColor:'var(--br)'}}>
                <i className="fa-solid fa-magnifying-glass text-sm" style={{color:'var(--t3)'}}></i>
                <input ref={searchRef} value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search chats…" className="flex-1 bg-transparent text-sm outline-none placeholder-slate-500" style={{color:'var(--t1)'}}/>
                <span className="kbd">ESC</span>
              </div>
              <div className="max-h-80 overflow-y-auto sb py-2">
                {filteredSessions.length===0?<p className="text-center text-sm py-8" style={{color:'var(--t3)'}}>No chats found</p>
                :filteredSessions.map(s=>(
                  <button key={s.id} onClick={()=>{setSid(s.id);setShowSearch(false);setSearchQ('');}} className="w-full text-left px-4 py-3 transition-colors flex items-center gap-3" onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <i className="fa-regular fa-message text-xs" style={{color:'var(--t3)'}}></i>
                    <div><p className="text-sm truncate" style={{color:'var(--t1)'}}>{s.title}</p><p className="text-xs" style={{color:'var(--t3)'}}>{s.messages?.length||0} messages</p></div>
                  </button>
                ))}
              </div>
              {allStarred.length>0&&<div className="border-t p-2" style={{borderColor:'var(--br)'}}>
                <p className="text-[10px] font-bold tracking-widest uppercase px-2 mb-1 flex items-center gap-1" style={{color:'var(--t3)'}}><i className="fa-solid fa-star text-amber-400"></i> Starred</p>
                {allStarred.slice(0,3).map(m=>(
                  <button key={m.id} onClick={()=>{setSid(m.ssid);setShowSearch(false);}} className="w-full text-left px-3 py-2 rounded-lg transition-colors" onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <p className="text-xs truncate" style={{color:'var(--t1)'}}>{m.text?.slice(0,80)}</p>
                    <p className="text-[10px]" style={{color:'var(--t3)'}}>{m.stitle}</p>
                  </button>
                ))}
              </div>}
            </div>
          </div>
        </div>
      )}

      {/* ── USAGE DASHBOARD MODAL ── */}
      {showDashboard&&(()=>{
        const totalMsgs    = sessions.reduce((a,s)=>a+(s.messages?.length||0),0);
        const userMsgs     = sessions.reduce((a,s)=>a+(s.messages?.filter(m=>m.sender==='user').length||0),0);
        const botMsgs      = totalMsgs - userMsgs;
        const totalSessions= sessions.length;
        const starredCount = Object.values(starred).filter(Boolean).length;
        const cacheCount   = Object.keys(offlineCache).length;
        const memoryCount  = aiMemories.length;
        // Model usage stats
        const modelCounts  = {};
        sessions.forEach(s=>s.messages?.forEach(m=>{if(m.sender==='bot'&&m.model){const n=m.model?.name||'Unknown';modelCounts[n]=(modelCounts[n]||0)+1;}}));
        const topModel     = Object.entries(modelCounts).sort((a,b)=>b[1]-a[1])[0];
        // Word count
        const totalWords   = sessions.reduce((a,s)=>a+(s.messages?.reduce((b,m)=>b+(m.text?.split(/\s+/).length||0),0)||0),0);
        // Last 7 days activity
        const now=Date.now(); const day=86400000;
        const activity = Array.from({length:7},(_,i)=>{
          const d=new Date(now-(6-i)*day); const label=d.toLocaleDateString('en',{weekday:'short'});
          const count=sessions.reduce((a,s)=>a+(s.messages?.filter(m=>{const t=m.timestamp;return t&&t>=now-(6-i)*day&&t<now-(5-i)*day;}).length||0),0);
          return{label,count};
        });
        const maxActivity  = Math.max(...activity.map(d=>d.count),1);
        return(
          <div onClick={()=>setShowDashboard(false)} className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)'}}>
            <div onClick={e=>e.stopPropagation()} className="w-full max-w-2xl rounded-2xl border overflow-hidden" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'90vh',overflowY:'auto'}}>
              {/* Header */}
              <div className="p-5 border-b flex items-center justify-between" style={{borderColor:'var(--br)'}}>
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:'linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.15))'}}>
                    <i className="fa-solid fa-chart-pie text-indigo-400"></i>
                  </div>
                  <div><p className="font-bold text-lg" style={{color:'var(--t1)'}}>Usage Dashboard</p><p className="text-xs" style={{color:'var(--t3)'}}>Your Omina AI statistics</p></div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={()=>{setShowDashboard(false);setShowWordCloud(true);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all" style={{borderColor:'rgba(219,39,119,.3)',color:'#f472b6',background:'rgba(219,39,119,.07)'}}>
                    <i className="fa-solid fa-cloud text-[10px]"></i>Word Cloud
                  </button>
                  <button onClick={()=>{setShowDashboard(false);setShowModelComp(true);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all" style={{borderColor:'rgba(5,150,105,.3)',color:'#34d399',background:'rgba(5,150,105,.07)'}}>
                    <i className="fa-solid fa-code-compare text-[10px]"></i>Compare
                  </button>
                  <button onClick={()=>setShowDashboard(false)} className="w-8 h-8 flex items-center justify-center rounded-xl border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}><i className="fa-solid fa-xmark text-sm"></i></button>
                </div>
              </div>
              {/* Stats grid */}
              <div className="p-5">
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
                  {[
                    {label:'Total Messages', value:totalMsgs,   icon:'fa-message',    color:'#3B82F6', bg:'rgba(59,130,246,.1)'},
                    {label:'Conversations',  value:totalSessions,icon:'fa-comments',   color:'#8B5CF6', bg:'rgba(139,92,246,.1)'},
                    {label:'AI Replies',     value:botMsgs,      icon:'fa-robot',      color:'#10B981', bg:'rgba(16,185,129,.1)'},
                    {label:'Starred',        value:starredCount, icon:'fa-star',       color:'#F59E0B', bg:'rgba(245,158,11,.1)'},
                    {label:'Cached Replies', value:cacheCount,   icon:'fa-box-archive',color:'#06B6D4', bg:'rgba(6,182,212,.1)'},
                    {label:'Memories',       value:memoryCount,  icon:'fa-brain',      color:'#EC4899', bg:'rgba(236,72,153,.1)'},
                  ].map(s=>(
                    <div key={s.label} className="rounded-xl p-4 border" style={{background:s.bg,borderColor:'rgba(255,255,255,.06)'}}>
                      <div className="flex items-center gap-2 mb-2">
                        <i className={`fa-solid ${s.icon} text-xs`} style={{color:s.color}}></i>
                        <span className="text-[10px] font-medium" style={{color:'var(--t3)'}}>{s.label}</span>
                      </div>
                      <p className="text-2xl font-bold" style={{color:'var(--t1)'}}>{s.value.toLocaleString()}</p>
                    </div>
                  ))}
                </div>

                {/* Words written */}
                <div className="rounded-xl p-4 border mb-4 flex items-center gap-4" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'rgba(99,102,241,.1)'}}><i className="fa-solid fa-pen-nib text-indigo-400"></i></div>
                  <div className="flex-1">
                    <p className="text-xs" style={{color:'var(--t3)'}}>Total words in conversations</p>
                    <p className="text-xl font-bold" style={{color:'var(--t1)'}}>{totalWords.toLocaleString()} words</p>
                  </div>
                  {topModel&&<div className="text-right">
                    <p className="text-xs" style={{color:'var(--t3)'}}>Top model used</p>
                    <p className="text-sm font-bold" style={{color:'var(--t1)'}}>{topModel[0]}</p>
                    <p className="text-[10px]" style={{color:'var(--t3)'}}>{topModel[1]} replies</p>
                  </div>}
                </div>

                {/* 7-day activity bar chart */}
                <div className="rounded-xl p-4 border" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                  <p className="text-xs font-semibold mb-4" style={{color:'var(--t2)'}}>Last 7 Days Activity</p>
                  <div className="flex items-end gap-2" style={{height:80}}>
                    {activity.map((d,i)=>(
                      <div key={i} className="flex-1 flex flex-col items-center gap-1">
                        <span className="text-[9px]" style={{color:'var(--t3)'}}>{d.count||''}</span>
                        <div className="w-full rounded-t-md transition-all" style={{
                          height:Math.max(4,d.count/maxActivity*60)+'px',
                          background:d.count>0?'linear-gradient(to top,rgba(99,102,241,.6),rgba(139,92,246,.8))':'var(--bg2)',
                          border:'1px solid rgba(99,102,241,.2)'
                        }}/>
                        <span className="text-[9px]" style={{color:'var(--t3)'}}>{d.label}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── FAVORITES MODAL ── */}
      {showFavorites&&(
        <div onClick={()=>setShowFavorites(false)} className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.85)',backdropFilter:'blur(12px)'}}>
          <div onClick={e=>e.stopPropagation()} className="w-full max-w-2xl rounded-2xl border flex flex-col" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'85vh'}}>
            {/* Header */}
            <div className="p-5 border-b flex items-center justify-between flex-shrink-0" style={{borderColor:'var(--br)'}}>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background:'rgba(245,158,11,.15)'}}><i className="fa-solid fa-star text-amber-400"></i></div>
                <div><p className="font-bold" style={{color:'var(--t1)'}}>Favorite Messages</p><p className="text-xs" style={{color:'var(--t3)'}}>{allStarred.length} starred</p></div>
              </div>
              <button onClick={()=>setShowFavorites(false)} className="w-8 h-8 flex items-center justify-center rounded-full border" style={{borderColor:'var(--br)',color:'var(--t2)'}}><i className="fa-solid fa-xmark text-sm"></i></button>
            </div>
            {/* Search */}
            <div className="px-4 py-3 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
              <div className="relative">
                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs" style={{color:'var(--t3)'}}></i>
                <input value={favSearch} onChange={e=>setFavSearch(e.target.value)}
                  placeholder="Search favorites…" className="w-full pl-8 pr-3 py-2 rounded-xl text-sm outline-none border"
                  style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}}/>
              </div>
            </div>
            {/* Messages list */}
            <div className="flex-1 overflow-y-auto sb p-4 space-y-3">
              {allStarred.length===0
                ?<div className="text-center py-16">
                  <i className="fa-regular fa-star text-3xl mb-3 block text-amber-400 opacity-30"></i>
                  <p className="text-sm font-medium" style={{color:'var(--t2)'}}>No favorites yet</p>
                  <p className="text-xs mt-1" style={{color:'var(--t3)'}}>Click ⭐ on any message to star it</p>
                </div>
                :allStarred.filter(m=>!favSearch||m.text?.toLowerCase().includes(favSearch.toLowerCase())||m.stitle?.toLowerCase().includes(favSearch.toLowerCase())).map(m=>(
                  <div key={m.id} className="rounded-xl border overflow-hidden" style={{borderColor:'var(--br)'}}>
                    {/* Chat label */}
                    <div className="flex items-center justify-between px-3 py-2 border-b" style={{background:'var(--bg3)',borderColor:'var(--br)'}}>
                      <div className="flex items-center gap-2">
                        <i className={`fa-solid ${m.sender==='bot'?'fa-robot':'fa-user'} text-xs`} style={{color:m.sender==='bot'?'#3B82F6':'#10B981'}}></i>
                        <span className="text-xs font-medium" style={{color:'var(--t2)'}}>{m.sender==='bot'?'Omina AI':'You'}</span>
                        <span className="text-[10px] px-2 py-0.5 rounded-full" style={{background:'var(--bg2)',color:'var(--t3)'}}>{m.stitle?.slice(0,30)||'Chat'}</span>
                      </div>
                      <div className="flex items-center gap-1">
                        {m.timestamp&&<span className="text-[10px]" style={{color:'var(--t3)'}}>{new Date(m.timestamp).toLocaleDateString()}</span>}
                        <button onClick={()=>{setSid(m.ssid);setShowFavorites(false);toast_('Opened chat','info');}} className="px-2 py-0.5 rounded-lg text-[10px] border ml-2" style={{borderColor:'rgba(99,102,241,.3)',color:'#a5b4fc',background:'rgba(99,102,241,.1)'}}>Go →</button>
                        <button onClick={()=>toggleStar(m.id)} className="p-1 rounded-lg text-xs hover:text-red-400 transition-colors" style={{color:'var(--t3)'}} title="Remove star"><i className="fa-solid fa-star text-amber-400"></i></button>
                      </div>
                    </div>
                    {/* Message content */}
                    <div className="px-4 py-3" style={{background:'var(--bg2)'}}>
                      <p className="text-sm" style={{color:'var(--t1)',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{m.text?.slice(0,400)}{m.text?.length>400?'…':''}</p>
                    </div>
                  </div>
                ))
              }
            </div>
            {/* Footer */}
            {allStarred.length>0&&<div className="p-4 border-t flex-shrink-0 flex items-center justify-between" style={{borderColor:'var(--br)'}}>
              <span className="text-xs" style={{color:'var(--t3)'}}>{allStarred.filter(m=>!favSearch||m.text?.toLowerCase().includes(favSearch.toLowerCase())).length} messages shown</span>
              <button onClick={()=>{if(window.confirm('Remove all stars?'))setStarred({});}} className="text-xs px-3 py-1.5 rounded-xl border transition-all" style={{borderColor:'rgba(239,68,68,.2)',color:'#f87171',background:'rgba(239,68,68,.05)'}}>Clear all</button>
            </div>}
          </div>
        </div>
      )}

      {/* ── SYSTEM PROMPT ── */}
      {showSysPrompt&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.7)'}} onClick={()=>setShowSysPrompt(false)}>
          <div className="w-full max-w-lg mi p-6 rounded-2xl border" style={{background:'var(--bg2)',borderColor:'rgba(139,92,246,.3)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4"><div className="flex items-center gap-2"><i className="fa-solid fa-sliders text-purple-400"></i><span className="font-bold" style={{color:'var(--t1)'}}>Custom Instructions</span></div><button onClick={()=>setShowSysPrompt(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
            <p className="text-xs mb-3" style={{color:'var(--t3)'}}>Tell Omina AI how to behave in every conversation.</p>
            <textarea value={sysPrompt} onChange={e=>setSysPrompt(e.target.value)} className="w-full rounded-xl px-4 py-3 text-sm outline-none resize-none border" rows="7" style={{background:'var(--bg3)',borderColor:'rgba(139,92,246,.3)',color:'var(--t1)',fontFamily:'DM Sans, sans-serif'}}/>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>setSysPrompt('You are Omina AI, a helpful assistant. Always use markdown formatting.')} className="px-4 py-2 rounded-xl text-xs border transition-all" style={{borderColor:'var(--br)',color:'var(--t2)'}}>Reset</button>
              <button onClick={()=>setShowSysPrompt(false)} className="flex-1 py-2 rounded-xl text-sm font-bold text-white bg-purple-600 hover:bg-purple-500 transition-all">Save</button>
            </div>
          </div>
        </div>
      )}

      {/* ── FOLDER MODAL ── */}
      {showFolderModal&&(
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 backdrop-blur-sm" style={{background:'rgba(0,0,0,.7)'}} onClick={()=>setShowFolderModal(false)}>
          <div className="w-full max-w-sm mi rounded-2xl border p-6" style={{background:'var(--bg2)',borderColor:'var(--br)'}} onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4"><span className="font-bold" style={{color:'var(--t1)'}}>New Folder</span><button onClick={()=>setShowFolderModal(false)} style={{color:'var(--t2)'}} className="hover:text-white"><i className="fa-solid fa-xmark"></i></button></div>
            <input value={newFName} onChange={e=>setNewFName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&makeFolder()} placeholder="Folder name…" className="w-full rounded-xl px-4 py-2.5 text-sm outline-none mb-4 border" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}}/>
            <p className="text-xs mb-2" style={{color:'var(--t3)'}}>Pick a color</p>
            <div className="flex gap-2.5 mb-5">{FC.map(c=><button key={c} onClick={()=>setNewFColor(c)} className={`w-8 h-8 rounded-full flex-shrink-0 transition-all ${newFColor===c?'ring-2 ring-white ring-offset-2 scale-110':''}`} style={{background:c,ringOffsetColor:'var(--bg2)'}}></button>)}</div>
            <button onClick={makeFolder} className="w-full py-2.5 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-500 transition-all">Create Folder</button>
          </div>
        </div>
      )}

      {/* ── SIDEBAR ── */}
      <div className={`sidebar flex flex-col flex-shrink-0 border-r ${sidebarOpen?'open':''} overflow-hidden`} style={{background:'var(--bg2)',borderColor:'var(--br)'}}>
        <div className="p-4 flex items-center gap-2 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
          <i className="fa-solid fa-robot text-blue-500 text-xl"></i>
          <span className="font-bold text-lg" style={{color:'var(--t1)'}}>Omina AI</span>
        </div>
        <div className="p-3 flex gap-2 flex-shrink-0">
          <button onClick={()=>newChat()} className="flex-1 flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-sm font-medium border transition-all hover:border-blue-500/50" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t1)'}} title="New chat (Ctrl+N)"><i className="fa-solid fa-plus text-xs"></i> New</button>
          <button onClick={()=>setShowSearch(true)} className="px-3 py-2 rounded-xl border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}} title="Search (Ctrl+K)"><i className="fa-solid fa-magnifying-glass text-xs"></i></button>
          <button onClick={()=>setShowFolderModal(true)} className="px-3 py-2 rounded-xl border transition-all" style={{background:'var(--bg3)',borderColor:'var(--br)',color:'var(--t2)'}} title="New folder"><i className="fa-solid fa-folder-plus text-xs"></i></button>
        </div>
        {/* ── Folder section — fixed, does NOT scroll with history ── */}
        {folders.length>0&&(
          <div className="flex-shrink-0 border-b px-2 pt-2 pb-1" style={{borderColor:'var(--br)'}}>
            {/* Tag filter bar */}
            {sessions.some(s=>s.tags&&s.tags.length>0)&&(
              <div className="flex gap-1.5 overflow-x-auto sb pb-1 mb-1" style={{scrollbarWidth:'none'}}>
                <button onClick={()=>setTagFilter(null)} className="flex-shrink-0 px-2.5 py-1 rounded-full text-[10px] font-bold border transition-all" style={{background:tagFilter===null?'rgba(99,102,241,.15)':'transparent',borderColor:tagFilter===null?'rgba(99,102,241,.4)':'var(--br)',color:tagFilter===null?'#818cf8':'var(--t3)'}}>
                  All

// ── Error Boundary ──────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
    console.error('[Omina AI] Uncaught error:', error, info);
  }
  handleReload() { window.location.reload(); }
  handleReset() {
    if (window.confirm('This will clear all local data and reload. Continue?')) {
      localStorage.clear();
      window.location.reload();
    }
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    const err = this.state.error;
    return React.createElement('div', {
      style: {
        minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
        background:'#080B14', fontFamily:'DM Sans, sans-serif', padding:24
      }
    },
      React.createElement('div', {
        style: {
          maxWidth:480, width:'100%', borderRadius:24, overflow:'hidden',
          border:'1px solid rgba(239,68,68,.2)', background:'#0D1117'
        }
      },
        // Red top bar
        React.createElement('div', {
          style: {
            background:'linear-gradient(135deg,rgba(239,68,68,.15),rgba(220,38,38,.08))',
            borderBottom:'1px solid rgba(239,68,68,.15)', padding:'20px 24px',
            display:'flex', alignItems:'center', gap:14
          }
        },
          React.createElement('div', {
            style: {
              width:44, height:44, borderRadius:14, flexShrink:0,
              background:'rgba(239,68,68,.15)', border:'1px solid rgba(239,68,68,.3)',
              display:'flex', alignItems:'center', justifyContent:'center'
            }
          },
            React.createElement('i', { className:'fa-solid fa-triangle-exclamation', style:{fontSize:18, color:'#f87171'} })
          ),
          React.createElement('div', null,
            React.createElement('p', { style:{fontSize:15, fontWeight:700, color:'#f1f5f9', margin:0} }, 'Something went wrong'),
            React.createElement('p', { style:{fontSize:11, color:'rgba(148,163,184,.6)', margin:'3px 0 0'} }, 'Omina AI ran into an unexpected error')
          )
        ),
        // Error detail
        React.createElement('div', { style:{padding:'18px 24px'} },
          React.createElement('div', {
            style: {
              background:'rgba(0,0,0,.3)', border:'1px solid rgba(239,68,68,.1)',
              borderRadius:10, padding:'10px 14px', marginBottom:18
            }
          },
            React.createElement('p', { style:{fontSize:10, fontWeight:700, color:'rgba(248,113,113,.6)', textTransform:'uppercase', letterSpacing:'.08em', margin:'0 0 5px'} }, 'Error'),
            React.createElement('p', { style:{fontSize:11, color:'rgba(148,163,184,.7)', fontFamily:'monospace', margin:0, wordBreak:'break-word'} },
              err ? err.toString() : 'Unknown error'
            )
          ),
          React.createElement('p', { style:{fontSize:12, color:'rgba(148,163,184,.55)', marginBottom:18, lineHeight:1.6} },
            'Your chats and data are safe. Try reloading — if the problem persists, use Reset to clear corrupted data.'
          ),
          // Buttons
          React.createElement('div', { style:{display:'flex', gap:10} },
            React.createElement('button', {
              onClick: () => this.handleReload(),
              style: {
                flex:2, padding:'10px', borderRadius:12, fontSize:12, fontWeight:700,
                background:'linear-gradient(135deg,#4F46E5,#7C3AED)', color:'#fff',
                border:'none', cursor:'pointer', display:'flex', alignItems:'center',
                justifyContent:'center', gap:8, boxShadow:'0 4px 14px rgba(79,70,229,.35)'
              }
            },
              React.createElement('i', { className:'fa-solid fa-rotate-right', style:{fontSize:11} }),
              'Reload App'
            ),
            React.createElement('button', {
              onClick: () => this.handleReset(),
