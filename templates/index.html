<style>
/* ── THEME VARS ─────────────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#0A0D14;--bg2:#111520;--bg3:#171C28;--bgi:#1A2030;
  --br:#1E2535;--brh:#2A3448;--t1:#E2E8F0;--t2:#8892A4;--t3:#4A5568;
  --shadow:rgba(0,0,0,.4);--accent:#3B82F6;
}
[data-theme="light"]{
  --bg:#F8FAFC;--bg2:#FFFFFF;--bg3:#F1F5F9;--bgi:#FFFFFF;
  --br:#E2E8F0;--brh:#CBD5E1;--t1:#0F172A;--t2:#475569;--t3:#94A3B8;
  --shadow:rgba(0,0,0,.1);--accent:#2563EB;
}
[data-theme="catppuccin"]{
  --bg:#1E1E2E;--bg2:#181825;--bg3:#313244;--bgi:#1E1E2E;
  --br:#45475A;--brh:#585B70;--t1:#CDD6F4;--t2:#A6ADC8;--t3:#6C7086;
  --shadow:rgba(0,0,0,.4);--accent:#CBA6F7;
}
[data-theme="nord"]{
  --bg:#2E3440;--bg2:#3B4252;--bg3:#434C5E;--bgi:#3B4252;
  --br:#4C566A;--brh:#5E6779;--t1:#ECEFF4;--t2:#D8DEE9;--t3:#9099A7;
  --shadow:rgba(0,0,0,.4);--accent:#88C0D0;
}
[data-theme="dracula"]{
  --bg:#282A36;--bg2:#1E1F29;--bg3:#343746;--bgi:#282A36;
  --br:#44475A;--brh:#565869;--t1:#F8F8F2;--t2:#BFBFBF;--t3:#6272A4;
  --shadow:rgba(0,0,0,.4);--accent:#FF79C6;
}
[data-theme="midnight"]{
  --bg:#000000;--bg2:#0D0D0D;--bg3:#141414;--bgi:#0D0D0D;
  --br:#1A1A1A;--brh:#262626;--t1:#FFFFFF;--t2:#A0A0A0;--t3:#404040;
  --shadow:rgba(0,0,0,.6);--accent:#00D4FF;
}
[data-theme="forest"]{
  --bg:#0D1F0D;--bg2:#122012;--bg3:#1A2E1A;--bgi:#122012;
  --br:#1E3A1E;--brh:#2A4A2A;--t1:#D4E8D4;--t2:#8AAE8A;--t3:#4A6A4A;
  --shadow:rgba(0,0,0,.4);--accent:#4ADE80;
}
[data-theme="sunset"]{
  --bg:#1A0A0A;--bg2:#200E0E;--bg3:#2A1515;--bgi:#200E0E;
  --br:#3A1E1E;--brh:#4A2828;--t1:#FFE4D6;--t2:#C4957A;--t3:#7A4A3A;
  --shadow:rgba(0,0,0,.4);--accent:#FF6B35;
}
[data-theme="light"] .github-markdown-dark{display:none}
[data-fontsize="sm"] .msg-text{font-size:13px!important}
[data-fontsize="md"] .msg-text{font-size:14.5px!important}
/* ── Text selection context menu ── */
.sel-menu{
  position:fixed;z-index:9999;
  background:rgba(15,18,28,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:5px;
  box-shadow:0 16px 48px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;gap:2px;
  animation:selMenuIn .15s cubic-bezier(.16,1,.3,1)
}
@keyframes selMenuIn{from{opacity:0;transform:translate(-50%,-90%) scale(.94)}to{opacity:1;transform:translate(-50%,-100%) scale(1)}}
.sel-menu-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 11px;border-radius:9px;border:none;
  background:transparent;color:rgba(226,232,240,.85);
  font-size:11.5px;font-weight:500;cursor:pointer;
  white-space:nowrap;font-family:inherit;
  transition:background .12s,color .12s,transform .1s;
  position:relative;
}
.sel-menu-btn:hover{background:rgba(255,255,255,.1);color:#fff;transform:translateY(-1px)}
.sel-menu-btn:active{transform:translateY(0)}
.sel-menu-btn .btn-icon{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sel-menu-btn .btn-icon i{font-size:9px}
.sel-menu-divider{width:1px;background:rgba(255,255,255,.08);margin:4px 1px;border-radius:1px;flex-shrink:0}
.sel-menu-close{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:rgba(255,255,255,.3);cursor:pointer;transition:background .12s,color .12s;flex-shrink:0}
.sel-menu-close:hover{background:rgba(239,68,68,.15);color:#f87171}
/* ── Follow-up suggestions ── */
.followup-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--br);background:var(--bg3);color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.followup-chip:hover{border-color:var(--brh);color:var(--t1);background:var(--bg2)}
/* ── Chat backgrounds ── */
.chat-bg-dots{background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px}
.chat-bg-grid{background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px}
.chat-bg-diagonal{background-image:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.02) 20px,rgba(255,255,255,.02) 21px)}
.chat-bg-circuit{background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.04) 1px,transparent 0);background-size:20px 20px}
.chat-bg-waves{background-image:repeating-radial-gradient(circle at 0 0,transparent 0,var(--bg) 40px),repeating-linear-gradient(rgba(255,255,255,.025),rgba(255,255,255,.025))}
.chat-bg-stars{background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.15) 0,transparent 100%),radial-gradient(1px 1px at 50% 80%,rgba(255,255,255,.1) 0,transparent 100%),radial-gradient(1px 1px at 80% 40%,rgba(255,255,255,.12) 0,transparent 100%),radial-gradient(2px 2px at 30% 60%,rgba(255,255,255,.08) 0,transparent 100%),radial-gradient(1px 1px at 70% 10%,rgba(255,255,255,.1) 0,transparent 100%)}
[data-fontsize="lg"] .msg-text{font-size:16px!important}
[data-fontsize="sm"] .md-body{font-size:13px!important}
[data-fontsize="md"] .md-body{font-size:14.5px!important}
[data-fontsize="lg"] .md-body{font-size:16px!important}
*{box-sizing:border-box;transition:background-color .2s,color .2s,border-color .2s}
body{margin:0;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--t1);overflow:hidden}
.sb::-webkit-scrollbar{width:5px;height:5px}
.sb::-webkit-scrollbar-track{background:transparent}
.sb::-webkit-scrollbar-thumb{background:var(--br);border-radius:10px}
.sb::-webkit-scrollbar-thumb:hover{background:var(--brh)}
*{scrollbar-width:thin;scrollbar-color:var(--br) transparent}
input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px var(--bgi) inset!important;-webkit-text-fill-color:var(--t1)!important}

/* ── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes mIn{from{opacity:0;transform:scale(.94) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes sPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes tIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes twCursor{0%,100%{opacity:1}50%{opacity:0}}

.ai{animation:fUp .3s cubic-bezier(.16,1,.3,1) forwards}
.af{animation:fIn .18s ease-out forwards}
.mi{animation:mIn .32s cubic-bezier(.16,1,.3,1) forwards}
.sp{animation:sPop .5s cubic-bezier(.34,1.56,.64,1) forwards}
.ti{animation:tIn .28s cubic-bezier(.16,1,.3,1) forwards}
.to_{animation:tOut .22s ease-in forwards}
.si{animation:slideIn .28s cubic-bezier(.16,1,.3,1) forwards}

/* Typewriter cursor */
.tw-cursor{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;vertical-align:text-bottom;animation:twCursor .7s infinite}

/* ── MARKDOWN ───────────────────────────────────────────── */
.md-body{background:transparent!important;color:var(--t1)!important;font-family:'DM Sans',sans-serif!important;font-size:14.5px!important;line-height:1.75!important}
.web-search-reply .md-body,.web-search-reply span{font-size:15.5px!important;line-height:1.85!important}
.web-search-reply .md-body p{margin-bottom:.9em}
.md-body pre{background:#0D1117!important;border:1px solid #21262d!important;border-radius:10px!important;margin:10px 0!important;overflow-x:auto}
.md-body code:not(pre code){background:rgba(59,130,246,.12)!important;color:#93C5FD!important;border-radius:4px!important;padding:1px 6px!important;font-family:'JetBrains Mono',monospace!important;font-size:12.5px!important}
.md-body pre code{font-family:'JetBrains Mono',monospace!important;font-size:13px!important}
.md-body p{margin-bottom:.65em}.md-body p:last-child{margin-bottom:0}
.md-body h1,.md-body h2,.md-body h3{border-bottom:1px solid var(--br)!important;padding-bottom:.3em;color:var(--t1)!important}
.md-body blockquote{border-left:3px solid var(--accent)!important;background:rgba(59,130,246,.05)!important;border-radius:0 6px 6px 0;margin:8px 0!important;padding:8px 12px!important}
.md-body ul,.md-body ol{padding-left:1.5em!important}
.md-body table{border-collapse:collapse!important;width:100%!important}
.md-body th,.md-body td{border:1px solid var(--br)!important;padding:6px 12px!important}

/* ── CODE COPY ──────────────────────────────────────────── */
.cbw{position:relative}
.ccb{position:absolute;top:8px;right:8px;padding:3px 10px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8892A4;font-size:11px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.ccb:hover{background:#30363d;color:#fff}

/* ── TOGGLE ─────────────────────────────────────────────── */
.tgl:checked+.tgl-l{background:var(--accent)}
.tgl{position:absolute;opacity:0;width:0;height:0}
.tgl-wrap{position:relative;display:inline-block;width:42px;height:24px;cursor:pointer}
.tgl-l{position:absolute;inset:0;border-radius:12px;background:var(--br);transition:background .2s}
.tgl-l::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tgl:checked+.tgl-l::after{transform:translateX(18px)}

/* ── VOICE RECORDING UI ─────────────────────────────────────── */
@keyframes voicePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.18);opacity:.7}}
@keyframes voiceWave{0%,100%{height:4px}50%{height:16px}}
@keyframes voiceRing{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
.vp{position:relative;color:#F87171!important}
.vp::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid #F87171;animation:voiceRing 1.2s ease-out infinite}
.voice-wave{display:inline-flex;align-items:center;gap:2px;height:20px}
.voice-wave span{display:inline-block;width:3px;background:#F87171;border-radius:2px;animation:voiceWave .6s ease-in-out infinite}
.voice-wave span:nth-child(1){animation-delay:0s}
.voice-wave span:nth-child(2){animation-delay:.1s}
.voice-wave span:nth-child(3){animation-delay:.2s}
.voice-wave span:nth-child(4){animation-delay:.1s}
.voice-wave span:nth-child(5){animation-delay:0s}
/* ── TYPING INDICATOR ───────────────────────────────────────── */
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-7px);opacity:1}}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;animation:typingBounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(1){animation-delay:0s}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
.typing-bubble{display:flex;align-items:center;gap:5px;padding:10px 16px}
/* ── PLAN CARDS ─────────────────────────────────────────── */
.pc-free{background:var(--bg3);border:1px solid var(--br)}
.pc-pro{background:linear-gradient(145deg,#12172a,#16203a);border:1px solid rgba(139,92,246,.35)}
.pc-max{background:linear-gradient(145deg,#0f1f18,#132818);border:1px solid rgba(16,185,129,.35)}
.pc-code{background:linear-gradient(145deg,#1c1508,#221c08);border:1px solid rgba(245,158,11,.35)}
.pb-pop{background:linear-gradient(90deg,#7c3aed,#a855f7)}
.bb-pro{background:linear-gradient(135deg,#7c3aed,#a855f7)}.bb-pro:hover:not(:disabled){background:linear-gradient(135deg,#6d28d9,#9333ea);transform:translateY(-1px)}
.bb-max{background:linear-gradient(135deg,#059669,#34d399)}.bb-max:hover:not(:disabled){background:linear-gradient(135deg,#047857,#10b981);transform:translateY(-1px)}
.bb-code{background:linear-gradient(135deg,#d97706,#fbbf24)}.bb-code:hover:not(:disabled){background:linear-gradient(135deg,#b45309,#f59e0b);transform:translateY(-1px)}

/* ── HOVER ACTIONS ──────────────────────────────────────── */
.ma{opacity:0;transition:opacity .12s}.mw:hover .ma{opacity:1}
.ca{opacity:0;transition:opacity .12s}.ci:hover .ca{opacity:1}
.ci{transition:background .15s,transform .1s,box-shadow .15s}
.ci:hover{background:var(--bg3)!important;transform:translateX(2px)}
.ci.active-chat{background:rgba(59,130,246,.1)!important;border-left:2px solid #3b82f6}

/* ── INPUT ──────────────────────────────────────────────── */
.ib:focus-within{border-color:rgba(59,130,246,.45)!important;box-shadow:0 0 0 3px rgba(59,130,246,.08)}

/* ── KBD ────────────────────────────────────────────────── */
.kbd{display:inline-flex;align-items:center;padding:1px 6px;background:var(--bg3);border:1px solid var(--brh);border-radius:4px;font-size:10px;color:var(--t2);font-family:'JetBrains Mono',monospace}

/* ── PLAN BADGES ────────────────────────────────────────── */
.pb-free{background:#334155;color:#94A3B8}
.pb-pro{background:rgba(139,92,246,.2);color:#C4B5FD;border:1px solid rgba(139,92,246,.3)}
.pb-max{background:rgba(16,185,129,.15);color:#6EE7B7;border:1px solid rgba(16,185,129,.3)}
.pb-code{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}

/* ── CANVAS - PROFESSIONAL DARK STUDIO ──────────────────── */
.cvp{display:flex;flex-direction:column;height:100%;overflow:hidden;background:#0e0e16;border-left:1px solid #1c1c2e}
.cv-titlebar{height:42px;background:linear-gradient(180deg,#1a1a2e 0%,#151525 100%);border-bottom:1px solid #1c1c2e;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;user-select:none}
.cv-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;transition:opacity .15s;flex-shrink:0}.cv-dot:hover{opacity:.75}
.cv-tabs{height:38px;background:#0e0e16;border-bottom:1px solid #1c1c2e;display:flex;align-items:flex-end;flex-shrink:0;overflow-x:auto}
.cv-tabs::-webkit-scrollbar{height:2px}.cv-tabs::-webkit-scrollbar-thumb{background:#2a2a40}
.cv-tab{display:flex;align-items:center;gap:7px;padding:0 16px;height:36px;font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;border-right:1px solid #1c1c2e;border-top:2px solid transparent;white-space:nowrap;transition:all .15s;color:#444466;letter-spacing:.02em}
.cv-tab.act{background:#0e0e16;color:#cdd6f4;border-top-color:#6366f1}
.cv-tab:not(.act):hover{background:#13132a;color:#7878aa}
.cv-tab-dot{width:6px;height:6px;border-radius:50%;background:#6366f1;flex-shrink:0;opacity:.8}
.cv-tab-x{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:9px;opacity:0;transition:all .1s;margin-left:2px;flex-shrink:0}
.cv-tab:hover .cv-tab-x,.cv-tab.act .cv-tab-x{opacity:1}.cv-tab-x:hover{background:rgba(239,68,68,.2);color:#f87171}
.cv-toolbar{height:40px;background:#0a0a14;border-bottom:1px solid #1c1c2e;display:flex;align-items:center;gap:3px;padding:0 10px;flex-shrink:0}
.cv-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1px solid transparent;background:transparent;color:#555577;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:all .15s;letter-spacing:.02em}
.cv-btn:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.2);color:#a5b4fc}
.cv-btn.on{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:#818cf8}
.cv-btn.ok{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.25);color:#34d399}
.cv-btn.err:hover{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#f87171}
.cv-btn:disabled{opacity:.3;cursor:default}
.cv-btn-grp{display:flex;background:rgba(255,255,255,.025);border:1px solid #1c1c2e;border-radius:7px;overflow:hidden}
.cv-btn-grp .cv-btn{border-radius:0;border:none;border-right:1px solid #1c1c2e}.cv-btn-grp .cv-btn:last-child{border-right:none}
.cv-btn-grp .cv-btn.on{background:rgba(99,102,241,.18);color:#818cf8}
.cv-sep{width:1px;height:20px;background:#1c1c2e;margin:0 4px;flex-shrink:0}
.cv-findbar{background:#13132a;border-bottom:1px solid #1c1c2e;padding:7px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.cv-find-input{background:#0a0a14;border:1px solid #2a2a40;border-radius:6px;color:#cdd6f4;font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 10px;outline:none;width:190px;transition:border-color .15s}
.cv-find-input:focus{border-color:#6366f1}
.cv-editor{flex:1;display:flex;overflow:hidden;background:#0e0e16}
.cv-gutter{background:#0e0e16;padding:14px 0;min-width:54px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#2a2a40;border-right:1px solid #16162a;flex-shrink:0;overflow:hidden;user-select:none}
.cv-ln{padding:0 12px 0 8px;height:21.45px;display:flex;align-items:center;justify-content:flex-end;transition:all .1s}
.cv-ln.active{color:#6366f1;background:rgba(99,102,241,.06)}
.cv-textarea{flex:1;overflow:auto;padding:14px 0 14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#cdd6f4;caret-color:#6366f1;outline:none;resize:none;background:transparent;border:none;tab-size:2;letter-spacing:.02em}
.cv-textarea::selection{background:rgba(99,102,241,.25)}
.cv-textarea::-webkit-scrollbar{width:8px;height:8px}.cv-textarea::-webkit-scrollbar-track{background:#0a0a14}
.cv-textarea::-webkit-scrollbar-thumb{background:#1e1e30;border-radius:4px}.cv-textarea::-webkit-scrollbar-thumb:hover{background:#2e2e45}
.cv-console{border-top:1px solid #1c1c2e;background:#08080f;display:flex;flex-direction:column;flex-shrink:0}
.cv-console-hdr{display:flex;align-items:center;padding:4px 12px;background:#0e0e16;border-bottom:1px solid #13132a;gap:6px;height:30px}
.cv-console-tab{padding:3px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;color:#333355;border-bottom:2px solid transparent;transition:all .15s}
.cv-console-tab.act{color:#818cf8;border-bottom-color:#6366f1}

/* ── Page Loader ── */

  pointer-events:all;
}
#omina-loader.hide{opacity:0;pointer-events:none;}
#omina-loader .ol-orbital{
  position:relative;width:90px;height:90px;
  display:flex;align-items:center;justify-content:center;
  animation:olDrift 9s linear infinite;
}
#omina-loader .ol-ring{
  position:absolute;border-radius:50%;
  border:1.5px solid transparent;
}
#omina-loader .ol-ring-1{
  width:90px;height:90px;
  border-top-color:rgba(255,255,255,.95);
  filter:drop-shadow(0 0 4px rgba(255,255,255,.4));
  animation:olSpin1 2s linear infinite;
}
#omina-loader .ol-ring-2{
  width:62px;height:62px;
  border-top-color:rgba(255,255,255,.8);
  filter:drop-shadow(0 0 3px rgba(255,255,255,.3));
  animation:olSpin2 2s linear infinite;
}
#omina-loader .ol-ring-3{
  width:34px;height:34px;
  border-top-color:rgba(255,255,255,.65);
  filter:drop-shadow(0 0 3px rgba(255,255,255,.22));
  animation:olSpin3 2s linear infinite;
}
#omina-loader .ol-center{
  width:5px;height:5px;
  background:#fff;border-radius:50%;
  box-shadow:0 0 6px 2px rgba(255,255,255,.4);
  animation:olPulse 2s ease-in-out infinite;
  z-index:10;
}
@keyframes olDrift{to{transform:rotate(360deg);}}
@keyframes olSpin1{to{transform:rotate(360deg);}}
@keyframes olSpin2{to{transform:rotate(720deg);}}
@keyframes olSpin3{to{transform:rotate(1080deg);}}
@keyframes olPulse{0%,100%{opacity:.4;transform:scale(.8);}50%{opacity:1;transform:scale(1.3);}}
#omina-loader .ol-brand{

  color:#fff;
}
#omina-loader .ol-sub{

  font-size:.55rem;font-weight:200;
  letter-spacing:.25em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
  animation:olFadePulse 2s ease-in-out infinite;
}
@keyframes olFadePulse{0%,100%{opacity:.3;}50%{opacity:.9;}}

}

  border-radius:2px;

}
.feat-load-overlay .fl-clock .fl-minute{

// ── Inline Source Icon ─────────────────────────────────────
function InlineSourceIcon({title, url}) {
  const [show, setShow] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{
    if(!show) return;
    const handler = (e)=>{ if(ref.current && !ref.current.contains(e.target)) setShow(false); };
    document.addEventListener('mousedown', handler);
    return ()=>document.removeEventListener('mousedown', handler);
  },[show]);
  return (
    <span ref={ref} style={{position:'relative',display:'inline-block',verticalAlign:'middle',marginLeft:3}}>
      <button onClick={()=>setShow(s=>!s)}
        style={{background:'none',border:'none',cursor:'pointer',padding:'0 1px',lineHeight:1,display:'inline-flex',alignItems:'center'}}>
        <i className="fa-solid fa-globe" style={{fontSize:10,color:'rgba(255,255,255,0.35)',transition:'color .15s'}}
          onMouseEnter={e=>e.target.style.color='rgba(255,255,255,0.7)'}
          onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.35)'}></i>
      </button>
      {show&&(
        <span style={{position:'absolute',bottom:'120%',left:'50%',transform:'translateX(-50%)',
          zIndex:9999,background:'#1e293b',border:'1px solid rgba(255,255,255,0.12)',
          borderRadius:8,padding:'7px 10px',minWidth:220,maxWidth:300,
          boxShadow:'0 8px 24px rgba(0,0,0,0.5)',whiteSpace:'nowrap'}}>
          <span style={{display:'block',fontSize:11,color:'rgba(255,255,255,0.9)',fontWeight:600,
            marginBottom:4,overflow:'hidden',textOverflow:'ellipsis'}}>{title||url}</span>
          <a href={url} target="_blank" rel="noopener noreferrer"
            style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,
              color:'#60a5fa',textDecoration:'none',wordBreak:'break-all',whiteSpace:'normal'}}
            onMouseEnter={e=>e.currentTarget.style.textDecoration='underline'}
            onMouseLeave={e=>e.currentTarget.style.textDecoration='none'}>
            <i className="fa-solid fa-arrow-up-right-from-square" style={{fontSize:9,flexShrink:0}}></i>
            {url.length>45?url.slice(0,45)+'…':url}
          </a>
          {/* Arrow */}
          <span style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
            width:8,height:8,background:'#1e293b',border:'1px solid rgba(255,255,255,0.12)',
            borderTop:'none',borderLeft:'none',transform:'translateX(-50%) rotate(45deg)'}}></span>
        </span>
      )}
    </span>
  );
}

// ── Render text with inline source icons ──────────────────
function renderWithInlineSources(text, inlineSources) {
  if(!inlineSources || Object.keys(inlineSources).length===0) return null;

  // Replace __SRC_N__ tokens with a placeholder that survives markdown
  // Strategy: render full markdown first, then inject icons via DOM manipulation
  // We use a split-render approach: split on SRC tokens, render each segment inline
  const parts = text.split(/(__SRC_\d+__)/g);

  // Build segments: for text parts use marked.parseInline (no wrapping <p>)
  // for SRC tokens inject the icon component
  return (
    <span className="md-body">
      {parts.map((part, i) => {
        if(inlineSources[part]) {
          const {title, url} = inlineSources[part];
          return <InlineSourceIcon key={i} title={title} url={url}/>;
        }
        if(!part) return null;
        // Use parseInline to avoid wrapping <p> tags — keeps icons inline
        const inlineHtml = marked.parseInline(part);
        // For block-level content (headers, lists etc), fall back to parse
        const hasBlock = /^\s*(#{1,6} |\*\*\*|---|\* |- |\d+\. |```|>)/m.test(part);
        const html = hasBlock ? marked.parse(part) : inlineHtml;
        return <span key={i} dangerouslySetInnerHTML={{__html: html}}/>;
      })}
    </span>
  );
}

// ── Web Worker blob for typewriter timing ──────────────────
// Runs in a separate thread — NOT throttled by tab visibility
const _twWorkerCode = `
  let timer = null;
  self.onmessage = function(e) {
    if(e.data.cmd === 'start') {
      clearInterval(timer);
      const speed = e.data.speed || 10;
      timer = setInterval(function() {
        self.postMessage({cmd:'tick'});
      }, speed);
    }
    if(e.data.cmd === 'stop') {
      clearInterval(timer);
    }
  };
`;
function _makeTwWorker() {
  try {
    const blob = new Blob([_twWorkerCode], {type:'application/javascript'});
    return new Worker(URL.createObjectURL(blob));
  } catch(e) { return null; }
}

function TypewriterText({text, onDone, speed=10, inlineSources={}}) {
  const [displayed, setDisplayed] = useState('');
  const [done, setDone] = useState(false);
  const idx = useRef(0);
  const workerRef = useRef(null);
  const textRef = useRef(text);
  const doneRef = useRef(false);

  useEffect(()=>{
    idx.current = 0;
    textRef.current = text;
    doneRef.current = false;
    setDisplayed('');
    setDone(false);

    // Kill previous worker
    if(workerRef.current) { workerRef.current.postMessage({cmd:'stop'}); workerRef.current.terminate(); }

    const worker = _makeTwWorker();
    workerRef.current = worker;

    if(worker) {
      // Web Worker path — not throttled by browser
      worker.onmessage = () => {
        if(doneRef.current) return;
        if(idx.current < textRef.current.length) {
          idx.current++;
          // Batch updates every ~5 chars for performance
          const newText = textRef.current.slice(0, idx.current);
          setDisplayed(newText);
        } else {
          doneRef.current = true;
          worker.postMessage({cmd:'stop'});
          setDone(true);
          if(onDone) onDone();
        }
      };
      worker.postMessage({cmd:'start', speed});
    } else {
      // Fallback: requestAnimationFrame (better than setTimeout for visibility)
      let lastTime = 0;
      const rafTick = (timestamp) => {
        if(doneRef.current) return;
        if(timestamp - lastTime >= speed) {
          lastTime = timestamp;
          if(idx.current < textRef.current.length) {
            idx.current++;
            setDisplayed(textRef.current.slice(0, idx.current));
          } else {
            doneRef.current = true;
            setDone(true);
            if(onDone) onDone();
            return;
          }
        }
        requestAnimationFrame(rafTick);
      };
      requestAnimationFrame(rafTick);
    }

    return () => {
      doneRef.current = true;
      if(workerRef.current) { workerRef.current.postMessage({cmd:'stop'}); workerRef.current.terminate(); workerRef.current = null; }
    };
  },[text]);

  marked.setOptions({breaks:true,gfm:true});

  const hasInlineSrc = inlineSources && Object.keys(inlineSources).length > 0;

  if(done && hasInlineSrc) {
    return (
      <div>
        {renderWithInlineSources(text, inlineSources)}
      </div>
    );
  }

  const cleanDisplayed = (displayed||'').replace(/__SRC_\d+__/g, '');
  const html = marked.parse(cleanDisplayed);
  const withCopy = html.replace(/<pre>/g,'<div class="cbw"><pre>').replace(/<\/pre>/g,'</pre><button class="ccb" onclick="(function(b){const p=b.previousElementSibling;navigator.clipboard.writeText(p.innerText).then(()=>{b.textContent=\'Copied!\';setTimeout(()=>b.textContent=\'Copy\',1500)});})(this)">Copy</button></div>');

  return (
    <div>
      <div className="md-body" dangerouslySetInnerHTML={{__html: withCopy}}/>
      {!done && <span className="tw-cursor"/>}
    </div>
  );
}

                  ?<div style={{padding:'11px',borderRadius:12,textAlign:'center',fontSize:13,fontWeight:600,color:'rgba(255,255,255,.4)',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)'}}><i className="fa-solid fa-circle-check" style={{marginRight:6}}></i>Current Plan</div>
                  :<button onClick={()=>buy(p.id)} disabled={!!buying} style={{...p.btnStyle,padding:'11px',borderRadius:12,fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6,opacity:buying&&buying!==p.id?.5:1,transition:'all .15s'}}
                    onMouseEnter={e=>!buying&&(e.currentTarget.style.opacity='.85')}
                    onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
                    {isBuying?<><i className="fa-solid fa-circle-notch fa-spin" style={{fontSize:11}}></i> Processing…</>:p.id==='free'?'Switch to Free':<>Get {p.name} <i className="fa-solid fa-arrow-right" style={{fontSize:11}}></i></>}
                  </button>
                }
              </div>
            );
          })}
        </div>
        <p style={{textAlign:'center',marginTop:20,fontSize:12,color:'var(--t3)'}}>
          <i className="fa-solid fa-shield-halved" style={{marginRight:6,color:'#34D399'}}></i>
          Secure payments · Cancel anytime · Instant access
        </p>
      </div>
    </div>
  );
}

/* ── VS CODE CANVAS ────────────────────────────────────── */
/* ── CANVAS PANEL ───────────────────────────────────────── */
// ═══════════════════════════════════════════════════════════════
// REPLACE কিভাবে করবে:
// index.html এ এই লাইন খুঁজো:
//   /* ── VS CODE CANVAS ──── */
//   /* ── CANVAS PANEL ──── */
//   function CanvasPanel({content, onClose}) {
// এবং এই লাইন পর্যন্ত সব select করো:
//   }
//   function ImageGenModal  <-- এর ঠিক আগে পর্যন্ত
// তারপর নিচের পুরো function দিয়ে replace করো।
// ═══════════════════════════════════════════════════════════════

function CanvasPanel({content, onClose}) {
  const [tab,setTab]         = useState('preview');
  const [ikey,setIkey]       = useState(0);
  const [copied,setCopied]   = useState(false);
  const [saved,setSaved]     = useState(false);
  const [size,setSize]       = useState('desktop');
  const [previewTheme,setPreviewTheme] = useState('dark');
  const [isFullscreen,setIsFullscreen] = useState(false);
  const [consoleLogs,setConsoleLogs]   = useState([]);
  const [consoleOpen,setConsoleOpen]   = useState(false);
  const [consoleTab,setConsoleTab]     = useState('console');
  const [history,setHistory]     = useState([]);
  const [histIdx,setHistIdx]     = useState(-1);
  const [editCode,setEditCode]   = useState('');
  const [cursorPos,setCursorPos] = useState({line:1,col:1});
  const [activeTab,setActiveTab] = useState('index.html');
  const [showFind,setShowFind]   = useState(false);
  const [findQ,setFindQ]         = useState('');
  const [findCount,setFindCount] = useState(0);
  const [wordWrap,setWordWrap]   = useState(false);

  /* ── NEW: AI Chat states ── */
  const [aiChatOpen,setAiChatOpen]   = useState(false);
  const [aiMessages,setAiMessages]   = useState([]);
  const [aiInput,setAiInput]         = useState('');
  const [aiTyping,setAiTyping]       = useState(false);
  const aiEndRef                     = useRef(null);
  const aiInputRef                   = useRef(null);

  const textareaRef = useRef(null);
  const findRef     = useRef(null);

  const extract = raw => {
    if(!raw) return '';
    const m = raw.match(/```(?:html|HTML|css|CSS|js|javascript)?\n?([\s\S]*?)```/);
    if(m) return m[1].trim();
    if(/<!DOCTYPE|<html/i.test(raw)) return raw.trim();
    return raw.trim();
  };

  const baseCode = extract(content);
  const [liveCode,setLiveCode] = useState(baseCode);

  useEffect(()=>{
    if(baseCode){
      setHistory([baseCode]);setHistIdx(0);setLiveCode(baseCode);setEditCode(baseCode);
      if(/<!DOCTYPE|<html/i.test(baseCode)) setActiveTab('index.html');
      else if(baseCode.trim().startsWith('{')) setActiveTab('data.json');
      else setActiveTab('script.js');
    }
  },[baseCode]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='CVS_CONSOLE')
        setConsoleLogs(p=>[...p,{method:e.data.method,args:e.data.args,time:new Date().toLocaleTimeString()}].slice(-200));
    };
    window.addEventListener('message',h);
    return()=>window.removeEventListener('message',h);
  },[]);

  useEffect(()=>{ if(showFind) setTimeout(()=>findRef.current?.focus(),50); },[showFind]);

  useEffect(()=>{
    if(!findQ){setFindCount(0);return;}
    try{const rx=new RegExp(escRx(findQ),'gi');const m=editCode.match(rx);setFindCount(m?m.length:0);}catch{setFindCount(0);}
  },[findQ,editCode]);

  /* ── Scroll AI chat to bottom ── */
  useEffect(()=>{ aiEndRef.current?.scrollIntoView({behavior:'smooth'}); },[aiMessages,aiTyping]);

  const isHTML = /<!DOCTYPE|<html|<body|<div\b|<section/i.test(liveCode);
  const editorLines = editCode.split('\n');
  const charCount = editCode.length;
  const errCount  = consoleLogs.filter(l=>l.method==='error').length;
  const warnCount = consoleLogs.filter(l=>l.method==='warn').length;

  const pushHistory = code => {const nh=history.slice(0,histIdx+1);nh.push(code);setHistory(nh);setHistIdx(nh.length-1);};
  const saveEdit = () => {setLiveCode(editCode);pushHistory(editCode);setIkey(k=>k+1);setSaved(true);setTimeout(()=>setSaved(false),2000);setConsoleLogs([]);setTab('preview');};
  const undo = () => {if(histIdx>0){const ni=histIdx-1;setHistIdx(ni);const c=history[ni];setLiveCode(c);setEditCode(c);setIkey(k=>k+1);}};
  const redo = () => {if(histIdx<history.length-1){const ni=histIdx+1;setHistIdx(ni);const c=history[ni];setLiveCode(c);setEditCode(c);setIkey(k=>k+1);}};

  const copy = () => {
    try{navigator.clipboard.writeText(liveCode);}catch(e){const t=document.createElement('textarea');t.value=liveCode;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}
    setCopied(true);setTimeout(()=>setCopied(false),2000);
  };

  const download = () => {
    const b=new Blob([liveCode],{type:'text/html'});const u=URL.createObjectURL(b);
    const a=document.createElement('a');a.href=u;a.download=activeTab;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
  };

  const openNew = () => {
    const b=new Blob([injectConsole(liveCode)],{type:'text/html'});window.open(URL.createObjectURL(b),'_blank');
  };

  /* ── NEW: CodePen Export ── */
  const exportCodePen = () => {
    const data = {
      title: activeTab,
      description: 'Exported from Omina AI Canvas',
      html: liveCode,
      css: '',
      js: '',
      css_external: '',
      js_external: 'https://cdn.tailwindcss.com',
    };
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://codepen.io/pen/define';
    form.target = '_blank';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = JSON.stringify(data);
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
  };

  /* ── NEW: JSFiddle Export ── */
  const exportJSFiddle = () => {
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'https://jsfiddle.net/api/post/library/pure/';
    form.target = '_blank';
    const fields = {
      html: liveCode,
      css: '',
      js: '',
      title: activeTab,
      resources: 'https://cdn.tailwindcss.com',
    };
    Object.entries(fields).forEach(([k,v])=>{
      const inp = document.createElement('input');
      inp.type='hidden'; inp.name=k; inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
  };

  /* ── NEW: AI Chat send message ── */
  const sendAiMessage = async () => {
    if(!aiInput.trim() || aiTyping) return;
    const userMsg = { role:'user', text: aiInput.trim(), id: Date.now() };
    const question = aiInput.trim();
    setAiInput('');
    setAiMessages(prev => [...prev, userMsg]);
    setAiTyping(true);

    // Build context: current code + user question
    const codeSnippet = liveCode
      ? `Here is the current code in the Canvas editor:\n\`\`\`html\n${liveCode.slice(0,3000)}\n\`\`\`\n\n`
      : '';

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          message: codeSnippet + question,
          system_prompt: 'You are a helpful code assistant inside a VS Code-style canvas editor called Omina AI Canvas. The user will ask questions about the code shown. Give clear, concise answers with code examples where needed. Use markdown formatting.',
        })
      });
      const data = await res.json();
      setAiMessages(prev => [...prev, {
        role: 'bot',
        text: data.reply || 'No response.',
        id: Date.now()+1
      }]);
    } catch(e) {
      setAiMessages(prev => [...prev, {
        role: 'bot',
        text: '⚠️ **Error:** Cannot connect to Omina AI. Make sure Ollama is running.',
        id: Date.now()+1
      }]);
    }
    setAiTyping(false);
  };

  const formatCode = () => {
    try{
      let indent=0;
      const lines=editCode.split('\n').map(l=>l.trim()).filter(l=>l);
      const result=lines.map(l=>{
        if(l.match(/^<\//)) indent=Math.max(0,indent-1);
        const pad='  '.repeat(indent);
        if(l.match(/^<[^\/!][^>]*[^\/]>$/)&&!l.match(/^<(br|hr|img|input|link|meta)/i)) indent++;
        return pad+l;
      }).join('\n');
      setEditCode(result);
    }catch(e){}
  };

  const injectConsole = code => {
    const sc = "<scr"+"ipt>['log','warn','error','info'].forEach(m=>{const o=console[m];console[m]=function(...a){window.parent.postMessage({type:'CVS_CONSOLE',method:m,args:a.map(String)},'*');o.apply(console,a)}});window.onerror=(msg,url,line)=>{window.parent.postMessage({type:'CVS_CONSOLE',method:'error',args:[msg+' (line '+line+')']}, '*');return false};<"+"/script>";
    return code.includes('<head>') ? code.replace('<head>','<head>'+sc) : sc+code;
  };

  const iframeSrc = (()=>{
    let c=liveCode;
    if(previewTheme==='light') c=c.replace(/class="([^"]*)dark([^"]*)"/,'class="$1$2"');
    else if(!c.includes('class="dark"')) c=c.replace(/<html(.*?)>/,'<html$1 class="dark">');
    if(!c.includes('cdn.tailwindcss.com')) c=c.replace('<head>','<head><script src="https://cdn.tailwindcss.com"><\/script>');
    return injectConsole(c);
  })();

  const handleKeyDown = e => {
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveEdit();return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();setShowFind(f=>!f);return;}
    if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return;}
    if(e.key==='Escape'){setShowFind(false);return;}
    if(e.key==='Tab'){
      e.preventDefault();
      const ta=e.target,s=ta.selectionStart,end=ta.selectionEnd;
      const nv=editCode.substring(0,s)+'  '+editCode.substring(end);
      setEditCode(nv);
      setTimeout(()=>{ta.selectionStart=ta.selectionEnd=s+2;},0);
      return;
    }
    const pairs={'(':')','{':('}'),'[':']'};
    if(pairs[e.key]){
      e.preventDefault();
      const ta=e.target,s=ta.selectionStart,end=ta.selectionEnd;
      const nv=editCode.substring(0,s)+e.key+pairs[e.key]+editCode.substring(end);
      setEditCode(nv);
      setTimeout(()=>{ta.selectionStart=ta.selectionEnd=s+1;},0);
    }
  };

  const onCodeChange = e => {
    setEditCode(e.target.value);
    const ta=e.target,txt=ta.value.substring(0,ta.selectionStart),ls=txt.split('\n');
    setCursorPos({line:ls.length,col:ls[ls.length-1].length+1});
  };

  const onCursorMove = e => {
    const ta=e.target,txt=ta.value.substring(0,ta.selectionStart),ls=txt.split('\n');
    setCursorPos({line:ls.length,col:ls[ls.length-1].length+1});
  };

  const SIZES=[
    {id:'desktop',icon:'fa-desktop', label:'Desktop',w:'100%'},
    {id:'tablet', icon:'fa-tablet',  label:'Tablet', w:'768px'},
    {id:'mobile', icon:'fa-mobile',  label:'Mobile', w:'390px'},
  ];

  const fileIcon = name => {
    if(name.endsWith('.html')||name.endsWith('.htm')) return {i:'fa-solid fa-code',c:'#e37933'};
    if(name.endsWith('.css'))  return {i:'fa-solid fa-palette',c:'#2196f3'};
    if(name.endsWith('.js'))   return {i:'fa-brands fa-js-square',c:'#f7df1e'};
    if(name.endsWith('.json')) return {i:'fa-solid fa-database',c:'#5ca5e0'};
    return {i:'fa-solid fa-file-code',c:'#8b949e'};
  };

  const wrapStyle = isFullscreen
    ?{position:'fixed',inset:0,zIndex:200,display:'flex',flexDirection:'column'}
    :{display:'flex',flexDirection:'column',height:'100%',minWidth:0};

  const fi = fileIcon(activeTab);

  /* ── AI Chat markdown render (simple) ── */
  const renderAiText = text => {
    if(!text) return {__html:''};
    marked.setOptions({breaks:true,gfm:true});
    let h = marked.parse(text);
    h = h.replace(/<pre>/g,'<div class="cbw"><pre>').replace(/<\/pre>/g,'</pre><button class="ccb" onclick="(function(b){const p=b.previousElementSibling;navigator.clipboard.writeText(p.innerText).then(()=>{b.textContent=\'Copied!\';setTimeout(()=>b.textContent=\'Copy\',1500)});})(this)">Copy</button></div>');
    return {__html:h};
  };

  /* ── AI Chat quick prompts ── */
  const quickPrompts = [
    'Explain this code',
    'Find bugs in this code',
    'How can I improve this?',
    'Add dark mode support',
    'Make it mobile responsive',
    'Add comments to the code',
  ];

  return(
    <div className="cvp" style={wrapStyle}>

      {/* ═══ TITLE BAR ═══ */}
      <div className="cv-titlebar">
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <div className="cv-dot" onClick={onClose} style={{background:'#ff5f57'}} title="Close"></div>
          <div className="cv-dot" style={{background:'#febc2e'}} title="Minimize"></div>
          <div className="cv-dot" onClick={()=>setIsFullscreen(f=>!f)} style={{background:'#28c840'}} title={isFullscreen?'Restore':'Maximize'}></div>
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:6,paddingLeft:12,overflow:'hidden'}}>
          <i className="fa-solid fa-cube" style={{color:'#6366f1',fontSize:12,flexShrink:0}}></i>
          <span style={{fontSize:12,color:'#444466',fontFamily:"'JetBrains Mono',monospace",flexShrink:0}}>omina-canvas</span>
          <i className="fa-solid fa-chevron-right" style={{color:'#333355',fontSize:9,flexShrink:0}}></i>
          <i className={fi.i} style={{color:fi.c,fontSize:11,flexShrink:0}}></i>
          <span style={{fontSize:12,color:'#cdd6f4',fontFamily:"'JetBrains Mono',monospace",overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeTab}</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
          {/* NEW: AI Chat toggle in title bar */}
          <button onClick={()=>setAiChatOpen(o=>!o)}
            className={`cv-btn ${aiChatOpen?'on':''}`}
            style={{padding:'4px 10px',fontSize:11,gap:5,
              background:aiChatOpen?'rgba(99,102,241,.2)':'transparent',
              borderColor:aiChatOpen?'rgba(99,102,241,.4)':'transparent',
              color:aiChatOpen?'#a5b4fc':'#555577'}}
            title="AI Code Assistant">
            <i className="fa-solid fa-robot" style={{fontSize:10}}></i>
            <span>AI Chat</span>
            {aiMessages.length>0&&<span style={{background:'#6366f1',color:'#fff',borderRadius:99,padding:'0 5px',fontSize:9,fontWeight:700}}>{aiMessages.length}</span>}
          </button>
          <button onClick={()=>setTab(t=>t==='preview'?'code':'preview')} className={`cv-btn ${tab==='code'?'on':''}`} style={{padding:'4px 10px',fontSize:11}}>
            <i className={`fa-solid ${tab==='preview'?'fa-code':'fa-eye'}`} style={{fontSize:10}}></i>
            {tab==='preview'?'Edit':'Preview'}
          </button>
        </div>
      </div>

      {/* ═══ TAB BAR ═══ */}
      <div className="cv-tabs">
        <div className="cv-tab act">
          <div className="cv-tab-dot"></div>
          <i className={fi.i} style={{color:fi.c,fontSize:10}}></i>
          <span>{activeTab}</span>
          <span className="cv-tab-x" onClick={e=>{e.stopPropagation();}}><i className="fa-solid fa-xmark"></i></span>
        </div>
        <button style={{width:30,height:36,display:'flex',alignItems:'center',justifyContent:'center',background:'transparent',border:'none',cursor:'pointer',color:'#333355',flexShrink:0,transition:'color .1s',paddingBottom:2}} onMouseEnter={e=>e.currentTarget.style.color='#7878aa'} onMouseLeave={e=>e.currentTarget.style.color='#333355'}>
          <i className="fa-solid fa-plus" style={{fontSize:10}}></i>
        </button>
      </div>

      {/* ═══ TOOLBAR ═══ */}
      <div className="cv-toolbar">
        <button className="cv-btn" onClick={undo} disabled={histIdx<=0} title="Undo (Ctrl+Z)">
          <i className="fa-solid fa-rotate-left" style={{fontSize:10}}></i>
        </button>
        <button className="cv-btn" onClick={redo} disabled={histIdx>=history.length-1} title="Redo (Ctrl+Y)">
          <i className="fa-solid fa-rotate-right" style={{fontSize:10}}></i>
        </button>
        <div className="cv-sep"></div>

        {tab==='code' ? (<>
          <button className={`cv-btn ${saved?'ok':''}`} onClick={saveEdit} title="Save & Run (Ctrl+S)">
            <i className={`fa-solid ${saved?'fa-check':'fa-floppy-disk'}`} style={{fontSize:10}}></i>
            <span>{saved?'Saved':'Save & Run'}</span>
          </button>
          <div className="cv-sep"></div>
          <button className={`cv-btn ${showFind?'on':''}`} onClick={()=>setShowFind(f=>!f)} title="Find (Ctrl+F)">
            <i className="fa-solid fa-magnifying-glass" style={{fontSize:10}}></i>
          </button>
          <button className="cv-btn" onClick={formatCode} title="Format code">
            <i className="fa-solid fa-wand-magic-sparkles" style={{fontSize:10}}></i>
            <span className="hide-mobile">Format</span>
          </button>
          <button className={`cv-btn ${wordWrap?'on':''}`} onClick={()=>setWordWrap(w=>!w)} title="Word wrap">
            <i className="fa-solid fa-text-width" style={{fontSize:10}}></i>
          </button>
        </>) : isHTML ? (<>
          <div className="cv-btn-grp">
            {SIZES.map(s=>(
              <button key={s.id} onClick={()=>setSize(s.id)} className={`cv-btn ${size===s.id?'on':''}`} title={s.label}>
                <i className={`fa-solid ${s.icon}`} style={{fontSize:10}}></i>
                <span className="hide-mobile" style={{fontSize:10}}>{s.label}</span>
              </button>
            ))}
          </div>
          <div className="cv-sep"></div>
          <button className={`cv-btn ${previewTheme==='light'?'on':''}`} onClick={()=>setPreviewTheme(t=>t==='dark'?'light':'dark')} title="Toggle theme">
            <i className={`fa-solid ${previewTheme==='dark'?'fa-sun':'fa-moon'}`} style={{fontSize:10}}></i>
            <span className="hide-mobile">{previewTheme==='dark'?'Light':'Dark'}</span>
          </button>
          <button className={`cv-btn ${consoleOpen?'on':''}`} onClick={()=>setConsoleOpen(o=>!o)} title="Console">
            <i className="fa-solid fa-terminal" style={{fontSize:10}}></i>
            {errCount>0&&<span style={{background:'#f85149',color:'#fff',borderRadius:99,padding:'1px 5px',fontSize:9,fontWeight:700,marginLeft:2}}>{errCount}</span>}
          </button>
          <button className="cv-btn" onClick={openNew} title="Open in new tab">
            <i className="fa-solid fa-up-right-from-square" style={{fontSize:10}}></i>
          </button>
          <div className="cv-sep"></div>
          {/* ── NEW: CodePen & JSFiddle Export ── */}
          <button className="cv-btn" onClick={exportCodePen} title="Export to CodePen"
            style={{gap:5}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(71,175,255,.1)';e.currentTarget.style.color='#47afff';e.currentTarget.style.borderColor='rgba(71,175,255,.25)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='';e.currentTarget.style.color='';e.currentTarget.style.borderColor='';}}>
            <svg width="10" height="10" viewBox="0 0 64 64" fill="currentColor"><path d="M63.8 21.2a1.8 1.8 0 00-.7-1L33.7.4a3 3 0 00-3.4 0L.9 20.2a1.8 1.8 0 00-.7 1L.1 21.6v20.8l.1.4a1.8 1.8 0 00.7 1L30.3 63.6a3 3 0 003.4 0L63.1 43.8a1.8 1.8 0 00.7-1l.1-.4V21.6zM34 7.5L56.2 22.5 46 29.3 34 21.5zm-4 0V21.5L18 29.3 7.8 22.5zM7 26.8L14.4 32 7 37.2zm16 11.7l9 6.1 9-6.1V25.5l-9-6.1-9 6.1zm27 .7L57 32l-7-5.2zM30 56.5V42.5l-12-8.1-10.2 6.9zm4 0L50.2 41.3 40 34.4l-12 8.1z"/></svg>
            <span className="hide-mobile">CodePen</span>
          </button>
          <button className="cv-btn" onClick={exportJSFiddle} title="Export to JSFiddle"
            style={{gap:5}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(0,215,200,.08)';e.currentTarget.style.color='#00d7c8';e.currentTarget.style.borderColor='rgba(0,215,200,.2)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='';e.currentTarget.style.color='';e.currentTarget.style.borderColor='';}}>
            <i className="fa-solid fa-arrow-up-right-from-square" style={{fontSize:9}}></i>
            <span className="hide-mobile">JSFiddle</span>
          </button>
        </>) : null}

        <div style={{marginLeft:'auto',display:'flex',gap:3}}>

function ImageGenModal({onClose,onGenerate,history,setHistory,initialPrompt}) {
  const [prompt,setPrompt]       = React.useState(initialPrompt||'');
  const [style,setStyle]         = React.useState('realistic');
  const [negPrompt,setNegPrompt] = React.useState('');
  const [aspect,setAspect]       = React.useState('1:1');
  const [tab,setTab]             = React.useState(initialPrompt?'create':'create');
  const [loading,setLoading]     = React.useState(false);
  const [genResult,setGenResult] = React.useState(null);
  const [error,setError]         = React.useState('');
  const [showNeg,setShowNeg]     = React.useState(false);
  const [steps,setSteps]         = React.useState(4);
  const [seed,setSeed]           = React.useState('');
  const [lighting,setLighting]   = React.useState('');
  const [color,setColor]         = React.useState('');

  const handleGenerateRef = React.useRef(null);

  const STYLES=[
    {id:'realistic', label:'Realistic',  icon:'fa-camera',          color:'#3B82F6'},
    {id:'anime',     label:'Anime',      icon:'fa-star',            color:'#EC4899'},
    {id:'oil',       label:'Oil Paint',  icon:'fa-palette',         color:'#F59E0B'},
    {id:'watercolor',label:'Watercolor', icon:'fa-droplet',         color:'#06B6D4'},
    {id:'3d',        label:'3D Render',  icon:'fa-cube',            color:'#8B5CF6'},
    {id:'pixel',     label:'Pixel Art',  icon:'fa-border-all',      color:'#10B981'},
    {id:'sketch',    label:'Sketch',     icon:'fa-pencil',          color:'#64748B'},
    {id:'cyberpunk', label:'Cyberpunk',  icon:'fa-bolt',            color:'#A78BFA'},
    {id:'flat',      label:'Flat',       icon:'fa-layer-group',     color:'#34D399'},
    {id:'fantasy',   label:'Fantasy',    icon:'fa-wand-sparkles',   color:'#EF4444'},
    {id:'minimal',   label:'Minimal',    icon:'fa-minus',           color:'#94A3B8'},
    {id:'vintage',   label:'Vintage',    icon:'fa-film',            color:'#D97706'},
  ];
  const ASPECTS=[
    {id:'1:1',  label:'1:1',  w:1024,h:1024, hint:'Square'},
    {id:'16:9', label:'16:9', w:1280,h:720,  hint:'Landscape'},
    {id:'9:16', label:'9:16', w:720, h:1280, hint:'Portrait'},
    {id:'4:3',  label:'4:3',  w:1024,h:768,  hint:'Classic'},
    {id:'3:2',  label:'3:2',  w:1200,h:800,  hint:'Photo'},
  ];
  const LIGHTINGS=['','Natural','Studio','Golden Hour','Neon','Dramatic','Soft Diffused','Backlit'];
  const COLORS=['','Vibrant','Muted','Monochrome','Warm','Cool','Pastel','Dark'];
  const PRESETS=[
    {label:'🌆 Sunset City',    p:'A futuristic city skyline at golden sunset, neon lights reflecting on wet streets'},
    {label:'🚀 Space Explorer', p:'An astronaut on a colorful alien planet, twin moons, vibrant nebula in the sky'},
    {label:'🏰 Fantasy Castle', p:'A majestic medieval castle on a floating island surrounded by clouds and magic'},
    {label:'🤖 Cyberpunk Girl', p:'A cyberpunk girl with neon hair in a rainy Tokyo alley, holographic ads'},
    {label:'🌊 Deep Ocean',     p:'Bioluminescent creatures in the deep ocean, ethereal blue glow, dark mysterious'},
    {label:'🏔️ Mountain Dawn',  p:'Snow-capped mountain peaks at dawn, golden hour light, misty valleys below'},
    {label:'🌿 Forest Spirit',  p:'A mystical forest spirit made of leaves and light, ancient trees, fireflies'},
    {label:'📸 Portrait',       p:'A professional studio portrait, soft lighting, bokeh background, cinematic'},
    {label:'🐉 Dragon',         p:'An epic dragon soaring over mountains, fire breath, fantasy art style'},
    {label:'🏙️ Tokyo Night',    p:'Tokyo street at night, cherry blossoms, lanterns, rain reflections'},
  ];

  const buildFullPrompt = (p=prompt) => {
    const styleMap = {
      realistic:'photorealistic, ultra detailed, 8k, DSLR photography, sharp focus',
      anime:'anime style, vibrant, Studio Ghibli inspired, Japanese animation',
      oil:'oil painting, thick brush strokes, classical art, canvas texture',
      watercolor:'watercolor painting, soft color washes, artistic, delicate',
      '3d':'3D CGI render, octane render, studio lighting, highly detailed',
      pixel:'pixel art, 16-bit retro style, crisp pixels, game sprite',
      sketch:'pencil sketch, hand drawn, fine line art, grayscale illustration',
      cyberpunk:'cyberpunk neon, dystopian, neon lights, futuristic, rain-soaked',
      flat:'flat design, minimalist vector, bold colors, clean geometric shapes',
      fantasy:'epic fantasy art, magical atmosphere, detailed illustration',
      minimal:'minimalist, clean composition, elegant, white background',
      vintage:'vintage retro, film grain, faded colors, 1970s aesthetic',
    };
    let full = p.trim();
    const suf = styleMap[style]||'';
    if(suf) full += ', '+suf;
    if(lighting) full += ', '+lighting.toLowerCase()+' lighting';
    if(color)    full += ', '+color.toLowerCase()+' color palette';
    if(negPrompt) full += ' --no '+negPrompt;
    return full;
  };

  const handleGenerate = async (overridePrompt) => {
    const p = overridePrompt || prompt;
    if(!p.trim() || loading) return;
    setLoading(true); setError(''); setGenResult(null);
    try {
      const res = await fetch('/api/generate-image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          prompt: p.trim(), style, aspect,
          neg_prompt: negPrompt,
          lighting, color,
          seed: seed ? parseInt(seed) : null,
        })
      });
      const data = await res.json();
      if(data.success && data.image){
        setGenResult(data);
        const entry={id:Date.now(),prompt:p.trim(),style,aspect,createdAt:Date.now(),image:data.image,lighting,color};
        if(setHistory) setHistory(prev=>[entry,...prev.slice(0,29)]);
        setTab('result');
      } else {
        setError(data.error||'Generation failed. Try again.');
      }
    }catch(e){ setError('Network error. Check connection.'); }
    finally{ setLoading(false); }
  };

                        }
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── RESULT TAB ── */}
        {tab==='result'&&(
          <div className="flex-1 overflow-y-auto sb" style={{WebkitOverflowScrolling:'touch'}}>
            {genResult?.image?(
              <div className="flex flex-col sm:flex-row gap-0 sm:gap-0 h-full">
                {/* Image */}
                <div className="flex-1 flex items-center justify-center p-4 sm:p-6 min-h-0" style={{background:'rgba(0,0,0,.3)'}}>
                  <img src={genResult.image} alt="Generated"
                    style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:12,boxShadow:'0 8px 40px rgba(0,0,0,.6)'}}/>

                            )}
                            <button onClick={()=>{setPrompt(h.prompt);setStyle(h.style||'realistic');setTab('create');}}
                              style={{padding:'2px 6px',borderRadius:5,fontSize:9,background:'rgba(59,130,246,.1)',color:'#60a5fa',border:'none',cursor:'pointer'}}>
                              Reuse
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}

        {/* ── Bottom: Error + Generate ── */}
        {(tab==='create'||loading||error)&&(
          <div className="flex-shrink-0 p-3 sm:p-4 border-t" style={{borderColor:'var(--br)',background:'var(--bg2)',paddingBottom:'max(12px,env(safe-area-inset-bottom))'}}>
            {error&&(
              <div className="mb-2.5 px-3 py-2 rounded-xl text-xs flex items-start gap-2" style={{background:'rgba(239,68,68,.08)',color:'#f87171',border:'1px solid rgba(239,68,68,.2)'}}>
                <i className="fa-solid fa-triangle-exclamation flex-shrink-0 mt-0.5" style={{fontSize:10}}></i>
                <span>{error}</span>
              </div>
            )}
            {loading?(
              <div className="w-full py-3.5 rounded-xl flex items-center justify-center gap-3" style={{background:'rgba(124,58,237,.08)',border:'1px solid rgba(124,58,237,.25)'}}>
                <div style={{width:18,height:18,borderRadius:'50%',border:'2.5px solid rgba(124,58,237,.25)',borderTopColor:'#a78bfa',animation:'spin 0.7s linear infinite',flexShrink:0}}></div>
                <div>
                  <span className="text-sm font-bold block" style={{color:'#a78bfa'}}>Generating your image…</span>
                  <span className="text-[10px]" style={{color:'var(--t3)'}}>Usually takes 15–40 seconds</span>
                </div>
              </div>
            ):(
              <button onClick={()=>handleGenerate()} disabled={!prompt.trim()}
                className="img-gen-btn w-full py-3.5 rounded-xl text-sm font-bold text-white disabled:opacity-40 flex items-center justify-center gap-2"
                style={{background:prompt.trim()?'linear-gradient(135deg,#7C3AED,#DB2777)':'var(--bg3)',boxShadow:prompt.trim()?'0 4px 20px rgba(124,58,237,.35)':'none'}}>
                <i className="fa-solid fa-wand-magic-sparkles text-xs"></i>Generate Image
              </button>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

/* ── TO-DO LIST MODAL ─────────────────────────────────── */
function TodoModal({todos,setTodos,onClose}) {
  const [input,setInput] = React.useState('');
  const [filter,setFilter] = React.useState('all');
  const [editId,setEditId] = React.useState(null);
  const [editText,setEditText] = React.useState('');
  const priorities = [{id:'high',label:'High',color:'#ef4444'},{id:'medium',label:'Medium',color:'#f59e0b'},{id:'low',label:'Low',color:'#22c55e'}];
  const [selPriority,setSelPriority] = React.useState('medium');

  const addTodo = () => {
    if(!input.trim()) return;
    setTodos(prev=>[...prev,{id:Date.now(),text:input.trim(),done:false,priority:selPriority,createdAt:Date.now()}]);
    setInput('');
  };
  const toggle = id => setTodos(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
  const remove = id => setTodos(prev=>prev.filter(t=>t.id!==id));
  const saveEdit = id => {if(editText.trim()){setTodos(prev=>prev.map(t=>t.id===id?{...t,text:editText.trim()}:t));}setEditId(null);};
  const clearDone = () => setTodos(prev=>prev.filter(t=>!t.done));

  const filtered = todos.filter(t=> filter==='all'?true: filter==='active'?!t.done: t.done);
  const doneCount = todos.filter(t=>t.done).length;

  return (
    <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4" style={{background:'rgba(0,0,0,.6)'}} onClick={onClose}>
      <div className="w-full sm:max-w-md rounded-t-3xl sm:rounded-2xl border shadow-2xl" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'85vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:'rgba(52,211,153,.15)'}}><i className="fa-solid fa-list-check text-sm" style={{color:'#34d399'}}></i></div>
            <span className="font-bold text-sm" style={{color:'var(--t1)'}}>To-Do List</span>
            {todos.length>0&&<span className="text-[10px] px-2 py-0.5 rounded-full font-bold" style={{background:'rgba(52,211,153,.15)',color:'#34d399'}}>{doneCount}/{todos.length}</span>}
          </div>
          <div className="flex items-center gap-2">
            {doneCount>0&&<button onClick={clearDone} className="text-[11px] px-2.5 py-1 rounded-lg border transition-all" style={{borderColor:'rgba(239,68,68,.3)',color:'#f87171',background:'rgba(239,68,68,.07)'}}>Clear done</button>}
            <button onClick={onClose} style={{color:'var(--t2)'}} className="hover:text-white w-7 h-7 flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        {/* Input */}
        <div className="px-4 pt-4 pb-3 flex-shrink-0">
          <div className="flex gap-2 mb-2">
            {priorities.map(p=>(
              <button key={p.id} onClick={()=>setSelPriority(p.id)} className="flex-1 py-1.5 rounded-lg text-[11px] font-bold border transition-all" style={{borderColor:selPriority===p.id?p.color:'var(--br)',color:selPriority===p.id?p.color:'var(--t3)',background:selPriority===p.id?p.color+'18':'transparent'}}>{p.label}</button>
            ))}
          </div>
          <div className="flex gap-2">
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTodo()} placeholder="Add a task..." className="flex-1 px-3 py-2.5 rounded-xl text-sm border outline-none" style={{background:'var(--bg3)',borderColor:'var(--brh)',color:'var(--t1)'}}/>
            <button onClick={addTodo} disabled={!input.trim()} className="px-4 py-2.5 rounded-xl text-sm font-bold transition-all" style={{background:input.trim()?'#34d399':'var(--bg3)',color:input.trim()?'#000':'var(--t3)',border:'none',cursor:input.trim()?'pointer':'default'}}>Add</button>
          </div>
        </div>
        {/* Filters */}
        <div className="flex gap-1 px-4 pb-3 flex-shrink-0">
          {['all','active','done'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)} className="px-3 py-1 rounded-lg text-[11px] font-medium capitalize transition-all" style={{background:filter===f?'var(--brh)':'transparent',color:filter===f?'var(--t1)':'var(--t3)',border:'none',cursor:'pointer'}}>{f} {f==='all'?todos.length:f==='active'?todos.filter(t=>!t.done).length:doneCount}</button>
          ))}
        </div>
        {/* List */}
        <div className="overflow-y-auto px-4 pb-4 flex-1" style={{scrollbarWidth:'thin'}}>
          {filtered.length===0?(
            <div className="text-center py-10" style={{color:'var(--t3)'}}>
              <i className="fa-solid fa-check-circle text-3xl mb-3 block" style={{color:'rgba(52,211,153,.3)'}}></i>
              <p className="text-sm">{filter==='done'?'No completed tasks':'No tasks yet!'}</p>
            </div>
          ):(
            <div className="space-y-2">
              {filtered.sort((a,b)=>{const po={high:0,medium:1,low:2};return po[a.priority]-po[b.priority];}).map(t=>{
                const pc = priorities.find(p=>p.id===t.priority)?.color||'#94a3b8';
                return (
                  <div key={t.id} className="flex items-start gap-3 p-3 rounded-xl border transition-all group" style={{background:'var(--bg3)',borderColor:'var(--br)',opacity:t.done?.7:1}}>
                    <button onClick={()=>toggle(t.id)} className="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-0.5 transition-all" style={{borderColor:t.done?'#34d399':pc,background:t.done?'#34d399':'transparent',cursor:'pointer'}}>
                      {t.done&&<i className="fa-solid fa-check text-black" style={{fontSize:8}}></i>}
                    </button>
                    <div className="flex-1 min-w-0">
                      {editId===t.id?(
                        <input autoFocus value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit(t.id);if(e.key==='Escape')setEditId(null);}} onBlur={()=>saveEdit(t.id)} className="w-full text-sm bg-transparent border-b outline-none" style={{color:'var(--t1)',borderColor:'var(--brh)'}}/>
                      ):(
                        <p className="text-sm" style={{color:'var(--t1)',textDecoration:t.done?'line-through':'none'}}>{t.text}</p>
                      )}
                      <div className="flex items-center gap-2 mt-1">
                        <span className="text-[9px] px-1.5 py-0.5 rounded-full font-bold" style={{background:pc+'18',color:pc}}>{t.priority}</span>
                        <span className="text-[9px]" style={{color:'var(--t3)'}}>{new Date(t.createdAt).toLocaleDateString()}</span>
                      </div>
                    </div>
                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={()=>{setEditId(t.id);setEditText(t.text);}} className="w-6 h-6 flex items-center justify-center rounded-lg transition-all hover:bg-white/10" style={{color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}><i className="fa-solid fa-pen text-[9px]"></i></button>
                      <button onClick={()=>remove(t.id)} className="w-6 h-6 flex items-center justify-center rounded-lg transition-all hover:bg-red-500/20" style={{color:'var(--t3)',background:'none',border:'none',cursor:'pointer'}}><i className="fa-solid fa-trash text-[9px]"></i></button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        {/* Progress bar */}
        {todos.length>0&&(
          <div className="px-4 pb-4 flex-shrink-0">
            <div className="flex justify-between text-[10px] mb-1" style={{color:'var(--t3)'}}><span>Progress</span><span>{Math.round(doneCount/todos.length*100)}%</span></div>
            <div className="w-full h-1.5 rounded-full" style={{background:'var(--bg3)'}}>
              <div className="h-1.5 rounded-full transition-all" style={{width:`${doneCount/todos.length*100}%`,background:'linear-gradient(90deg,#34d399,#059669)'}}></div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── STICKY NOTES MODAL ───────────────────────────────── */
function StickyModal({notes,setNotes,onClose}) {
  const COLORS=['#fef08a','#bbf7d0','#bfdbfe','#f5d0fe','#fed7aa','#fecaca'];
  const addNote=()=>setNotes(prev=>[...prev,{id:Date.now(),text:'',color:COLORS[Math.floor(Math.random()*COLORS.length)],pinned:false,createdAt:Date.now()}]);
  const update=(id,text)=>setNotes(prev=>prev.map(n=>n.id===id?{...n,text}:n));
  const remove=(id)=>setNotes(prev=>prev.filter(n=>n.id!==id));
  const pin=(id)=>setNotes(prev=>prev.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
  const recolor=(id,color)=>setNotes(prev=>prev.map(n=>n.id===id?{...n,color}:n));
  const sorted=[...notes].sort((a,b)=>b.pinned-a.pinned||b.createdAt-a.createdAt);

  return (
    <div className="fixed inset-0 z-[200]" style={{background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div className="absolute inset-4 sm:inset-8 rounded-2xl border overflow-hidden flex flex-col" style={{background:'var(--bg)',borderColor:'var(--br)'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:'rgba(251,191,36,.15)'}}><i className="fa-solid fa-note-sticky text-sm" style={{color:'#fbbf24'}}></i></div>
            <span className="font-bold text-sm" style={{color:'var(--t1)'}}>Sticky Notes</span>
            <span className="text-[10px] px-2 py-0.5 rounded-full font-bold" style={{background:'rgba(251,191,36,.15)',color:'#fbbf24'}}>{notes.length} notes</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={addNote} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold transition-all" style={{background:'rgba(251,191,36,.15)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.3)'}}>
              <i className="fa-solid fa-plus text-[9px]"></i>New Note
            </button>
            <button onClick={onClose} style={{color:'var(--t2)'}} className="hover:text-white w-7 h-7 flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
          </div>
        </div>
        {/* Notes grid */}
        <div className="flex-1 overflow-y-auto p-4" style={{scrollbarWidth:'thin'}}>
          {notes.length===0?(
            <div className="flex flex-col items-center justify-center h-full" style={{color:'var(--t3)'}}>
              <i className="fa-solid fa-note-sticky text-5xl mb-4" style={{color:'rgba(251,191,36,.3)'}}></i>
              <p className="text-sm mb-3">No sticky notes yet</p>
              <button onClick={addNote} className="px-4 py-2 rounded-xl text-sm font-bold" style={{background:'rgba(251,191,36,.2)',color:'#fbbf24',border:'1px solid rgba(251,191,36,.3)'}}>Create first note</button>
            </div>
          ):(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
              {sorted.map(n=>(
                <div key={n.id} className="rounded-xl p-3 flex flex-col group" style={{background:n.color,minHeight:150,boxShadow:n.pinned?'0 4px 20px rgba(0,0,0,.25)':'0 2px 8px rgba(0,0,0,.15)',transform:n.pinned?'scale(1.02)':'scale(1)',transition:'all .2s'}}>
                  {/* Note toolbar */}
                  <div className="flex items-center justify-between mb-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <div className="flex gap-1">
                      {COLORS.map(c=>(
                        <button key={c} onClick={()=>recolor(n.id,c)} className="w-4 h-4 rounded-full border transition-all" style={{background:c,borderColor:n.color===c?'rgba(0,0,0,.4)':'transparent',transform:n.color===c?'scale(1.2)':'scale(1)'}}></button>
                      ))}
                    </div>
                    <div className="flex gap-1">
                      <button onClick={()=>pin(n.id)} className="w-6 h-6 flex items-center justify-center rounded-lg transition-all" style={{background:n.pinned?'rgba(0,0,0,.2)':'transparent',border:'none',cursor:'pointer'}}>
                        <i className="fa-solid fa-thumbtack text-[10px]" style={{color:n.pinned?'#111':'rgba(0,0,0,.5)',transform:n.pinned?'rotate(0)':'rotate(45deg)'}}></i>
                      </button>
                      <button onClick={()=>remove(n.id)} className="w-6 h-6 flex items-center justify-center rounded-lg transition-all hover:bg-black/20" style={{border:'none',cursor:'pointer'}}>
                        <i className="fa-solid fa-xmark text-[10px]" style={{color:'rgba(0,0,0,.5)'}}></i>
                      </button>
                    </div>
                  </div>
                  <textarea
                    value={n.text}
                    onChange={e=>update(n.id,e.target.value)}
                    placeholder="Write your note..."
                    className="flex-1 bg-transparent border-none outline-none resize-none text-sm"
                    style={{color:'#1e1e1e',fontFamily:"'DM Sans',sans-serif",lineHeight:1.6,minHeight:100}}
                  />
                  <p className="text-[9px] mt-2 text-right" style={{color:'rgba(0,0,0,.4)'}}>{new Date(n.createdAt).toLocaleDateString()}{n.pinned?' · 📌':''}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── AI AGENT MODAL ───────────────────────────────────── */
function AIAgentModal({onClose,sysPrompt,language}) {
  const [goal,setGoal] = React.useState('');
  const [steps,setSteps] = React.useState([]);
  const [running,setRunning] = React.useState(false);
  const [done,setDone] = React.useState(false);
  const [result,setResult] = React.useState('');
  const logsRef = React.useRef(null);

  const AGENT_TASKS = [
    {label:'Research & Summarize',icon:'fa-magnifying-glass',color:'#3b82f6',desc:'Research a topic and give a structured summary'},
    {label:'Write & Refine',icon:'fa-pen-nib',color:'#8b5cf6',desc:'Draft content then improve it automatically'},
    {label:'Code & Debug',icon:'fa-code',color:'#10b981',desc:'Write code, test it, and fix any issues'},
    {label:'Plan & Break Down',icon:'fa-sitemap',color:'#f59e0b',desc:'Break a complex goal into actionable steps'},
    {label:'Analyze & Report',icon:'fa-chart-bar',color:'#ef4444',desc:'Analyze data or content and produce a report'},
  ];

  React.useEffect(()=>{
    if(logsRef.current) logsRef.current.scrollTop = logsRef.current.scrollHeight;
  },[steps]);

  const runAgent = async () => {
    if(!goal.trim()||running) return;
    setRunning(true); setDone(false); setResult(''); setSteps([]);

    const addStep = (text,type='thinking') => setSteps(prev=>[...prev,{id:Date.now()+Math.random(),text,type,time:new Date().toLocaleTimeString()}]);

    addStep('🎯 Analyzing goal...','thinking');
    await new Promise(r=>setTimeout(r,600));
    addStep('📋 Planning steps to complete the task...','thinking');
    await new Promise(r=>setTimeout(r,500));

    try {
      // Step 1: Plan
      addStep('🔍 Step 1: Breaking down the goal','step');
      const planRes = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        message:`You are an AI agent. Break this goal into 3-5 concrete steps: "${goal}". Respond with a numbered list only.`,
        system_prompt:'You are a precise AI agent. Be concise and actionable.',
        history:[],mood:'professional'
      })});
      const planData = await planRes.json();
      addStep('✅ Plan created: '+planData.reply?.slice(0,120)+'...','result');
      await new Promise(r=>setTimeout(r,400));

      // Step 2: Execute
      addStep('⚡ Step 2: Executing the main task','step');
      const execRes = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        message:`Execute this task completely and thoroughly: "${goal}". Provide detailed, useful output.`,
        system_prompt: sysPrompt || 'You are a highly capable AI agent. Complete tasks thoroughly.',
        history:[{role:'assistant',content:planData.reply||''}],mood:'professional'
      })});
      const execData = await execRes.json();
      addStep('✅ Task executed successfully','result');
      await new Promise(r=>setTimeout(r,300));

      // Step 3: Refine
      addStep('✨ Step 3: Refining and polishing output','step');
      await new Promise(r=>setTimeout(r,500));
      addStep('🎉 Agent task completed!','done');
      setResult(execData.reply||'Task completed.');
      setDone(true);
    } catch(e) {
      addStep('❌ Error: '+e.message,'error');
    }
    setRunning(false);
  };

  return (
    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.65)',backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div className="w-full max-w-2xl rounded-2xl border shadow-2xl flex flex-col" style={{background:'var(--bg2)',borderColor:'var(--br)',maxHeight:'85vh'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b flex-shrink-0" style={{borderColor:'var(--br)'}}>
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center" style={{background:'rgba(167,139,250,.15)'}}>
              <i className="fa-solid fa-robot text-sm" style={{color:'#a78bfa'}}></i>
            </div>
            <div>
              <span className="font-bold text-sm" style={{color:'var(--t1)'}}>AI Agent</span>
              <span className="ml-2 text-[10px] px-2 py-0.5 rounded-full font-bold" style={{background:'rgba(167,139,250,.15)',color:'#a78bfa'}}>BETA</span>
            </div>
          </div>
          <button onClick={onClose} style={{color:'var(--t2)'}} className="hover:text-white w-7 h-7 flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
        </div>

        <div className="flex-1 overflow-y-auto p-5 space-y-4" style={{scrollbarWidth:'thin'}}>
          {/* Quick task buttons */}
          {!running&&!done&&(
            <div>
              <p className="text-[11px] font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Quick Tasks</p>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {AGENT_TASKS.map(t=>(
                  <button key={t.label} onClick={()=>setGoal(t.desc)} className="p-3 rounded-xl border text-left transition-all hover:scale-[1.02]" style={{borderColor:'var(--br)',background:'var(--bg3)'}}>
                    <i className={`fa-solid ${t.icon} text-sm mb-1.5 block`} style={{color:t.color}}></i>
                    <p className="text-[11px] font-bold" style={{color:'var(--t1)'}}>{t.label}</p>
                    <p className="text-[9px] mt-0.5 leading-tight" style={{color:'var(--t3)'}}>{t.desc}</p>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Goal input */}
          {!running&&!done&&(
            <div>
              <p className="text-[11px] font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Your Goal</p>
              <textarea value={goal} onChange={e=>setGoal(e.target.value)} placeholder="Describe what you want the AI agent to accomplish..." rows={3} className="w-full px-4 py-3 rounded-xl border outline-none resize-none text-sm" style={{background:'var(--bg3)',borderColor:'var(--brh)',color:'var(--t1)',fontFamily:"'DM Sans',sans-serif"}}/>
              <button onClick={runAgent} disabled={!goal.trim()} className="mt-3 w-full py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2" style={{background:goal.trim()?'linear-gradient(135deg,#7c3aed,#a855f7)':'var(--bg3)',color:goal.trim()?'#fff':'var(--t3)',border:'none',cursor:goal.trim()?'pointer':'default'}}>
                <i className="fa-solid fa-bolt"></i> Run Agent
              </button>
            </div>
          )}

          {/* Agent logs */}
          {steps.length>0&&(
            <div>
              <p className="text-[11px] font-bold uppercase tracking-widest mb-2" style={{color:'var(--t3)'}}>Agent Logs</p>
              <div ref={logsRef} className="rounded-xl border p-3 space-y-2" style={{background:'var(--bg)',borderColor:'var(--br)',maxHeight:180,overflowY:'auto',scrollbarWidth:'thin'}}>
                {steps.map(s=>(
                  <div key={s.id} className="flex items-start gap-2 text-[11px]">
                    <span style={{color:'var(--t3)',flexShrink:0}}>{s.time}</span>
                    <span style={{color: s.type==='error'?'#f87171':s.type==='done'?'#34d399':s.type==='result'?'#a78bfa':'var(--t2)'}}>{s.text}</span>
                  </div>
                ))}
