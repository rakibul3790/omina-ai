<script>
// ── Connection & Navigation Monitor ──
(function(){
  const overlay  = document.getElementById('omina-conn-overlay');
  const nprog    = document.getElementById('omina-nprogress');
  const loader   = document.getElementById('omina-loader');

  // Top progress bar helpers
  let npTimer = null;
  function npStart(){
    if(!nprog) return;
    nprog.style.transition='none';
    nprog.style.transform='scaleX(0)';
    nprog.classList.add('active');
    requestAnimationFrame(()=>{
      nprog.style.transition='transform 2.5s cubic-bezier(.1,0,.2,1)';
      nprog.style.transform='scaleX(.85)';
    });
  }
  function npDone(){
    if(!nprog) return;
    nprog.style.transition='transform .25s ease,opacity .4s ease .3s';
    nprog.style.transform='scaleX(1)';
    setTimeout(()=>{ nprog.classList.remove('active'); nprog.style.transform='scaleX(0)'; }, 700);
    clearTimeout(npTimer);
  }

  // Page reload / beforeunload → show top bar
  window.addEventListener('beforeunload', function(){
    npStart();
    if(loader){ loader.style.display='flex'; loader.classList.remove('hide'); }
  });

  // Online / Offline
  window.addEventListener('offline', function(){
    if(overlay){
      overlay.querySelector('.co-title').textContent = 'No Internet Connection';
      overlay.querySelector('.co-sub').textContent   = 'Check your Wi-Fi or mobile data and try again.';
      overlay.classList.add('show');
    }
  });
  window.addEventListener('online', function(){
    if(overlay) overlay.classList.remove('show');
  });

  // Slow server / fetch timeout detection
  // Patch global fetch to watch for slow responses
  const SLOW_THRESHOLD = 8000; // 8 seconds
  const _fetch = window.fetch.bind(window);
  window.fetch = function(url, opts){
    const isApiCall = typeof url === 'string' && (url.includes('/chat') || url.includes('/api') || url.includes('/v1'));
    let slowTimer = null;
    const p = _fetch(url, opts);
    if(isApiCall){
      slowTimer = setTimeout(()=>{
        if(overlay && navigator.onLine){
          overlay.querySelector('.co-title').textContent = 'Slow Connection';
          overlay.querySelector('.co-sub').textContent   = 'Server is taking too long. Your connection may be weak.';
          overlay.classList.add('show');
        }
      }, SLOW_THRESHOLD);
      p.then(()=>{ clearTimeout(slowTimer); if(overlay) overlay.classList.remove('show'); })
       .catch(()=>{ clearTimeout(slowTimer); });
    }
    return p;
  };

  // Navigation: detect link clicks / pushState
  const _pushState = history.pushState.bind(history);
  history.pushState = function(){
    npStart();
    _pushState.apply(history, arguments);
    setTimeout(npDone, 500);
  };
  window.addEventListener('popstate', function(e){ if(e.state&&e.state.__omina) return; npStart(); setTimeout(npDone, 400); });

  // Page load complete → hide loader, finish progress bar
  window.addEventListener('load', function(){
    npDone();
    const l = document.getElementById('omina-loader');
    if(l){ l.classList.add('hide'); setTimeout(()=>{l.style.display='none';},400); }
  });

})();
</script>
<!-- ══ SERVICE WORKER + PWA INSTALL ══ -->
<script>
(function(){
  // ── Service Worker Registration ──────────────────
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('/sw.js')
        .then(reg => {
          console.log('[PWA] Service Worker registered:', reg.scope);
          // Check for updates
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
                // New version available
                if(window.__ominaPWAUpdateToast){
                  window.__ominaPWAUpdateToast();
                }
              }
            });
          });
        })
        .catch(err => console.warn('[PWA] SW registration failed:', err));
    });

    // Listen for messages from SW
    navigator.serviceWorker.addEventListener('message', event => {
      if(event.data?.type === 'SYNC_READY'){
        window.dispatchEvent(new CustomEvent('omina-sync-ready'));
      }
    });
  }

  // ── PWA Install Prompt ───────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    window.__ominaInstallPrompt = deferredPrompt;
    // Signal React app that install is available
    window.dispatchEvent(new CustomEvent('pwa-installable'));
    console.log('[PWA] Install prompt ready');
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    window.__ominaInstallPrompt = null;
    console.log('[PWA] Omina AI installed!');
    window.dispatchEvent(new CustomEvent('pwa-installed'));
  });

  // ── Handle query params after payment redirect ───
  const params = new URLSearchParams(window.location.search);
  const payStatus = params.get('payment');
  if(payStatus){
    window.__ominaPaymentStatus = payStatus;
    // Clean URL
    const cleanUrl = window.location.pathname;
    history.replaceState({}, document.title, cleanUrl);
  }

  // ── Handle PWA shortcuts ─────────────────────────
  const openParam = params.get('open');
  const newParam  = params.get('new');
  if(openParam) window.__ominaOpenFeature = openParam;
  if(newParam)  window.__ominaNewChat = true;
})();
</script>
